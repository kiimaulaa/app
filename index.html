                                                </div>
                                            </div>

                                            {/* Biografi Box */}
                                            <div className="w-full text-left bg-[#09090b] p-4 rounded-xl border border-zinc-900 mt-5 space-y-1">
                                                <span className="text-[10px] text-zinc-500 font-bold tracking-widest uppercase block"><i className="fa-solid fa-feather mr-1.5 text-accentBlue"></i>Biografi</span>
                                                <p className="text-xs text-zinc-400 italic leading-relaxed">{currentUser.bio || "Tidak ada biografi ditulis."}</p>
                                            </div>

                                            {/* Edit Profil Button trigger */}
                                            {!isEditingProfile ? (
                                                <button 
                                                    onClick={startEditProfile}
                                                    className="w-full bg-[#1c1c1f] hover:bg-zinc-800 text-zinc-300 font-bold text-xs py-3 px-4 rounded-xl transition-all border border-zinc-800 mt-5"
                                                >
                                                    <i className="fa-solid fa-pen-to-square mr-2"></i>
                                                    Edit Profil & Bio Anda
                                                </button>
                                            ) : (
                                                <form onSubmit={handleSaveProfile} className="w-full mt-5 space-y-4 text-left border-t border-zinc-900 pt-5">
                                                    <div>
                                                        <label className="block text-zinc-400 text-[10px] font-bold uppercase mb-1">Nama Lengkap</label>
                                                        <input 
                                                            type="text" 
                                                            value={editFullName}
                                                            onChange={(e) => setEditFullName(e.target.value)}
                                                            className="w-full bg-[#09090b] text-white border border-zinc-850 rounded-xl px-4 py-2.5 text-xs focus:outline-none focus:ring-1 focus:ring-accentBlue"
                                                        />
                                                    </div>

                                                    <div>
                                                        <label className="block text-zinc-400 text-[10px] font-bold uppercase mb-1">Biografi (Bio)</label>
                                                        <textarea 
                                                            value={editBio}
                                                            onChange={(e) => setEditBio(e.target.value)}
                                                            rows="2"
                                                            className="w-full bg-[#09090b] text-white border border-zinc-850 rounded-xl px-4 py-2.5 text-xs focus:outline-none focus:ring-1 focus:ring-accentBlue resize-none"
                                                        ></textarea>
                                                    </div>

                                                    <div>
                                                        <label className="block text-zinc-400 text-[10px] font-bold uppercase mb-2">Pilih Avatar Profil</label>
                                                        <div className="flex justify-between bg-[#09090b] p-2 rounded-xl border border-zinc-900">
                                                            {AVATARS.map((av, idx) => (
                                                                <button
                                                                    key={idx}
                                                                    type="button"
                                                                    onClick={() => setEditAvatar(av)}
                                                                    className={`w-10 h-10 rounded-full overflow-hidden border-2 ${
                                                                        editAvatar === av ? 'border-accentBlue scale-105' : 'border-transparent opacity-60'
                                                                    }`}
                                                                >
                                                                    <img src={av} alt="avatar option" className="w-full h-full object-cover" />
                                                                </button>
                                                            ))}
                                                        </div>
                                                    </div>

                                                    <div className="flex gap-2">
                                                        <button 
                                                            type="button"
                                                            onClick={() => setIsEditingProfile(false)}
                                                            className="flex-1 bg-zinc-900 text-zinc-400 font-bold text-xs py-2.5 px-4 rounded-xl border border-zinc-850"
                                                        >
                                                            Batal
                                                        </button>
                                                        <button 
                                                            type="submit"
                                                            className="flex-1 bg-accentBlue text-white font-bold text-xs py-2.5 px-4 rounded-xl"
                                                        >
                                                            Simpan
                                                        </button>
                                                    </div>
                                                </form>
                                            )}
                                        </div>
                                    </div>

                                    {/* Discover Users list */}
                                    <div className="bg-cardBg border border-zinc-800 rounded-2xl p-5 shadow-xl">
                                        <div className="flex justify-between items-center mb-4">
                                            <h4 className="text-xs font-bold uppercase text-white tracking-wider flex items-center gap-2">
                                                <i className="fa-solid fa-users text-accentBlue"></i>
                                                Temukan Pengguna Lain
                                            </h4>
                                            
                                            {/* Minimalistic search in profile directory */}
                                            <input 
                                                type="text" 
                                                placeholder="Cari teman..." 
                                                value={userSearchText}
                                                onChange={(e) => setUserSearchText(e.target.value)}
                                                className="bg-[#09090b] text-white border border-zinc-800 rounded-lg px-2.5 py-1 text-[10px] focus:outline-none focus:ring-1 focus:ring-accentBlue w-36"
                                            />
                                        </div>

                                        <div className="space-y-3.5">
                                            {filteredUsersToFollow.length === 0 ? (
                                                <p className="text-xs text-zinc-600 italic">Belum ada pengguna lain terdaftar.</p>
                                            ) : (
                                                filteredUsersToFollow.map(user => {
                                                    const following = isFollowing(currentUser.id, user.id);
                                                    const follower = isFollowing(user.id, currentUser.id);
                                                    const isOnline = user.isOnline && (Date.now() - (user.lastActive || 0) < 60000);

                                                    return (
                                                        <div key={user.id} className="flex items-center justify-between p-3 bg-black/30 border border-zinc-900 rounded-xl hover:border-zinc-800 transition-all">
                                                            <div className="flex items-center gap-3">
                                                                <div className="relative">
                                                                    <img src={user.avatar} className="w-10 h-10 rounded-full object-cover border border-zinc-800" alt="avatar" />
                                                                    <span className={`absolute bottom-0 right-0 w-2.5 h-2.5 border-2 border-black rounded-full ${
                                                                        isOnline ? 'bg-accentGreen' : 'bg-zinc-600'
                                                                    }`}></span>
                                                                </div>
                                                                <div>
                                                                    <div className="flex items-center gap-1.5">
                                                                        <span className="text-xs font-bold text-white">@{user.username}</span>
                                                                        {follower && (
                                                                            <span className="bg-zinc-800 text-zinc-500 text-[8px] font-bold px-1.5 py-0.2 rounded">Mengikuti Anda</span>
                                                                        )}
                                                                    </div>
                                                                    <p className="text-[10px] text-zinc-500">{user.fullName}</p>
                                                                </div>
                                                            </div>

                                                            <button 
                                                                onClick={() => handleFollow(user.id)}
                                                                className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all ${
                                                                    following 
                                                                        ? 'bg-zinc-800 hover:bg-zinc-700 text-zinc-300' 
                                                                        : 'bg-accentBlue hover:bg-blue-600 text-white'
                                                                }`}
                                                            >
                                                                {following ? 'Batal Ikuti' : 'Ikuti'}
                                                            </button>
                                                        </div>
                                                    );
                                                })
                                            )}
                                        </div>
                                    </div>

                                </div>

                            </div>
                        )}

                    </main>

                    {/* STATUS DETAILS MODAL (Pop-up on Network Status click) */}
                    {showStatusModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 animate-fade-in">
                            <div className="bg-cardBg border border-zinc-850 rounded-2xl max-w-sm w-full p-6 space-y-4 shadow-2xl">
                                <div className="text-center">
                                    <div className="w-12 h-12 rounded-full bg-[#1b2b3a] text-accentBlue flex items-center justify-center text-xl mx-auto mb-3">
                                        <i className="fa-solid fa-wifi animate-pulse"></i>
                                    </div>
                                    <h4 className="text-sm font-bold text-white mb-1">Status Sinkronisasi Jaringan</h4>
                                    <p className="text-[11px] text-zinc-500">
                                        Aplikasi ini menggunakan teknologi real-time Firebase SDK untuk sinkronisasi pesan & kalender instan antar pengguna.
                                    </p>
                                </div>

                                <div className="space-y-2.5 bg-[#09090b] p-3 rounded-xl border border-zinc-900 text-[11px]">
                                    <div className="flex justify-between">
                                        <span className="text-zinc-500">Status Layanan:</span>
                                        <span className="text-accentGreen font-bold flex items-center gap-1.5">
                                            <span className="w-1.5 h-1.5 bg-accentGreen rounded-full"></span> Online & Aktif
                                        </span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-zinc-500">Firestore Path:</span>
                                        <span className="text-zinc-400 font-mono">/artifacts/{appId}/...</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-zinc-500">Keamanan Enkripsi:</span>
                                        <span className="text-zinc-400">Anonim + Autentikasi Cloud</span>
                                    </div>
                                </div>

                                <button 
                                    onClick={() => setShowStatusModal(false)}
                                    className="w-full bg-accentBlue hover:bg-blue-600 text-white font-bold py-2.5 rounded-xl text-xs transition-all"
                                >
                                    Selesai & Tutup
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Toast Notification */}
                    {toastMessage && (
                        <div className="fixed bottom-6 right-6 bg-[#1b2b3a] border border-accentBlue text-white px-5 py-3 rounded-xl shadow-2xl text-xs font-semibold tracking-wide transition-all z-50 flex items-center gap-2">
                            <i className="fa-solid fa-circle-info text-accentBlue"></i>
                            {toastMessage}
                        </div>
                    )}

                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
