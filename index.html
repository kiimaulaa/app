<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlengerGram</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome untuk Icon -->
    <link class="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        igGray: '#121212',
                        igBorder: '#262626',
                        igHover: '#1a1a1a',
                        igBlue: '#0095f6',
                        igDarkBlue: '#00376b'
                    }
                }
            }
        }
    </script>
    <style>
        /* Sembunyikan scrollbar untuk pengalaman estetika premium */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-black text-white font-sans antialiased min-h-screen flex flex-col md:flex-row overflow-x-hidden">

    <!-- CONTAINER UTAMA APLIKASI -->
    <div id="app" class="flex w-full min-h-screen"></div>

    <!-- Firebase SDK Modular Loader -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { 
            getFirestore, doc, setDoc, getDoc, getDocs, collection, 
            updateDoc, onSnapshot, arrayUnion, arrayRemove, query, where, deleteDoc 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { 
            getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // --- DAFTAR AKUN TETAP ---
        const PRESET_ACCOUNTS = [
            {
                id: 'user_developer',
                username: 'developer',
                fullName: 'Developer Plenger',
                password: 'developer',
                avatar: 'https://api.dicebear.com/7.x/adventurer/svg?seed=developer',
                bio: 'Akun Pengembang Utama Aplikasi PlengerGram.',
                followingIds: ['user_whana_'],
                isBot: false,
                lastActive: Date.now()
            },
            {
                id: 'user_whana_',
                username: 'whana_',
                fullName: 'Whana Plenger',
                password: 'kii',
                avatar: 'https://api.dicebear.com/7.x/adventurer/svg?seed=whana',
                bio: 'Akun Kreator Utama PlengerGram.',
                followingIds: ['user_developer'],
                isBot: false,
                lastActive: Date.now()
            }
        ];

        // --- SALURAN SINKRONISASI REAL-TIME LOKAL (BROADCAST CHANNEL) ---
        const syncChannel = new BroadcastChannel('plengergram_realtime_sync');

        // --- DETEKSI & STRATEGI CLOUD PERSISTENCE ---
        let firebaseConfig = {};
        let useCloud = false;
        let isCustomCloud = false;
        let app, auth, db;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        const DEFAULT_JSON_TEMPLATE = {
            apiKey: "AIzaSyFakeKey_PlengerGramAutoConnected",
            authDomain: "plengergram-app.firebaseapp.com",
            projectId: "plengergram-app",
            storageBucket: "plengergram-app.appspot.com",
            messagingSenderId: "1234567890",
            appId: "1:1234567890:web:abc123xyz"
        };

        // 1. Coba baca dari config sandbox environment bawaan
        try {
            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                const parsedSandbox = typeof __firebase_config === 'string' ? JSON.parse(__firebase_config) : __firebase_config;
                if (parsedSandbox && parsedSandbox.apiKey && !parsedSandbox.apiKey.includes("FakeKey")) {
                    firebaseConfig = parsedSandbox;
                    useCloud = true;
                }
            }
        } catch (e) {
            console.warn("Konfigurasi Sandbox Firebase tidak terdeteksi.");
        }

        // 2. Coba baca dari konfigurasi Firebase kustom pengguna di LocalStorage
        try {
            let savedCustomConfig = localStorage.getItem('pg_custom_firebase_config');
            if (!savedCustomConfig) {
                localStorage.setItem('pg_custom_firebase_config', JSON.stringify(DEFAULT_JSON_TEMPLATE));
                savedCustomConfig = JSON.stringify(DEFAULT_JSON_TEMPLATE);
            }
            
            if (savedCustomConfig) {
                const parsed = JSON.parse(savedCustomConfig);
                if (parsed && parsed.apiKey && !parsed.apiKey.includes("FakeKey") && parsed.apiKey !== DEFAULT_JSON_TEMPLATE.apiKey) {
                    firebaseConfig = parsed;
                    useCloud = true;
                    isCustomCloud = true;
                } else {
                    firebaseConfig = parsed;
                    useCloud = false;
                    isCustomCloud = false;
                }
            }
        } catch (e) {
            console.error("Gagal memuat konfigurasi Firebase kustom:", e);
        }

        if (useCloud) {
            try {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
            } catch (e) {
                console.warn("Gagal inisialisasi Firebase Cloud (Beralih ke Simulasi Real-Time Lokal).", e);
                useCloud = false;
                isCustomCloud = false;
            }
        }

        // --- PENYEGARAN DATA TOTAL ---
        const HAS_RESET = 'plengergram_wipe_v160_realtime_dm_clean';
        if (!localStorage.getItem(HAS_RESET)) {
            localStorage.clear();
            localStorage.setItem('pg_accounts', JSON.stringify(PRESET_ACCOUNTS));
            localStorage.setItem('pg_chats', JSON.stringify({}));
            localStorage.setItem('pg_custom_firebase_config', JSON.stringify(DEFAULT_JSON_TEMPLATE));
            localStorage.setItem(HAS_RESET, 'true');
        }

        // --- STATE MANAGEMENT ---
        let accounts = [...PRESET_ACCOUNTS];
        let memories = [];
        let chats = {};
        
        let currentUserId = ""; 
        let activePage = 'home'; // 'home', 'messages', 'profile'
        let currentChatWithId = 'group_public'; 
        let isUserLoggedIn = false;

        // Fitur balas pesan langsung
        let replyToMsg = null; 

        let userSearchQuery = "";
        let profileSearchQuery = "";

        const todayDate = new Date();
        let currentYear = todayDate.getFullYear();
        let currentMonth = todayDate.getMonth(); 
        let selectedDateStr = ""; 

        let isShortcutBarOpen = false;
        let shortcutSearchQuery = "";

        let activityIntervalId = null;

        const MONTH_NAMES = [
            "Januari", "Februari", "Maret", "April", "Mei", "Juni",
            "Juli", "Agustus", "September", "Oktober", "November", "Desember"
        ];

        // --- SYSTEM LOCAL FALLBACK UTILITIES ---
        function saveLocalData() {
            localStorage.setItem('pg_accounts', JSON.stringify(accounts));
            localStorage.setItem('pg_memories', JSON.stringify(memories));
            localStorage.setItem('pg_chats', JSON.stringify(chats));
        }

        // --- SISTEM FIREBASE CLOUD PERSISTENCE ---
        const getPublicDataColRef = (collName) => collection(db, 'artifacts', appId, 'public', 'data', collName);
        const getPublicDataDocRef = (collName, docId) => doc(db, 'artifacts', appId, 'public', 'data', collName, docId);

        function getChatRoomId(userId1, userId2) {
            if (userId2 === 'group_public') return 'group_public';
            return [userId1, userId2].sort().join('_');
        }

        async function authenticateUser() {
            if (!useCloud) return;
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token && !isCustomCloud) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth error:", err);
                try {
                    await signInAnonymously(auth);
                } catch (e) {
                    console.error("Fallback anonymous auth error:", e);
                    useCloud = false;
                }
            }
        }

        async function syncPresetAccountsToCloud() {
            if (!useCloud) return;
            try {
                for (const acc of PRESET_ACCOUNTS) {
                    const docRef = getPublicDataDocRef('accounts', acc.id);
                    const snap = await getDoc(docRef);
                    if (!snap.exists()) {
                        await setDoc(docRef, acc);
                    }
                }
            } catch (e) {
                console.error("Gagal menyelaraskan akun preset ke cloud:", e);
            }
        }

        // Fungsi sinkronisasi obrolan terarah
        window.startChatRoomsSync = function() {
            if (!useCloud || !currentUserId) return;

            const roomsToListen = ['group_public'];
            accounts.forEach(acc => {
                if (acc.id !== currentUserId) {
                    roomsToListen.push(getChatRoomId(currentUserId, acc.id));
                }
            });

            roomsToListen.forEach(roomId => {
                const docRef = getPublicDataDocRef('chats', roomId);
                onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        chats[roomId] = docSnap.data().messages || [];
                    } else {
                        chats[roomId] = [];
                    }
                    saveLocalData();
                    renderApp();
                }, (err) => {
                    console.warn(`Gagal sinkronisasi direct room ${roomId}:`, err);
                });
            });
        };

        function setupDataSync(user) {
            if (!user || !useCloud) return;

            syncPresetAccountsToCloud();
            window.startChatRoomsSync();

            // 1. Sync Akun Pengguna
            onSnapshot(getPublicDataColRef('accounts'), (snapshot) => {
                const cloudAccounts = {};
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data && data.id) {
                        cloudAccounts[data.id] = data;
                    }
                });
                
                const merged = PRESET_ACCOUNTS.map(preset => {
                    if (cloudAccounts[preset.id]) {
                        return { ...preset, ...cloudAccounts[preset.id] };
                    }
                    return preset;
                });

                const presetIds = PRESET_ACCOUNTS.map(p => p.id);
                Object.values(cloudAccounts).forEach(cloudAcc => {
                    if (!presetIds.includes(cloudAcc.id)) {
                        merged.push(cloudAcc);
                    }
                });

                accounts = merged;
                
                const loggedInId = localStorage.getItem('pg_logged_in_id');
                if (loggedInId && accounts.some(acc => acc.id === loggedInId)) {
                    currentUserId = loggedInId;
                    isUserLoggedIn = true;
                    startTrackingActivity();
                }

                window.startChatRoomsSync();
                renderApp();
            }, (err) => {
                console.warn("Membaca koleksi akun cloud dibatasi (Menggunakan fallback preset):", err);
                accounts = [...PRESET_ACCOUNTS];
                window.startChatRoomsSync();
                renderApp();
            });

            // 2. Sync Kenangan (Memories)
            onSnapshot(getPublicDataColRef('memories'), (snapshot) => {
                memories = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    if (data && data.title && data.date) {
                        memories.push(data);
                    }
                });
                saveLocalData();
                renderApp();
            }, (err) => {
                console.warn("Akses koleksi kenangan dibatasi:", err);
            });
        }

        // --- SISTEM SINKRONISASI VIA BROADCAST CHANNEL (Fallback Instan) ---
        syncChannel.onmessage = (event) => {
            const { type, data } = event.data;
            if (type === 'NEW_MESSAGE') {
                const { roomId, messages } = data;
                chats[roomId] = messages;
                saveLocalData();
                renderApp();
                scrollToBottom();
            } else if (type === 'NEW_MEMORY') {
                memories = data;
                saveLocalData();
                renderApp();
            } else if (type === 'USER_ACTIVE') {
                const { id, lastActive } = data;
                const idx = accounts.findIndex(a => a.id === id);
                if (idx !== -1) {
                    accounts[idx].lastActive = lastActive;
                    renderApp();
                }
            }
        };

        // Pendengar storage cross-tab standar untuk redundansi tinggi
        window.addEventListener('storage', (e) => {
            if (e.key === 'pg_chats') {
                chats = JSON.parse(e.newValue) || {};
                renderApp();
                scrollToBottom();
            } else if (e.key === 'pg_memories') {
                memories = JSON.parse(e.newValue) || [];
                renderApp();
            } else if (e.key === 'pg_accounts') {
                accounts = JSON.parse(e.newValue) || [];
                renderApp();
            }
        });

        function getCurrentUser() {
            return accounts.find(acc => acc.id === currentUserId) || null;
        }

        // --- SISTEM PELACAKAN AKTIVITAS ONLINE ---
        async function updateMyActivityTimestamp() {
            const currentUser = getCurrentUser();
            if (!currentUser) return;
            const now = Date.now();
            try {
                if (useCloud) {
                    const userDocRef = getPublicDataDocRef('accounts', currentUser.id);
                    await updateDoc(userDocRef, { lastActive: now });
                } else {
                    const idx = accounts.findIndex(a => a.id === currentUser.id);
                    if (idx !== -1) {
                        accounts[idx].lastActive = now;
                        saveLocalData();
                    }
                }
            } catch (err) {
                console.error("Gagal memperbarui status keaktifan ke cloud:", err);
            }
            // Kirim broadcast aktivitas ke tab lain secara lokal
            syncChannel.postMessage({
                type: 'USER_ACTIVE',
                data: { id: currentUser.id, lastActive: now }
            });
        }

        function startTrackingActivity() {
            if (activityIntervalId) clearInterval(activityIntervalId);
            updateMyActivityTimestamp();
            activityIntervalId = setInterval(updateMyActivityTimestamp, 10000); // Perbarui status setiap 10 detik agar lebih responsif
        }

        function stopTrackingActivity() {
            if (activityIntervalId) {
                clearInterval(activityIntervalId);
                activityIntervalId = null;
            }
        }

        window.isUserOnline = function(user) {
            if (!user || !user.lastActive) return false;
            const difference = Date.now() - user.lastActive;
            return difference < 30000; // Toleransi 30 detik untuk real-time multi-tab
        }

        // --- MANAJEMEN DATABASE KUSTOM ---
        window.showFirebaseConfigModal = function() {
            const currentConfig = localStorage.getItem('pg_custom_firebase_config') || JSON.stringify(DEFAULT_JSON_TEMPLATE, null, 2);
            showCustomModal("Konfigurasi Database Cloud (JSON)", `
                <div class="flex flex-col gap-3">
                    <p class="text-[11px] text-gray-400 leading-relaxed">
                        Kami menyediakan fungsionalitas Simulasi Realtime Multi-Tab secara otomatis melalui BroadcastChannel untuk menjamin kelancaran interaksi di GitHub Pages tanpa konfigurasi tambahan.
                    </p>
                    <p class="text-[11px] text-gray-400 leading-relaxed">
                        Jika Anda ingin menghubungkannya ke Database Firebase milik Anda sendiri untuk mendapatkan penyimpanan cloud permanen, silakan tempelkan JSON Firebase Config Anda di bawah ini:
                    </p>
                    <textarea id="custom-firebase-input" rows="8" placeholder='{\n  "apiKey": "...",\n  "projectId": "..."\n}' class="w-full bg-black border border-igBorder rounded p-2 text-[10px] text-gray-300 font-mono focus:border-igBlue outline-none">${currentConfig}</textarea>
                    <div class="flex gap-2 mt-2">
                        <button onclick="saveCustomFirebaseConfig()" class="flex-1 bg-igBlue hover:bg-blue-600 text-white font-bold py-2 rounded text-xs transition">Simpan & Hubungkan Database</button>
                        <button onclick="clearCustomFirebaseConfig()" class="bg-red-600/20 hover:bg-red-500/20 text-red-500 border border-red-500/30 px-3 py-2 rounded text-xs font-bold transition">Reset ke Default</button>
                    </div>
                </div>
            `);
        };

        window.saveCustomFirebaseConfig = function() {
            const inputVal = document.getElementById('custom-firebase-input').value.trim();
            if (!inputVal) {
                showCustomToast("Silakan masukkan konfigurasi JSON terlebih dahulu.");
                return;
            }
            try {
                const parsed = JSON.parse(inputVal);
                if (!parsed.apiKey || !parsed.projectId) {
                    showCustomToast("Format konfigurasi tidak valid (apiKey & projectId diperlukan).");
                    return;
                }
                localStorage.setItem('pg_custom_firebase_config', JSON.stringify(parsed, null, 2));
                showCustomToast("Konfigurasi database berhasil disimpan! Menghubungkan...");
                setTimeout(() => {
                    window.location.reload();
                }, 1000);
            } catch (e) {
                showCustomToast("Format JSON salah. Harap periksa tanda petik atau koma.");
            }
        };

        window.clearCustomFirebaseConfig = function() {
            localStorage.setItem('pg_custom_firebase_config', JSON.stringify(DEFAULT_JSON_TEMPLATE, null, 2));
            showCustomToast("Koneksi berhasil di-reset ke pengaturan default.");
            setTimeout(() => {
                window.location.reload();
            }, 1000);
        };

        // --- SISTEM NAVIGASI ---
        window.navigateTo = function(page, targetId = null) {
            activePage = page;
            if (page === 'messages') {
                if (targetId) {
                    currentChatWithId = targetId;
                } else {
                    currentChatWithId = 'group_public';
                }
                scrollToBottom();
            }
            renderApp();
        }

        window.formatIndonesianDate = function(dateStr) {
            if (!dateStr) return "";
            const parts = dateStr.split('-');
            if (parts.length !== 3) return dateStr;
            
            const year = parts[0];
            const monthIndex = parseInt(parts[1], 10) - 1;
            const day = parseInt(parts[2], 10);
            
            const monthName = MONTH_NAMES[monthIndex] || parts[1];
            return `${day} ${monthName} ${year}`;
        }

        window.changeMonth = function(direction) {
            currentMonth += direction;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            } else if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            renderApp();
        }

        window.filterByDate = function(dateStr) {
            if (selectedDateStr === dateStr) {
                selectedDateStr = ""; 
            } else {
                selectedDateStr = dateStr;
            }
            renderApp();
        }

        window.clearDateFilter = function() {
            selectedDateStr = "";
            renderApp();
        }

        // --- SISTEM DINAMIS PENGIKUT ---
        window.getFollowingCount = function(userId) {
            const acc = accounts.find(a => a.id === userId);
            return acc && acc.followingIds ? acc.followingIds.length : 0;
        }

        window.getFollowersCount = function(userId) {
            return accounts.filter(a => a.followingIds && a.followingIds.includes(userId)).length;
        }

        window.isFollowingTarget = function(currentId, targetId) {
            const acc = accounts.find(a => a.id === currentId);
            return acc && acc.followingIds && acc.followingIds.includes(targetId);
        }

        window.toggleFollowUser = async function(targetId) {
            const currentUser = getCurrentUser();
            if (!currentUser || currentUser.id === targetId) return;

            if (!currentUser.followingIds) {
                currentUser.followingIds = [];
            }

            const isFollowing = currentUser.followingIds.includes(targetId);
            const targetAcc = accounts.find(a => a.id === targetId);

            let updatedFollowing = [];
            if (isFollowing) {
                updatedFollowing = currentUser.followingIds.filter(id => id !== targetId);
                showCustomToast("Anda berhenti mengikuti @" + targetAcc.username);
            } else {
                updatedFollowing = [...currentUser.followingIds, targetId];
                showCustomToast("Anda sekarang mengikuti @" + targetAcc.username + "!");
            }

            try {
                if (useCloud) {
                    const userDocRef = getPublicDataDocRef('accounts', currentUser.id);
                    await updateDoc(userDocRef, { followingIds: updatedFollowing });
                } else {
                    currentUser.followingIds = updatedFollowing;
                    saveLocalData();
                    renderApp();
                }
            } catch (err) {
                console.error(err);
            }
        }

        // --- MANAJEMEN AUTENTIKASI ---

        window.handleLogin = function(e) {
            e.preventDefault();
            const usernameInput = document.getElementById('login-username').value.trim().toLowerCase();
            const passwordInput = document.getElementById('login-password').value;

            const user = PRESET_ACCOUNTS.find(acc => acc.username === usernameInput && acc.password === passwordInput);
            if (user) {
                currentUserId = user.id;
                isUserLoggedIn = true;
                localStorage.setItem('pg_logged_in_id', user.id);
                showCustomToast("Selamat datang kembali, @" + user.username + "!");
                
                if (useCloud) {
                    setDoc(getPublicDataDocRef('accounts', user.id), user)
                        .then(() => {
                            startTrackingActivity();
                            window.startChatRoomsSync();
                        })
                        .catch(err => {
                            console.warn("Menggunakan Autentikasi Lokal.");
                            startTrackingActivity();
                        });
                } else {
                    startTrackingActivity();
                }
                
                navigateTo('home');
            } else {
                showCustomModal("Gagal Masuk", "Username atau password salah. Silakan periksa kembali kredensial Anda.");
            }
        }

        window.handleLogout = function() {
            stopTrackingActivity();
            isUserLoggedIn = false;
            currentUserId = "";
            localStorage.removeItem('pg_logged_in_id');
            showCustomToast("Anda telah keluar akun.");
            renderApp();
        }

        // --- SEARCH HANDLER ---
        window.handleUserSearch = function(val) {
            userSearchQuery = val;
            renderApp();
            const inp = document.getElementById('user-search-input');
            if (inp) {
                inp.focus();
                inp.setSelectionRange(val.length, val.length);
            }
        }

        window.handleProfileSearch = function(val) {
            profileSearchQuery = val;
            renderApp();
            const inp = document.getElementById('profile-search-input');
            if (inp) {
                inp.focus();
                inp.setSelectionRange(val.length, val.length);
            }
        }

        // --- RENDERING STRUKTUR NAVIGASI ---

        function renderNavigation() {
            const currentUser = getCurrentUser();
            if (!currentUser) return { desktopNav: "", mobileNav: "" };

            // Indikator Status Database Cloud yang Selalu Siap Terhubung
            const cloudStatusHtml = useCloud 
                ? `<div onclick="showFirebaseConfigModal()" class="flex items-center gap-1.5 px-2 py-1 bg-green-500/10 text-green-500 rounded-md border border-green-500/20 text-[10px] cursor-pointer hover:bg-green-500/20 transition truncate max-w-full">
                     <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> Database Terkoneksi
                   </div>`
                : `<div onclick="showFirebaseConfigModal()" class="flex items-center gap-1.5 px-2 py-1 bg-igBlue/10 text-igBlue rounded-md border border-igBlue/20 text-[10px] cursor-pointer hover:bg-igBlue/20 transition truncate max-w-full">
                     <span class="w-1.5 h-1.5 bg-igBlue rounded-full animate-ping"></span> Realtime Aktif (Klik Detail)
                   </div>`;
            
            const desktopNav = `
                <div class="hidden md:flex flex-col justify-between w-64 h-screen border-r border-igBorder p-5 bg-black sticky top-0 z-20">
                    <div class="flex flex-col gap-6">
                        <div class="py-4 px-2 flex items-center justify-between gap-2 cursor-pointer" onclick="navigateTo('home')">
                            <div class="flex items-center gap-2">
                                <i class="fa-solid fa-calendar-heart text-3xl text-igBlue"></i>
                                <span class="font-bold text-xl tracking-wide font-sans text-white">PlengerGram</span>
                            </div>
                        </div>
                        <nav class="flex flex-col gap-2">
                            <button onclick="navigateTo('home')" class="flex items-center gap-4 p-3 hover:bg-igHover rounded-lg transition text-left ${activePage === 'home' ? 'font-bold bg-igHover text-igBlue' : ''}">
                                <i class="fa-solid fa-calendar-days text-xl"></i> <span>Momen Bersama</span>
                            </button>
                            <button onclick="navigateTo('messages')" class="flex items-center gap-4 p-3 hover:bg-igHover rounded-lg transition text-left ${activePage === 'messages' ? 'font-bold bg-igHover text-igBlue' : ''}">
                                <i class="fa-regular fa-paper-plane text-xl"></i> <span>Pesan & Teman</span>
                            </button>
                            <button onclick="navigateTo('profile')" class="flex items-center gap-4 p-3 hover:bg-igHover rounded-lg transition text-left ${activePage === 'profile' ? 'font-bold bg-igHover text-igBlue' : ''}">
                                <img src="${currentUser.avatar}" class="w-6 h-6 rounded-full border border-gray-600" /> <span>Profil Akun</span>
                            </button>
                        </nav>
                    </div>

                    <div class="border-t border-igBorder pt-4 flex flex-col gap-3">
                        <div class="px-2 mb-1 flex flex-col gap-1">
                            <span class="text-[9px] text-gray-500 font-bold uppercase tracking-wider">Status Jaringan:</span>
                            ${cloudStatusHtml}
                        </div>

        // --- MANAJEMEN KALENDER UTILITY ---
        function generateCalendarWidget(allMemories) {
            const firstDayIndex = new Date(currentYear, currentMonth, 1).getDay();
            const numDays = new Date(currentYear, currentMonth + 1, 0).getDate();
            const memoryDates = new Set(allMemories.map(m => m.date));
            const daysOfWeek = ["M", "S", "S", "R", "K", "J", "S"];
            let cells = [];

            for (let i = 0; i < firstDayIndex; i++) {
                cells.push(`<td class="p-1.5 text-center text-[11px] text-gray-700">-</td>`);
            }

            for (let day = 1; day <= numDays; day++) {
                const formattedDate = `${currentYear}-${(currentMonth + 1).toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`;
                const hasMemory = memoryDates.has(formattedDate);
                const isSelected = selectedDateStr === formattedDate;

                let cellClass = "p-1.5 text-center text-xs rounded-full cursor-pointer transition relative hover:bg-igHover ";
                if (isSelected) {
                    cellClass += "bg-igBlue text-white font-bold";
                } else if (hasMemory) {
                    cellClass += "bg-igDarkBlue/40 text-igBlue font-bold hover:bg-igDarkBlue/60";
                } else {
                    cellClass += "text-gray-300";
                }

                cells.push(`
                    <td class="p-1">
                        <div onclick="filterByDate('${formattedDate}')" class="${cellClass}">
                            ${day}
                            ${hasMemory && !isSelected ? `<span class="absolute bottom-0.5 left-1/2 -translate-x-1/2 w-1 h-1 bg-igBlue rounded-full"></span>` : ''}
                        </div>
                    </td>
                `);
            }

            let row = [];
            let rows = [];
            cells.forEach((cell, i) => {
                row.push(cell);
                if ((i + 1) % 7 === 0 || i === cells.length - 1) {
                    rows.push(`<tr>${row.join('')}</tr>`);
                    row = [];
                }
            });

            return `
                <table class="w-full border-collapse">
                    <thead>
                        <tr>
                            ${daysOfWeek.map(d => `<th class="text-center text-[10px] font-bold text-gray-500 pb-2">${d}</th>`).join('')}
                        </tr>
                    </thead>
                    <tbody>
                        ${rows.join('')}
                    </tbody>
                </table>
            `;
        }

        // --- MANAJEMEN TIMELINE UTILITY ---
        window.addNewMemory = async function(event) {
            event.preventDefault();
            const date = document.getElementById('mem-date').value;
            const title = document.getElementById('mem-title').value.trim();
            let image = document.getElementById('mem-image').value.trim();
            const description = document.getElementById('mem-description').value.trim();
            const currentUser = getCurrentUser();

            if (!date || !title || !image || !description || !currentUser) return;

            const driveReg1 = /\/file\/d\/([a-zA-Z0-9_-]+)/;
            const driveReg2 = /[\?&]id=([a-zA-Z0-9_-]+)/;
            const driveReg3 = /lh3\.googleusercontent\.com\/d\/([a-zA-Z0-9_-]+)/;
            
            let driveId = "";
            if (image.includes("drive.google.com")) {
                const match1 = image.match(driveReg1);
                const match2 = image.match(driveReg2);
                if (match1 && match1[1]) {
                    driveId = match1[1];
                } else if (match2 && match2[1]) {
                    driveId = match2[1];
                }
            } else if (image.includes("lh3.googleusercontent.com")) {
                const match3 = image.match(driveReg3);
                if (match3 && match3[1]) {
                    driveId = match3[1];
                }
            } else if (!image.startsWith("http") && image.length > 5) {
                driveId = image;
            }

            if (driveId) {
                image = `https://lh3.googleusercontent.com/d/${driveId}`;
            }

            const newMemoryId = Date.now().toString();
            const newMemory = {
                id: newMemoryId,
                userId: currentUser.id,
                date: date,
                title: title,
                image: image,
                description: description
            };

            try {
                if (useCloud) {
                    await setDoc(getPublicDataDocRef('memories', newMemoryId), newMemory);
                } else {
                    memories.push(newMemory);
                    saveLocalData();
                }

                // Broadcast penambahan momen kenangan secara real-time ke tab lain
                syncChannel.postMessage({
                    type: 'NEW_MEMORY',
                    data: memories
                });

                const targetDate = new Date(date);
                currentYear = targetDate.getFullYear();
                currentMonth = targetDate.getMonth();

                showCustomToast("Plengeran baru berhasil disimpan!");
                renderApp();
            } catch (err) {
                console.error("Gagal menyimpan momen:", err);

                    await deleteDoc(memoryDocRef);

                memories = memories.filter(m => m.id != id);
                saveLocalData();

                // Broadcast penghapusan momen kenangan
                syncChannel.postMessage({
                    type: 'NEW_MEMORY',
                    data: memories

                closeConfirmDelete();

                            <div onclick="selectChat('group_public')" class="flex items-center gap-3 p-3 rounded-xl cursor-pointer transition ${currentChatWithId === 'group_public' ? 'bg-igHover border border-igBlue/30' : 'hover:bg-igHover'}">
                                <div class="relative flex-shrink-0">

                                        <i class="fa-solid fa-earth-americas"></i>

                                    <span class="absolute bottom-0 right-0 bg-green-500 w-2.5 h-2.5 rounded-full border-2 border-black animate-ping"></span>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <div class="flex justify-between items-baseline">
                                        <h4 class="font-bold text-xs text-igBlue truncate">Grup Publik Bersama</h4>
                                        <span class="text-[8px] bg-igBlue/20 text-igBlue px-1.5 py-0.5 rounded-full uppercase font-bold">Grup</span>

                                    <i class="fa-regular fa-comments text-3xl mb-2 text-gray-600 block"></i>

                                </div>
                            ` : ''}

                            ${friendsListHtml}
                        </div>
                    </div>

                    <div class="flex-1 flex flex-col bg-black h-full ${!currentChatWithId && window.innerWidth < 768 ? 'hidden' : 'flex'}">
                        ${activeFriend ? `
                            <div class="flex items-center justify-between p-4 border-b border-igBorder bg-igGray/10">
                                <div class="flex items-center gap-3">
                                    <button onclick="backToChatList()" class="md:hidden text-lg mr-1 text-gray-400"><i class="fa-solid fa-arrow-left"></i></button>
                                    <div class="relative">
                                        ${activeFriend.id === 'group_public' ? `
                                            <div class="w-9 h-9 rounded-full bg-igBlue/20 flex items-center justify-center border border-igBlue text-igBlue">
                                                <i class="fa-solid fa-earth-americas"></i>
                                            </div>
                                        ` : `
                                            <img src="${activeFriend.avatar}" class="w-9 h-9 rounded-full bg-igGray p-0.5 border border-igBorder">
                                        `}
                                        <span class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-500 rounded-full border-2 border-black"></span>
                                    </div>
                                    <div>
                                        <div class="flex items-center gap-2">
                                            <h3 class="font-bold text-xs text-white cursor-pointer hover:underline" onclick="${activeFriend.id !== 'group_public' ? `viewUserProfil('${activeFriend.id}')` : ''}">${activeFriend.fullName}</h3>
                                            ${activeFriend.id !== 'group_public' ? `
                                                <button onclick="toggleFollowUser('${activeFriend.id}')" class="text-[9px] font-bold px-2 py-0.5 rounded-md ${isFollowingTarget(currentUser.id, activeFriend.id) ? 'bg-igBorder text-gray-300' : 'bg-igBlue text-white'}">
                                                    ${isFollowingTarget(currentUser.id, activeFriend.id) ? 'Diikuti' : 'Ikuti'}
                                                </button>
                                            ` : chatStatusHeaderHtml}
                                        </div>
                                        <p class="text-[10px] text-gray-500">@${activeFriend.username}</p>
                                    </div>
                                </div>
                            </div>

                            <div id="chat-messages" class="flex-1 p-4 overflow-y-auto flex flex-col gap-3 bg-gradient-to-b from-[#0a0a0a] to-black no-scrollbar">

                            <div class="p-4 border-t border-igBorder bg-black">
                                <div id="reply-container">
                                    ${replyToMsg ? `
                                        <div class="flex items-center justify-between bg-igHover border border-igBorder px-4 py-2 rounded-t-xl text-xs text-gray-300">

                                        </div>

                    </div>
                </div>
            `;
        }

        // --- SISTEM CHAT SELECTION & UTILITIES ---
        window.selectChat = function(friendId) {
            currentChatWithId = friendId;
            replyToMsg = null; 
            renderApp();
            scrollToBottom();
        }

        window.backToChatList = function() {
            currentChatWithId = null;
            replyToMsg = null;
            renderApp();
        }

        window.setReplyTarget = function(sender, text) {
            replyToMsg = { sender, text };
            renderApp();
            const input = document.getElementById('message-input');
            if (input) input.focus();
        }

        window.cancelReply = function() {
            replyToMsg = null;
            renderApp();
        }

        window.scrollToBottom = function() {
            setTimeout(() => {
                const chatContainer = document.getElementById('chat-messages');
                if (chatContainer) {
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }
            }, 50);
        }

        // Fitur Pembersih Obrolan Manual
        window.triggerClearChats = async function() {
            if (!currentChatWithId) return;
            const currentUser = getCurrentUser();
            if (!currentUser) return;

            const activeRoomId = getChatRoomId(currentUser.id, currentChatWithId);
            
            try {
                if (useCloud) {
                    await setDoc(getPublicDataDocRef('chats', activeRoomId), { messages: [] });
                } else {
                    chats[activeRoomId] = [];
                    saveLocalData();
                }

                // Kirim broadcast pembersihan obrolan
                syncChannel.postMessage({
                    type: 'NEW_MESSAGE',
                    data: { roomId: activeRoomId, messages: [] }
                });

                showCustomToast("Seluruh riwayat obrolan telah dibersihkan.");
                renderApp();
            } catch (err) {
                console.error("Gagal membersihkan obrolan:", err);
                showCustomToast("Gagal membersihkan obrolan.");
            }
        }

        window.shareMemoryToChat = async function(memoryId) {
            const m = memories.find(mem => mem.id == memoryId);
            if (!m || !currentChatWithId) return;

            const currentUser = getCurrentUser();
            if (!currentUser) return;
            
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2, '0')}.${now.getMinutes().toString().padStart(2, '0')}`;

            const activeRoomId = getChatRoomId(currentUser.id, currentChatWithId);
            const activeHistory = chats[activeRoomId] || [];
            const updatedHistory = [...activeHistory, {
                sender: currentUser.id,
                text: `Plengeran: *${m.title}* - ${m.description}`,
                time: timeStr,
                isSharedMemory: true,
                memoryImage: m.image
            }];

            try {
                if (useCloud) {
                    await setDoc(getPublicDataDocRef('chats', activeRoomId), { messages: updatedHistory });
                } else {
                    chats[activeRoomId] = updatedHistory;
                    saveLocalData();
                    renderApp();
                }

                // Kirim broadcast pesan momen baru
                syncChannel.postMessage({
                    type: 'NEW_MESSAGE',
                    data: { roomId: activeRoomId, messages: updatedHistory }
                });

                scrollToBottom();
            } catch (err) {
                console.error(err);
            }
        }

        window.sendMessage = async function(event) {
            event.preventDefault();
            const input = document.getElementById('message-input');
            if (!input || input.value.trim() === "" || !currentChatWithId) return;

            const text = input.value;
            input.value = "";

            const currentUser = getCurrentUser();
            if (!currentUser) return;
            
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2, '0')}.${now.getMinutes().toString().padStart(2, '0')}`;

            const activeRoomId = getChatRoomId(currentUser.id, currentChatWithId);
            
            let currentMessages = [];
            if (useCloud) {
                try {
                    const docSnap = await getDoc(getPublicDataDocRef('chats', activeRoomId));
                    if (docSnap.exists()) {
                        currentMessages = docSnap.data().messages || [];
                    }
                } catch (e) {
                    currentMessages = chats[activeRoomId] || [];
                }
            } else {
                currentMessages = chats[activeRoomId] || [];
            }
            
            const updatedHistory = [...currentMessages, {
                sender: currentUser.id,
                text: text,
                time: timeStr,
                replyTo: replyToMsg ? { sender: replyToMsg.sender, text: replyToMsg.text } : null
            }];

            replyToMsg = null; 

            try {
                if (useCloud) {
                    await setDoc(getPublicDataDocRef('chats', activeRoomId), { messages: updatedHistory });
                } else {
                    chats[activeRoomId] = updatedHistory;
                    saveLocalData();
                    renderApp();
                }

                // KIRIM SINKRONISASI REAL-TIME SEKETIKA KE TAB LAINNYA
                syncChannel.postMessage({
                    type: 'NEW_MESSAGE',
                    data: { roomId: activeRoomId, messages: updatedHistory }
                });

                scrollToBottom();
            } catch (err) {
                console.error(err);
            }
        }

        // --- HALAMAN PROFIL AKUN ---

        function renderProfile(targetUserId = null) {
            const currentUser = getCurrentUser();
            if (!currentUser) return "";
            
            let userToShow = currentUser;

            if (targetUserId) {
                userToShow = accounts.find(a => a.id === targetUserId) || currentUser;
            }

            const isOwnProfile = userToShow.id === currentUser.id;
            
            const userMemoriesCount = memories.filter(m => m.userId === userToShow.id).length;

                a.id !== currentUser.id &&

                (a.username.toLowerCase().includes(profileSearchQuery.toLowerCase()) || 
                 a.fullName.toLowerCase().includes(profileSearchQuery.toLowerCase()))

            const recommendationsHtml = otherAccounts.length > 0 ? otherAccounts.map(acc => {

                return `
                    <div class="flex items-center justify-between bg-black/30 p-2.5 rounded-xl border border-igBorder/40">

                            <div class="relative">
                                <img src="${acc.avatar}" class="w-8 h-8 rounded-full bg-igGray">

                            </div>
                            <div class="text-left min-w-0">
                                <div class="flex items-center gap-1">
                                    <p class="font-bold text-xs text-white truncate hover:underline">@${acc.username}</p>
                                    ${friendOnline ? '<span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>' : ''}
                                </div>
                                <p class="text-[9px] text-gray-500 truncate">${acc.fullName}</p>
                            </div>
                        </div>
                        <button onclick="toggleFollowUser('${acc.id}')" class="text-[10px] font-bold px-3 py-1 rounded-md ${isFollowingTarget(currentUser.id, acc.id) ? 'bg-igBorder text-gray-400' : 'bg-igBlue text-white'}">

                    </div>

                            <div class="relative mb-4">
                                <img src="${userToShow.avatar}" class="w-28 h-28 rounded-full bg-black border-4 border-igBorder p-1.5">
                                <span class="absolute bottom-1 right-2 ${isOnline ? 'bg-green-500 animate-pulse' : 'bg-gray-600'} w-5 h-5 rounded-full border-4 border-igGray"></span>
                            </div>

                            <div class="flex items-center gap-1.5 justify-center">
                                <h3 class="font-bold text-lg text-white">${userToShow.fullName}</h3>
                                ${isOnline ? '<span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>' : ''}
                            </div>
                            <p class="text-sm text-igBlue font-semibold mb-1">@${userToShow.username}</p>
                            <p class="text-[10px] text-gray-400 mb-3">${isOnline ? '🟢 Online' : '⚫ Offline'}</p>

                            <div class="flex justify-center gap-6 py-3 border-t border-b border-igBorder w-full mb-4">
                                <div class="text-center flex-1">
                                    <p class="font-bold text-base text-white">${userMemoriesCount}</p>
                                    <p class="text-[10px] text-gray-500 uppercase tracking-wider">Kontribusi Momen</p>
                                </div>
                                <div class="text-center flex-1 border-l border-r border-igBorder">
                                    <p class="font-bold text-base text-white">${getFollowersCount(userToShow.id)}</p>
                                    <p class="text-[10px] text-gray-500 uppercase tracking-wider">Pengikut</p>
                                </div>
                                <div class="text-center flex-1">
                                    <p class="font-bold text-base text-white">${getFollowingCount(userToShow.id)}</p>
                                    <p class="text-[10px] text-gray-500 uppercase tracking-wider">Diikuti</p>
                                </div>
                            </div>

                            <div class="w-full text-left bg-black/40 border border-igBorder/50 p-4 rounded-xl mb-6">
                                <p class="text-xs text-gray-400 font-bold mb-1"><i class="fa-solid fa-feather-pointed"></i> Biografi</p>
                                <p class="text-xs text-gray-300 whitespace-pre-wrap leading-relaxed">${userToShow.bio || 'Tidak ada deskripsi bio.'}</p>
                            </div>

                            <div class="flex gap-2 w-full">
                                ${isOwnProfile ? `
                                    <button onclick="showEditBioModal()" class="w-full bg-black hover:bg-igHover border border-igBorder text-xs font-semibold py-2.5 rounded-lg transition text-white">
                                        <i class="fa-regular fa-pen-to-square mr-1"></i> Edit Profil & Bio Anda
                                    </button>
                                ` : `
                                    <button onclick="toggleFollowUser('${userToShow.id}')" class="flex-1 ${isFollowingTarget(currentUser.id, userToShow.id) ? 'bg-igBorder hover:bg-igHover text-white' : 'bg-igBlue hover:bg-blue-600 text-white'} text-xs font-semibold py-2.5 rounded-lg transition">
                                        <i class="fa-solid ${isFollowingTarget(currentUser.id, userToShow.id) ? 'fa-user-minus' : 'fa-user-plus'} mr-1"></i> 
                                        ${isFollowingTarget(currentUser.id, userToShow.id) ? 'Batal Mengikuti' : 'Ikuti Teman'}
                                    </button>
                                    <button onclick="navigateTo('messages', '${userToShow.id}')" class="flex-1 bg-igGray hover:bg-igHover border border-igBorder text-xs font-semibold py-2.5 rounded-lg transition text-white">
                                        <i class="fa-regular fa-paper-plane mr-1"></i> Kirim Pesan
                                    </button>
                                `}
                            </div>
                        </div>

                        <div class="mt-6 bg-igGray border border-igBorder rounded-2xl p-4">
                            <div class="flex flex-col md:flex-row md:items-center justify-between gap-3 mb-4">
                                <h4 class="font-bold text-xs text-white flex items-center gap-2">
                                    <i class="fa-solid fa-user-group text-igBlue"></i> Temukan Pengguna Lain
                                </h4>
                                <div class="relative w-full md:w-48">
                                    <span class="absolute inset-y-0 left-0 flex items-center pl-2.5 pointer-events-none">
                                        <i class="fa-solid fa-magnifying-glass text-[10px] text-gray-500"></i>
                                    </span>
                                    <input id="profile-search-input" type="text" oninput="handleProfileSearch(this.value)" value="${profileSearchQuery}" placeholder="Cari teman..." class="w-full bg-black border border-igBorder rounded px-7 py-1 text-[11px] text-white outline-none focus:border-igBlue">
                                </div>
                            </div>
                            
                            <div class="flex flex-col gap-3">
                                ${recommendationsHtml}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- MODAL & POPUP DIALOG UTILITY ---

        window.showCustomToast = function(message) {
            const oldToast = document.getElementById('custom-toast');
            if (oldToast) oldToast.remove();

            const toast = document.createElement('div');
            toast.id = 'custom-toast';
            toast.className = 'fixed bottom-20 md:bottom-6 right-6 bg-igBlue text-white text-xs font-semibold px-4 py-3 rounded-lg shadow-lg z-50 transition transform translate-y-10 opacity-0 duration-300';
            toast.innerText = message;

            document.body.appendChild(toast);

            setTimeout(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            }, 50);

            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 3000);
        }

        window.showCustomModal = function(title, contentHtml) {
            const backdrop = document.createElement('div');
            backdrop.id = 'custom-modal';
            backdrop.className = 'fixed inset-0 bg-black bg-opacity-85 flex items-center justify-center p-4 z-50';
            
            backdrop.innerHTML = `
                <div class="bg-igGray border border-igBorder rounded-xl max-w-md w-full p-6 relative">
                    <button onclick="closeCustomModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
                    <h3 class="font-bold text-sm mb-4 text-white">${title}</h3>
                    <div class="text-gray-300 text-xs mb-6">${contentHtml}</div>
                    <div class="flex justify-end">
                        <button onclick="closeCustomModal()" class="bg-igBlue hover:bg-blue-600 text-white font-semibold py-2 px-6 rounded-lg text-xs transition">Tutup</button>
                    </div>
                </div>
            `;
            document.body.appendChild(backdrop);
        }

        window.closeCustomModal = function() {
            const modal = document.getElementById('custom-modal');
            if (modal) modal.remove();
        }

        window.showEditBioModal = function() {
            const currentUser = getCurrentUser();
            if (!currentUser) return;
            showCustomModal("Ubah Informasi Profil", `
                <div class="flex flex-col gap-3">
                    <div>
                        <label class="block text-[11px] text-gray-400 mb-1">Nama Lengkap</label>
                        <input id="edit-fullname" type="text" value="${currentUser.fullName}" class="w-full bg-black border border-igBorder rounded px-3 py-2 text-xs text-white outline-none">
                    </div>
                    <div>
                        <label class="block text-[11px] text-gray-400 mb-1">Ubah Bio & Deskripsi</label>
                        <textarea id="edit-bio" rows="3" class="w-full bg-black border border-igBorder rounded px-3 py-2 text-xs text-white outline-none resize-none">${currentUser.bio}</textarea>
                    </div>
                    <button onclick="saveProfileBio()" class="w-full bg-igBlue hover:bg-blue-600 text-white font-bold py-2 rounded text-xs transition mt-2">Simpan Perubahan</button>
                </div>
            `);
        }

        window.saveProfileBio = async function() {
            const fullName = document.getElementById('edit-fullname').value;
            const bio = document.getElementById('edit-bio').value;
            const currentUser = getCurrentUser();
            if (!currentUser) return;

            try {
                if (useCloud) {
                    const userDocRef = getPublicDataDocRef('accounts', currentUser.id);
                    await updateDoc(userDocRef, {
                        fullName: fullName,
                        bio: bio
                    });
                } else {
                    const idx = accounts.findIndex(a => a.id === currentUser.id);
                    if (idx !== -1) {
                        accounts[idx].fullName = fullName;
                        accounts[idx].bio = bio;
                        saveLocalData();
                    }
                }
                closeCustomModal();
                showCustomToast("Informasi profil berhasil diperbarui!");
                renderApp();
            } catch (err) {
                console.error(err);
                showCustomToast("Gagal memperbarui profil.");
            }
        }

        window.viewUserProfil = function(userId) {
            navigateTo('profile');
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = `
                ${renderNavigation().desktopNav}
                ${renderProfile(userId)}
                ${renderShortcutBar()}
                ${renderNavigation().mobileNav}
            `;
        }

        // --- SCREEN LAYAR MASUK ---

        function renderAuthScreen() {
            return `
                <div class="flex-1 flex flex-col items-center justify-center p-6 h-screen w-full bg-black">
                    <div class="max-w-sm w-full bg-igGray border border-igBorder rounded-2xl p-8 shadow-2xl flex flex-col items-center text-center">
                        <i class="fa-solid fa-calendar-heart text-5xl text-igBlue mb-4"></i>
                        <h1 class="font-bold text-2xl text-white mb-1">PlengerGram</h1>
                        <p class="text-xs text-gray-500 mb-6">Masuk ke Kalender & Timeline Bersama</p>

                        <form onsubmit="handleLogin(event)" class="w-full flex flex-col gap-4 text-left">
                            <div>
                                <label class="block text-[11px] text-gray-400 mb-1 font-semibold">Nama Pengguna (Username)</label>
                                <input id="login-username" type="text" placeholder="Masukkan username" required class="w-full bg-black border border-igBorder rounded px-3 py-2 text-xs text-white outline-none focus:border-gray-500">
                            </div>
                            <div>
                                <label class="block text-[11px] text-gray-400 mb-1 font-semibold">Kata Sandi (Password)</label>
                                <input id="login-password" type="password" placeholder="Masukkan password" required class="w-full bg-black border border-igBorder rounded px-3 py-2 text-xs text-white outline-none focus:border-gray-500">
                            </div>
                            <button type="submit" class="w-full bg-igBlue hover:bg-blue-600 text-white font-bold py-2.5 rounded-lg text-xs transition mt-2">Masuk Akun</button>
                        </form>
                    </div>
                </div>
            `;
        }

        // --- COORDINATOR UTAMA RENDER APLIKASI ---

        function renderApp() {
            const appDiv = document.getElementById('app');

            if (!isUserLoggedIn) {
                appDiv.innerHTML = renderAuthScreen();
                return;
            }

            const { desktopNav, mobileNav } = renderNavigation();

            let pageContent = "";
            switch (activePage) {
                case 'home':
                    pageContent = renderHome();
                    break;
                case 'messages':
                    pageContent = renderMessages();
                    break;
                case 'profile':
                    pageContent = renderProfile();
                    break;
                default:
                    pageContent = renderHome();
            }

            appDiv.innerHTML = `
                ${desktopNav}
                ${pageContent}
                ${renderShortcutBar()}
                ${mobileNav}
            `;
            
            if (activePage === 'messages') {
                scrollToBottom();
            }
        }

        // --- INISIALISASI UTAMA & SINKRONISASI CLOUD ---
        (async function init() {
            if (!useCloud) {
                const localAccounts = JSON.parse(localStorage.getItem('pg_accounts'));
                if (localAccounts && localAccounts.length > 0) {
                    accounts = localAccounts;
                } else {
                    accounts = [...PRESET_ACCOUNTS];
                    saveLocalData();
                }
                
                memories = JSON.parse(localStorage.getItem('pg_memories')) || [];
                chats = JSON.parse(localStorage.getItem('pg_chats')) || {};
                
                const loggedInId = localStorage.getItem('pg_logged_in_id');
                if (loggedInId && accounts.some(acc => acc.id === loggedInId)) {
                    currentUserId = loggedInId;
                    isUserLoggedIn = true;
                    startTrackingActivity();
                }
            } else {
                const loggedInId = localStorage.getItem('pg_logged_in_id');
                if (loggedInId && accounts.some(acc => acc.id === loggedInId)) {
                    currentUserId = loggedInId;
                    isUserLoggedIn = true;
                    startTrackingActivity();
                }
            }

            renderApp();
            
            if (useCloud) {
                await authenticateUser();
                
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        setupDataSync(user);
                    } else {
                        renderApp();
                    }
                });
            }
        })();
    </script>
</body>
</html>
