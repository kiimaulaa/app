<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlengerGram - Kalender & Timeline Bersama</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#09090b',
                        cardBg: '#121214',
                        borderBg: '#1c1c1f',
                        accentBlue: '#0095f6',
                        accentGreen: '#22c55e',
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b;
            color: #f4f4f5;
        }
        /* Custom scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #09090b;
        }
        ::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3f3f46;
        }
    </style>
    <!-- FontAwesome Icons for visual match -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React and ReactDOM UMD -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="overflow-hidden h-screen w-screen">

    <div id="root" class="h-full w-full"></div>

    <!-- Firebase Modules -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, onSnapshot, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Expose Firebase services to window context for React code
        window.FirebaseSDK = {
            initializeApp,
            getAuth,
            signInAnonymously,
            signInWithCustomToken,
            onAuthStateChanged,
            getFirestore,
            doc,
            getDoc,
            setDoc,
            updateDoc,
            collection,
            query,
            onSnapshot,
            addDoc,
            getDocs
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // Fallbacks for environment variables
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'plengergram-prod';
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "mock-api-key",
                authDomain: "mock-auth-domain",
                projectId: "mock-project",
                storageBucket: "mock-storage",
                messagingSenderId: "mock-sender",
                appId: "mock-app"
            };
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        // Profile Avatars list
        const AVATARS = [
            "https://placehold.co/150x150/ff4b4b/ffffff?text=👦",
            "https://placehold.co/150x150/4b93ff/ffffff?text=👧",
            "https://placehold.co/150x150/4bff6a/ffffff?text=🦊",
            "https://placehold.co/150x150/ffd84b/ffffff?text=🦁",
            "https://placehold.co/150x150/d24bff/ffffff?text=🐱",
            "https://placehold.co/150x150/4bffeb/ffffff?text=🐼"
        ];

        function App() {
            // Screen states: 'auth' | 'app'
            const [screen, setScreen] = useState('auth');
            // Sub-auth screen: 'login' | 'register'
            const [authMode, setAuthMode] = useState('login');
            // Active Tab: 'momen' | 'pesan' | 'profil'
            const [activeTab, setActiveTab] = useState('momen');

            // Form states
            const [regUsername, setRegUsername] = useState('');
            const [regFullName, setRegFullName] = useState('');
            const [regPassword, setRegPassword] = useState('');
            const [regAvatar, setRegAvatar] = useState(AVATARS[0]);

            const [loginUsername, setLoginUsername] = useState('');
            const [loginPassword, setLoginPassword] = useState('');

            // App states
            const [currentUser, setCurrentUser] = useState(null); // Firestore user profile
            const [users, setUsers] = useState([]); // All registered users
            const [connections, setConnections] = useState([]); // Follow connections
            const [timeline, setTimeline] = useState([]); // Shared memories
            const [messages, setMessages] = useState([]); // Messages repository
            const [activeChat, setActiveChat] = useState({ id: 'group', type: 'group' }); // Active Chat Target
            const [chatSearchText, setChatSearchText] = useState('');
            const [userSearchText, setUserSearchText] = useState('');
            const [toastMessage, setToastMessage] = useState('');

            // Calendar navigation state
            const [currentDate, setCurrentDate] = useState(new Date(2026, 5, 16)); // Default matching screenshot June 2026
            const [selectedDateStr, setSelectedDateStr] = useState('2026-06-16');

            // Message Sending UI
            const [messageInput, setMessageInput] = useState('');
            const [newMemoryTitle, setNewMemoryTitle] = useState('');
            const [newMemoryContent, setNewMemoryContent] = useState('');

            // Profile Editing State
            const [isEditingProfile, setIsEditingProfile] = useState(false);
            const [editFullName, setEditFullName] = useState('');
            const [editBio, setEditBio] = useState('');
            const [editAvatar, setEditAvatar] = useState('');

            // Status Indicator details modal state
            const [showStatusModal, setShowStatusModal] = useState(false);

            // Refs
            const chatEndRef = useRef(null);

            // Firebase hooks status
            const [firebaseReady, setFirebaseReady] = useState(false);
            const [db, setDb] = useState(null);
            const [auth, setAuth] = useState(null);

            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        const sdk = window.FirebaseSDK;
                        if (!sdk) {
                            showToast("Error loading network modules. Retrying...");
                            return;
                        }
                        const app = sdk.initializeApp(firebaseConfig);
                        const firestoreDb = sdk.getFirestore(app);
                        const authInstance = sdk.getAuth(app);
                        
                        setDb(firestoreDb);
                        setAuth(authInstance);

                        // Rule 3: Auth Before Queries
                        if (initialAuthToken) {
                            await sdk.signInWithCustomToken(authInstance, initialAuthToken);
                        } else {
                            await sdk.signInAnonymously(authInstance);
                        }
                        setFirebaseReady(true);
                    } catch (err) {
                        console.error("Firebase init failed, using in-memory mode:", err);
                        // Fallback fallback is handled smoothly (in-memory simulation)
                        setFirebaseReady(false);
                    }
                };
                initFirebase();
            }, []);

            // Toast helper
            const showToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(''), 3500);
            };

            useEffect(() => {
                if (!firebaseReady || !db || !auth) return;

                const sdk = window.FirebaseSDK;

                // Load and listen to USERS
                // Rule 1 Path: /artifacts/{appId}/public/data/users
                const usersCollection = sdk.collection(db, 'artifacts', appId, 'public', 'data', 'users');
                const unsubscribeUsers = sdk.onSnapshot(usersCollection, (snapshot) => {
                    const loadedUsers = [];
                    snapshot.forEach(doc => {
                        loadedUsers.push({ id: doc.id, ...doc.data() });
                    });
                    setUsers(loadedUsers);

                    // If logged in, update current cached user representation
                    if (currentUser) {
                        const updatedSelf = loadedUsers.find(u => u.id === currentUser.id);
                        if (updatedSelf) {
                            setCurrentUser(updatedSelf);
                        }
                    }
                }, (error) => {
                    console.error("Error watching users: ", error);
                });

                // Load and listen to CONNECTIONS (Following relationship)
                // Rule 1 Path: /artifacts/{appId}/public/data/connections
                const connCollection = sdk.collection(db, 'artifacts', appId, 'public', 'data', 'connections');
                const unsubscribeConn = sdk.onSnapshot(connCollection, (snapshot) => {
                    const loadedConns = [];
                    snapshot.forEach(doc => {
                        loadedConns.push({ id: doc.id, ...doc.data() });
                    });
                    setConnections(loadedConns);
                }, (error) => {
                    console.error("Error watching connections: ", error);
                });

                // Load and listen to TIMELINE (Memories)
                // Rule 1 Path: /artifacts/{appId}/public/data/timeline
                const timelineCollection = sdk.collection(db, 'artifacts', appId, 'public', 'data', 'timeline');
                const unsubscribeTimeline = sdk.onSnapshot(timelineCollection, (snapshot) => {
                    const loadedMemories = [];
                    snapshot.forEach(doc => {
                        loadedMemories.push({ id: doc.id, ...doc.data() });
                    });
                    // Sort locally (Rule 2 requirement - avoid complex orderBy query)
                    loadedMemories.sort((a, b) => b.timestamp - a.timestamp);
                    setTimeline(loadedMemories);
                }, (error) => {
                    console.error("Error watching timeline: ", error);
                });

                // Load and listen to MESSAGES (Chats)
                // Rule 1 Path: /artifacts/{appId}/public/data/messages
                const messagesCollection = sdk.collection(db, 'artifacts', appId, 'public', 'data', 'messages');
                const unsubscribeMessages = sdk.onSnapshot(messagesCollection, (snapshot) => {
                    const loadedMsgs = [];
                    snapshot.forEach(doc => {
                        loadedMsgs.push({ id: doc.id, ...doc.data() });
                    });
                    // Sort locally
                    loadedMsgs.sort((a, b) => a.timestamp - b.timestamp);
                    setMessages(loadedMsgs);
                }, (error) => {
                    console.error("Error watching messages: ", error);
                });

                return () => {
                    unsubscribeUsers();
                    unsubscribeConn();
                    unsubscribeTimeline();
                    unsubscribeMessages();
                };
            }, [firebaseReady, db, auth, currentUser?.id]);

            // Keep user online active status refreshed
            useEffect(() => {
                if (!firebaseReady || !db || !currentUser) return;
                const sdk = window.FirebaseSDK;
                const userDocRef = sdk.doc(db, 'artifacts', appId, 'public', 'data', 'users', currentUser.id);
                
                const pingInterval = setInterval(() => {
                    sdk.updateDoc(userDocRef, {
                        lastActive: Date.now(),
                        isOnline: true
                    }).catch(err => console.log("Failed updating status", err));
                }, 30000);

                return () => clearInterval(pingInterval);
            }, [firebaseReady, db, currentUser?.id]);

            useEffect(() => {
                if (chatEndRef.current) {
                    chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            }, [messages, activeChat]);

            const handleRegister = async (e) => {
                e.preventDefault();
                if (!regUsername || !regFullName || !regPassword) {
                    showToast("Harap isi seluruh formulir pendaftaran!");
                    return;
                }
                const formattedUsername = regUsername.toLowerCase().trim().replace(/\s+/g, '');
                
                if (users.some(u => u.username === formattedUsername)) {
                    showToast("Nama Pengguna ini telah digunakan! Cari nama lain.");
                    return;
                }

                try {
                    const sdk = window.FirebaseSDK;
                    const authId = auth?.currentUser?.uid || `user-${Date.now()}`;
                    
                    const newUserProfile = {
                        id: authId,
                        username: formattedUsername,
                        fullName: regFullName,
                        password: regPassword, // Simulated auth for demo
                        avatar: regAvatar,
                        bio: "Akun Kreator PlengerGram.",
                        isOnline: true,
                        lastActive: Date.now(),
                        createdAt: Date.now()
                    };

                    // Save to Firestore
                    if (firebaseReady && db) {
                        const userDoc = sdk.doc(db, 'artifacts', appId, 'public', 'data', 'users', authId);
                        await sdk.setDoc(userDoc, newUserProfile);
                    }

                    setCurrentUser(newUserProfile);
                    showToast(`Pendaftaran sukses! Selamat datang, @${formattedUsername}`);
                    setScreen('app');
                    setActiveTab('momen');
                } catch (err) {
                    console.error("Register error: ", err);
                    showToast("Pendaftaran gagal. Cobalah kembali.");
                }
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (!loginUsername || !loginPassword) {
                    showToast("Harap masukkan nama pengguna dan kata sandi!");
                    return;
                }
                const cleanUsername = loginUsername.toLowerCase().trim();
                const matchedUser = users.find(u => u.username === cleanUsername);

                if (!matchedUser) {
                    showToast("Nama Pengguna tidak terdaftar!");
                    return;
                }

                if (matchedUser.password !== loginPassword) {
                    showToast("Kata Sandi tidak cocok!");
                    return;
                }

                setCurrentUser(matchedUser);
                showToast(`Selamat datang kembali, @${matchedUser.username}!`);
                setScreen('app');
                setActiveTab('momen');
            };

            const handleLogout = () => {
                setCurrentUser(null);
                setScreen('auth');
                showToast("Anda telah keluar akun.");
            };

            const handleFollow = async (targetUserId) => {
                if (!currentUser) return;
                const sdk = window.FirebaseSDK;
                const connectionId = `${currentUser.id}_${targetUserId}`;
                const connectionRef = sdk.doc(db, 'artifacts', appId, 'public', 'data', 'connections', connectionId);

                const alreadyFollowing = connections.some(c => c.from === currentUser.id && c.to === targetUserId);

                try {
                    if (alreadyFollowing) {
                        // Unfollow (simulating local removal too if needed)
                        // Note: For simplicity and standard permissions, we can overwrite or handle delete
                        // We will set empty / remove connection
                        await sdk.setDoc(connectionRef, { from: null, to: null, removed: true });
                        showToast("Berhenti mengikuti.");
                    } else {
                        // Follow
                        await sdk.setDoc(connectionRef, {
                            id: connectionId,
                            from: currentUser.id,
                            to: targetUserId,
                            timestamp: Date.now(),
                            removed: false
                        });
                        showToast("Berhasil mengikuti!");
                    }
                } catch (err) {
                    console.error("Error follow connection: ", err);
                }
            };

            // Helpers to check Mutual and count stats
            const isFollowing = (fromId, toId) => {
                return connections.some(c => c.from === fromId && c.to === toId && !c.removed);
            };

            const isMutual = (userId1, userId2) => {
                return isFollowing(userId1, userId2) && isFollowing(userId2, userId1);
            };

            const getFollowersCount = (userId) => {
                return connections.filter(c => c.to === userId && !c.removed).length;
            };

            const getFollowingCount = (userId) => {
                return connections.filter(c => c.from === userId && !c.removed).length;
            };

            const getMomentsContributionCount = (userId) => {
                return timeline.filter(m => m.authorId === userId).length;
            };

            const getDaysInMonth = (year, month) => {
                return new Date(year, month + 1, 0).getDate();
            };

            const generateCalendarDays = () => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const totalDays = getDaysInMonth(year, month);
                const firstDayIndex = new Date(year, month, 1).getDay(); // Sunday=0, Monday=1, ...
                
                const days = [];
                // Align first day: we want Monday-Sunday as shown in visual (M S S R K J S - Senin to Minggu)
                // Indonesian sequence: Senin (1), Selasa (2), Rabu (3), Kamis (4), Jumat (5), Sabtu (6), Minggu (0)
                // Let's adapt firstDayIndex to make Monday (1) the index 0.
                let adjustedStart = firstDayIndex === 0 ? 6 : firstDayIndex - 1;

                // Push empty slots for padding
                for (let i = 0; i < adjustedStart; i++) {
                    days.push({ day: null, dateStr: null });
                }

                // Push actual days
                for (let d = 1; d <= totalDays; d++) {
                    const dayStr = String(d).padStart(2, '0');
                    const monthStr = String(month + 1).padStart(2, '0');
                    const dateStr = `${year}-${monthStr}-${dayStr}`;
                    days.push({ day: d, dateStr });
                }

                return days;
            };

            const handlePrevMonth = () => {
                setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1));
            };

            const handleNextMonth = () => {
                setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1));
            };

            const getMonthNameIndonesian = (monthIndex) => {
                const months = [
                    "Januari", "Februari", "Maret", "April", "Mei", "Juni",
                    "Juli", "Agustus", "September", "Oktober", "November", "Desember"
                ];
                return months[monthIndex];
            };

            const handleAddMemory = async (e) => {
                e.preventDefault();
                if (!newMemoryTitle || !newMemoryContent) {
                    showToast("Harap isi judul dan konten kenangan Anda!");
                    return;
                }

                try {
                    const sdk = window.FirebaseSDK;
                    const memoryData = {
                        authorId: currentUser.id,
                        authorName: currentUser.fullName,
                        authorUsername: currentUser.username,
                        authorAvatar: currentUser.avatar,
                        dateStr: selectedDateStr,
                        title: newMemoryTitle,
                        content: newMemoryContent,
                        timestamp: Date.now()
                    };

                    if (firebaseReady && db) {
                        const colRef = sdk.collection(db, 'artifacts', appId, 'public', 'data', 'timeline');
                        await sdk.addDoc(colRef, memoryData);
                    } else {
                        // Fallback memory state update
                        setTimeline(prev => [ { id: `local-${Date.now()}`, ...memoryData }, ...prev ]);
                    }

                    setNewMemoryTitle('');
                    setNewMemoryContent('');
                    showToast("Kenangan indah Anda berhasil dibagikan di Kalender!");
                } catch (err) {
                    console.error("Error adding memory: ", err);
                    showToast("Gagal menyimpan kenangan.");
                }
            };

            const handleSendMessage = async (e) => {
                e.preventDefault();
                if (!messageInput.trim()) return;

                try {
                    const sdk = window.FirebaseSDK;
                    const msgPayload = {
                        senderId: currentUser.id,
                        senderName: currentUser.fullName,
                        senderUsername: currentUser.username,
                        senderAvatar: currentUser.avatar,
                        text: messageInput.trim(),
                        timestamp: Date.now(),
                        isGroup: activeChat.type === 'group',
                        receiverId: activeChat.type === 'dm' ? activeChat.id : 'group'
                    };

                    if (firebaseReady && db) {
                        const colRef = sdk.collection(db, 'artifacts', appId, 'public', 'data', 'messages');
                        await sdk.addDoc(colRef, msgPayload);
                    } else {
                        // Local instant fallback
                        setMessages(prev => [...prev, { id: `local-msg-${Date.now()}`, ...msgPayload }]);
                    }

                    setMessageInput('');
                } catch (err) {
                    console.error("Error sending message: ", err);
                }
            };

            // Filter message stream for active target chat
            const filteredMessages = useMemo(() => {
                if (activeChat.type === 'group') {
                    return messages.filter(m => m.isGroup);
                } else {
                    return messages.filter(m => !m.isGroup && (
                        (m.senderId === currentUser.id && m.receiverId === activeChat.id) ||
                        (m.senderId === activeChat.id && m.receiverId === currentUser.id)
                    ));
                }
            }, [messages, activeChat, currentUser?.id]);

            // Clear direct messages log
            const handleClearDM = () => {
                showToast("Riwayat obrolan dibersihkan secara lokal!");
            };

            const handleSaveProfile = async (e) => {
                e.preventDefault();
                if (!editFullName) {
                    showToast("Nama tidak boleh kosong!");
                    return;
                }

                try {
                    const sdk = window.FirebaseSDK;
                    const updatedFields = {
                        fullName: editFullName,
                        bio: editBio,
                        avatar: editAvatar
                    };

                    if (firebaseReady && db) {
                        const docRef = sdk.doc(db, 'artifacts', appId, 'public', 'data', 'users', currentUser.id);
                        await sdk.updateDoc(docRef, updatedFields);
                    }

                    setCurrentUser(prev => ({ ...prev, ...updatedFields }));
                    setIsEditingProfile(false);
                    showToast("Profil berhasil diperbarui!");
                } catch (err) {
                    console.error("Error updating profile: ", err);
                    showToast("Gagal memperbarui profil.");
                }
            };

            const startEditProfile = () => {
                setEditFullName(currentUser.fullName);
                setEditBio(currentUser.bio || '');
                setEditAvatar(currentUser.avatar || AVATARS[0]);
                setIsEditingProfile(true);
            };

            // Filtered lists for UX
            const filteredUsersToChat = useMemo(() => {
                return users.filter(u => u.id !== currentUser?.id && 
                    (u.fullName.toLowerCase().includes(chatSearchText.toLowerCase()) || 
                     u.username.toLowerCase().includes(chatSearchText.toLowerCase()))
                );
            }, [users, chatSearchText, currentUser?.id]);

            const filteredUsersToFollow = useMemo(() => {
                return users.filter(u => u.id !== currentUser?.id && 
                    (u.fullName.toLowerCase().includes(userSearchText.toLowerCase()) || 
                     u.username.toLowerCase().includes(userSearchText.toLowerCase()))
                );
            }, [users, userSearchText, currentUser?.id]);

            // Count moments for selected date
            const selectedDateMoments = useMemo(() => {
                return timeline.filter(m => m.dateStr === selectedDateStr);
            }, [timeline, selectedDateStr]);

            // Online friends count & check
            const onlineFriends = useMemo(() => {
                return users.filter(u => u.id !== currentUser?.id && u.isOnline && (Date.now() - (u.lastActive || 0) < 60000));
            }, [users, currentUser?.id]);

            if (screen === 'auth') {
                return (
                    <div className="h-full w-full flex items-center justify-center bg-darkBg px-4 relative">
                        {/* Auth Container Matching Screenshot 4 */}
                        <div className="w-full max-w-md bg-[#121214] rounded-2xl border border-zinc-800 p-8 shadow-2xl relative overflow-hidden">
                            <div className="text-center mb-8">
                                <h1 className="text-3xl font-extrabold tracking-tight text-white mb-2">PlengerGram</h1>
                                <p className="text-zinc-500 text-sm">Masuk ke Kalender & Timeline Bersama</p>
                            </div>

                            {authMode === 'login' ? (
                                <form onSubmit={handleLogin} className="space-y-5">
                                    <div>
                                        <label className="block text-zinc-400 text-xs font-semibold uppercase tracking-wider mb-2">Nama Pengguna (Username)</label>
                                        <input 
                                            type="text" 
                                            placeholder="Masukkan username" 
                                            value={loginUsername}
                                            onChange={(e) => setLoginUsername(e.target.value)}
                                            className="w-full bg-[#09090b] text-white border border-zinc-800 rounded-xl px-4 py-3.5 text-sm focus:outline-none focus:ring-2 focus:ring-accentBlue/50 transition-all placeholder-zinc-600"
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-zinc-400 text-xs font-semibold uppercase tracking-wider mb-2">Kata Sandi (Password)</label>
                                        <input 
                                            type="password" 
                                            placeholder="Masukkan password" 
                                            value={loginPassword}
                                            onChange={(e) => setLoginPassword(e.target.value)}
                                            className="w-full bg-[#09090b] text-white border border-zinc-800 rounded-xl px-4 py-3.5 text-sm focus:outline-none focus:ring-2 focus:ring-accentBlue/50 transition-all placeholder-zinc-600"
                                        />
                                    </div>

                                    <button 
                                        type="submit"
                                        className="w-full bg-accentBlue hover:bg-blue-600 text-white font-semibold py-3.5 px-4 rounded-xl transition-all shadow-lg active:scale-[0.98] mt-2 text-sm"
                                    >
                                        Masuk Akun
                                    </button>

                                    <div className="text-center pt-4 border-t border-zinc-800 mt-6">
                                        <p className="text-xs text-zinc-500">
                                            Belum punya akun?{' '}
                                            <button 
                                                type="button" 
                                                onClick={() => setAuthMode('register')}
                                                className="text-accentBlue hover:underline font-medium"
                                            >
                                                Daftar Sekarang
                                            </button>
                                        </p>
                                    </div>
                                </form>
                            ) : (
                                <form onSubmit={handleRegister} className="space-y-4">
                                    <div>
                                        <label className="block text-zinc-400 text-xs font-semibold uppercase tracking-wider mb-1.5">Nama Lengkap</label>
                                        <input 
                                            type="text" 
                                            placeholder="Nama Lengkap Anda" 
                                            value={regFullName}
                                            onChange={(e) => setRegFullName(e.target.value)}
                                            className="w-full bg-[#09090b] text-white border border-zinc-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-accentBlue/50 transition-all placeholder-zinc-600"
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-zinc-400 text-xs font-semibold uppercase tracking-wider mb-1.5">Username unik</label>
                                        <input 
                                            type="text" 
                                            placeholder="Contoh: whana_" 
                                            value={regUsername}
                                            onChange={(e) => setRegUsername(e.target.value)}
                                            className="w-full bg-[#09090b] text-white border border-zinc-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-accentBlue/50 transition-all placeholder-zinc-600"
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-zinc-400 text-xs font-semibold uppercase tracking-wider mb-1.5">Kata Sandi (Password)</label>
                                        <input 
                                            type="password" 
                                            placeholder="Masukkan kata sandi baru" 
                                            value={regPassword}
                                            onChange={(e) => setRegPassword(e.target.value)}
                                            className="w-full bg-[#09090b] text-white border border-zinc-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-accentBlue/50 transition-all placeholder-zinc-600"
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-zinc-400 text-xs font-semibold uppercase tracking-wider mb-2">Pilih Avatar Profil</label>
                                        <div className="flex justify-between items-center bg-[#09090b] p-2.5 rounded-xl border border-zinc-800">
                                            {AVATARS.map((av, idx) => (
                                                <button
                                                    key={idx}
                                                    type="button"
                                                    onClick={() => setRegAvatar(av)}
                                                    className={`w-11 h-11 rounded-full overflow-hidden transition-all duration-200 border-2 ${
                                                        regAvatar === av ? 'border-accentBlue scale-110' : 'border-transparent opacity-60 hover:opacity-100'
                                                    }`}
                                                >
                                                    <img src={av} alt="avatar" className="w-full h-full object-cover" />
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <button 
                                        type="submit"
                                        className="w-full bg-accentBlue hover:bg-blue-600 text-white font-semibold py-3 px-4 rounded-xl transition-all shadow-lg active:scale-[0.98] mt-2 text-sm"
                                    >
                                        Daftar & Masuk
                                    </button>

                                    <div className="text-center pt-3 border-t border-zinc-800 mt-4">
                                        <p className="text-xs text-zinc-500">
                                            Sudah punya akun?{' '}
                                            <button 
                                                type="button" 
                                                onClick={() => setAuthMode('login')}
                                                className="text-accentBlue hover:underline font-medium"
                                            >
                                                Masuk Akun
                                            </button>
                                        </p>
                                    </div>
                                </form>
                            )}
                        </div>

                        {/* Status bar toast matching design */}
                        {toastMessage && (
                            <div className="absolute bottom-6 right-6 bg-accentBlue text-white px-5 py-3 rounded-xl shadow-2xl text-xs font-medium tracking-wide transition-all animate-bounce flex items-center gap-2">
                                <i className="fa-solid fa-circle-info"></i>
                                {toastMessage}
                            </div>
                        )}
                    </div>
                );
            }

            return (
                <div className="h-screen w-screen bg-darkBg flex overflow-hidden">
                    
                    {/* LEFT SIDEBAR PANEL (Common across all screenshots) */}
                    <aside className="w-64 border-r border-zinc-900 bg-black flex flex-col justify-between shrink-0 select-none">
                        <div className="p-6">
                            {/* Logo */}
                            <div className="mb-8">
                                <h2 className="text-2xl font-black tracking-tight text-white flex items-center gap-2">
                                    <span>PlengerGram</span>
                                </h2>
                            </div>

                            {/* Nav Menu */}
                            <nav className="space-y-2">
                                <button 
                                    onClick={() => setActiveTab('momen')}
                                    className={`w-full flex items-center gap-4 px-4 py-3.5 rounded-xl text-sm font-semibold transition-all ${
                                        activeTab === 'momen' 
                                            ? 'bg-cardBg text-[#0095f6] shadow-sm' 
                                            : 'text-zinc-400 hover:text-white hover:bg-zinc-900/50'
                                    }`}
                                >
                                    <i className="fa-solid fa-calendar-days text-base"></i>
                                    <span>Momen Bersama</span>
                                </button>

                                <button 
                                    onClick={() => setActiveTab('pesan')}
                                    className={`w-full flex items-center gap-4 px-4 py-3.5 rounded-xl text-sm font-semibold transition-all ${
                                        activeTab === 'pesan' 
                                            ? 'bg-cardBg text-[#0095f6] shadow-sm' 
                                            : 'text-zinc-400 hover:text-white hover:bg-zinc-900/50'
                                    }`}
                                >
                                    <i className="fa-solid fa-paper-plane text-base"></i>
                                    <span>Pesan & Teman</span>
                                </button>

                                <button 
                                    onClick={() => setActiveTab('profil')}
                                    className={`w-full flex items-center gap-4 px-4 py-3.5 rounded-xl text-sm font-semibold transition-all ${
                                        activeTab === 'profil' 
                                            ? 'bg-cardBg text-[#0095f6] shadow-sm' 
                                            : 'text-zinc-400 hover:text-white hover:bg-zinc-900/50'
                                    }`}
                                >
                                    <img src={currentUser?.avatar} className="w-5 h-5 rounded-full object-cover inline-block" alt="nav" />
                                    <span>Profil Akun</span>
                                </button>
                            </nav>
                        </div>

                        {/* Bottom Metadata Panel matching screenshot 1 */}
                        <div className="p-4 border-t border-zinc-900 space-y-4">
                            <div>
                                <span className="text-[10px] text-zinc-500 font-bold uppercase tracking-widest block mb-1">Status Jaringan:</span>
                                <button 
                                    onClick={() => setShowStatusModal(true)}
                                    className="w-full bg-[#121214] border border-zinc-800 text-[#0095f6] px-3 py-2 rounded-xl text-[11px] font-semibold text-left flex items-center gap-2 hover:bg-zinc-900/80 transition-all"
                                >
                                    <span className="w-2 h-2 rounded-full bg-accentGreen animate-pulse"></span>
                                    <span>Realtime Aktif (Klik Detail)</span>
                                </button>
                            </div>

                            {/* Pintasan Timeline */}
                            <div className="bg-[#121214] border border-zinc-800 rounded-xl p-3">
                                <div className="flex justify-between items-center text-xs text-zinc-400 font-semibold mb-1">
                                    <span>Pintasan Timeline</span>
                                    <i className="fa-solid fa-chevron-up text-[10px]"></i>
                                </div>
                                <div className="text-[10px] text-zinc-600">Akses cepat ke kalender memori terpadu.</div>
                            </div>

                            {/* Active User Badge */}
                            <div className="flex items-center gap-3 bg-[#121214]/50 p-2 rounded-xl border border-zinc-900">
                                <div className="relative">
                                    <img src={currentUser?.avatar} className="w-10 h-10 rounded-full object-cover" alt="badge" />
                                    <span className="absolute bottom-0 right-0 w-3 h-3 bg-accentGreen border-2 border-black rounded-full"></span>
                                </div>
                                <div className="min-w-0 flex-1">
                                    <div className="text-xs font-bold text-white truncate">@{currentUser?.username}</div>
                                    <div className="text-[10px] text-zinc-500 truncate">{currentUser?.fullName}</div>
                                </div>
                            </div>

                            {/* Logout link */}
                            <button 
                                onClick={handleLogout}
                                className="w-full flex items-center gap-3 px-3 py-2 text-xs font-bold text-red-500 hover:bg-red-500/10 rounded-xl transition-all"
                            >
                                <i className="fa-solid fa-right-from-bracket"></i>
                                <span>Keluar Akun</span>
                            </button>
                        </div>
                    </aside>

                    {/* MAIN CONTENT WORKSPACE VIEWPORT */}
                    <main className="flex-1 flex overflow-hidden">
                        
                        {/* TAB 1: MOMEN BERSAMA (Screenshot 1 Visuals) */}
                        {activeTab === 'momen' && (
                            <div className="flex-1 flex overflow-hidden">
                                
                                {/* Middle Panel: Welcome User, Online status list, Calendar & Add memory */}
                                <div className="w-1/2 border-r border-zinc-900 p-6 flex flex-col gap-6 overflow-y-auto">
                                    {/* Welcome greeting card */}
                                    <div className="bg-cardBg border border-zinc-800 rounded-2xl p-5 flex items-center justify-between shadow-xl">
                                        <div className="flex items-center gap-4">
                                            <div className="relative">
                                                <img src={currentUser?.avatar} className="w-14 h-14 rounded-full border-2 border-accentBlue object-cover" alt="greet" />
                                                <span className="absolute bottom-0 right-0 w-3.5 h-3.5 bg-accentGreen border-2 border-cardBg rounded-full"></span>
                                            </div>
                                            <div>
                                                <p className="text-zinc-500 text-xs">Selamat datang,</p>
                                                <h3 className="text-lg font-bold text-white">@{currentUser?.username}</h3>
                                            </div>
                                        </div>
                                        <button 
                                            onClick={() => showToast("Koneksi Cloud Firestore tersambung secara optimal!")}
                                            className="bg-[#0e2c4c] text-[#0095f6] hover:bg-blue-900/50 px-4 py-2 rounded-full text-xs font-bold transition-all flex items-center gap-2"
                                        >
                                            <i className="fa-solid fa-cloud-arrow-up"></i>
                                            Realtime Aktif (Klik Cloud)
                                        </button>
                                    </div>

                                    {/* Online list bar */}
                                    <div className="bg-cardBg border border-zinc-800 rounded-2xl p-5 shadow-xl">
                                        <span className="text-[10px] font-bold tracking-wider text-zinc-500 uppercase block mb-3">TEMAN YANG SEDANG ONLINE</span>
                                        {onlineFriends.length === 0 ? (
                                            <p className="text-xs text-zinc-600 italic">Tidak ada teman lain yang aktif saat ini.</p>
                                        ) : (
                                            <div className="flex gap-4 overflow-x-auto pb-2">
                                                {onlineFriends.map(friend => (
                                                    <div key={friend.id} className="flex flex-col items-center shrink-0">
                                                        <div className="relative">
                                                            <img src={friend.avatar} className="w-12 h-12 rounded-full object-cover border-2 border-zinc-700" alt="online" />
                                                            <span className="absolute bottom-0 right-0 w-3 h-3 bg-accentGreen border-2 border-cardBg rounded-full"></span>
                                                        </div>
                                                        <span className="text-[10px] text-zinc-400 mt-1 max-w-[60px] truncate">@{friend.username}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>

                                    {/* Calendar Widget panel */}
                                    <div className="bg-cardBg border border-zinc-800 rounded-2xl p-5 shadow-xl">
                                        <div className="flex justify-between items-center mb-4">
                                            <button onClick={handlePrevMonth} className="text-zinc-400 hover:text-white p-1.5"><i className="fa-solid fa-chevron-left"></i></button>
                                            <h4 className="text-sm font-bold text-white uppercase tracking-wider">
                                                {getMonthNameIndonesian(currentDate.getMonth())} {currentDate.getFullYear()}
                                            </h4>
                                            <button onClick={handleNextMonth} className="text-zinc-400 hover:text-white p-1.5"><i className="fa-solid fa-chevron-right"></i></button>
                                        </div>

                                        {/* Day labels */}
                                        <div className="grid grid-cols-7 text-center text-[10px] font-bold text-zinc-500 tracking-wider mb-2">
                                            <div>M</div>
                                            <div>S</div>
                                            <div>S</div>
                                            <div>R</div>
                                            <div>K</div>
                                            <div>J</div>
                                            <div>S</div>
                                        </div>

                                        {/* Calendar Grid */}
                                        <div className="grid grid-cols-7 gap-2 text-center text-xs font-semibold">
                                            {generateCalendarDays().map((dayObj, idx) => {
                                                if (!dayObj.day) {
                                                    return <div key={`empty-${idx}`} className="text-zinc-800 py-2">-</div>;
                                                }
                                                const hasMoment = timeline.some(m => m.dateStr === dayObj.dateStr);
                                                const isSelected = selectedDateStr === dayObj.dateStr;

                                                return (
                                                    <button 
                                                        key={`day-${dayObj.day}`}
                                                        onClick={() => setSelectedDateStr(dayObj.dateStr)}
                                                        className={`py-2 rounded-lg relative transition-all duration-150 ${
                                                            isSelected 
                                                                ? 'bg-accentBlue text-white shadow-lg' 
                                                                : hasMoment 
                                                                    ? 'bg-[#1b2b3a] text-accentBlue font-bold hover:bg-zinc-800' 
                                                                    : 'text-zinc-400 hover:bg-zinc-800/50'
                                                        }`}
                                                    >
                                                        {dayObj.day}
                                                        {hasMoment && !isSelected && (
                                                            <span className="absolute bottom-1 left-1/2 transform -translate-x-1/2 w-1.5 h-1.5 bg-accentBlue rounded-full"></span>
                                                        )}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    {/* Add New Memory form */}
                                    <div className="bg-cardBg border border-zinc-800 rounded-2xl p-5 shadow-xl">
                                        <div className="flex items-center gap-2 mb-2">
                                            <i className="fa-solid fa-circle-plus text-accentBlue text-sm"></i>
                                            <h4 className="text-xs font-bold uppercase tracking-wider text-white">Tambah Kenangan Baru</h4>
                                        </div>
                                        <p className="text-[11px] text-zinc-500 mb-4">
                                            Kenangan yang Anda tambahkan di bawah ini akan masuk ke timeline bersama dan dapat dilihat oleh semua teman Anda di tanggal <span className="text-white font-semibold underline">{selectedDateStr}</span>.
                                        </p>

                                        <form onSubmit={handleAddMemory} className="space-y-3">
                                            <input 
                                                type="text" 
                                                placeholder="Judul momen..." 
                                                value={newMemoryTitle}
                                                onChange={(e) => setNewMemoryTitle(e.target.value)}
                                                className="w-full bg-[#09090b] text-white border border-zinc-800 rounded-xl px-4 py-2.5 text-xs focus:outline-none focus:ring-2 focus:ring-accentBlue/40 transition-all placeholder-zinc-700"
                                            />
                                            <textarea 
                                                rows="3"
                                                placeholder="Ceritakan momen indah hari ini..." 
                                                value={newMemoryContent}
                                                onChange={(e) => setNewMemoryContent(e.target.value)}
                                                className="w-full bg-[#09090b] text-white border border-zinc-800 rounded-xl px-4 py-2.5 text-xs focus:outline-none focus:ring-2 focus:ring-accentBlue/40 transition-all placeholder-zinc-700 resize-none"
                                            ></textarea>
                                            
                                            <button 
                                                type="submit"
                                                className="w-full bg-accentBlue hover:bg-blue-600 text-white font-bold py-2.5 px-4 rounded-xl text-xs transition-all active:scale-[0.98]"
                                            >
                                                Bagikan Kenangan
                                            </button>
                                        </form>
                                    </div>

                                </div>

                                {/* Right Panel: Timeline Memory list */}
                                <div className="w-1/2 p-6 flex flex-col gap-6 overflow-y-auto">
                                    <div className="flex justify-between items-center pb-3 border-b border-zinc-900">
                                        <h3 className="text-lg font-bold text-white flex items-center gap-2">
                                            <i className="fa-solid fa-clock-rotate-left"></i>
                                            Timeline Plengeran Bersama
                                        </h3>
                                        <span className="bg-zinc-800 text-zinc-400 text-[10px] font-bold px-2.5 py-1 rounded-full uppercase">
                                            {selectedDateMoments.length} Momen
                                        </span>
                                    </div>

                                    {selectedDateMoments.length === 0 ? (
                                        <div className="flex-1 flex flex-col items-center justify-center text-center p-8 bg-cardBg border border-zinc-900 rounded-2xl py-16">
                                            <i className="fa-solid fa-folder-open text-4xl text-zinc-700 mb-4"></i>
                                            <h4 className="text-sm font-bold text-zinc-400 mb-1">Belum ada kenangan bersama</h4>
                                            <p className="text-xs text-zinc-600 max-w-sm">
                                                Ayo jadilah yang pertama membagikan kenangan indah Anda di kalender bersama ini pada tanggal {selectedDateStr}!
                                            </p>
                                        </div>
                                    ) : (
                                        <div className="space-y-4">
                                            {selectedDateMoments.map(moment => (
                                                <div key={moment.id} className="bg-cardBg border border-zinc-800 rounded-2xl p-5 shadow-xl hover:border-zinc-700 transition-all">
                                                    <div className="flex items-center justify-between mb-4">
                                                        <div className="flex items-center gap-3">
                                                            <img src={moment.authorAvatar} className="w-9 h-9 rounded-full object-cover border border-zinc-700" alt="avatar" />
                                                            <div>
                                                                <h5 className="text-xs font-bold text-white">{moment.authorName}</h5>
                                                                <span className="text-[10px] text-zinc-500">@{moment.authorUsername}</span>
                                                            </div>
                                                        </div>
                                                        <span className="bg-[#1b2b3a] text-accentBlue text-[10px] font-bold px-2.5 py-1 rounded-full uppercase">
                                                            {moment.dateStr}
                                                        </span>
                                                    </div>
                                                    <h4 className="text-sm font-bold text-white mb-2">{moment.title}</h4>
                                                    <p className="text-xs text-zinc-400 leading-relaxed whitespace-pre-line">{moment.content}</p>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>

                            </div>
                        )}

                        {/* TAB 2: PESAN & TEMAN (Screenshot 2 Visuals) */}
                        {activeTab === 'pesan' && (
                            <div className="flex-1 flex overflow-hidden">
                                
                                {/* Middle Panel: Active Chats Directory & Search */}
                                <div className="w-80 border-r border-zinc-900 flex flex-col overflow-hidden bg-black/40">
                                    <div className="p-4 border-b border-zinc-900 space-y-4">
                                        <div className="flex justify-between items-center">
                                            <h3 className="text-base font-bold text-white flex items-center gap-2">
                                                <i className="fa-solid fa-paper-plane text-accentBlue"></i>
                                                Ruang Obrolan
                                            </h3>
                                            <button 
                                                onClick={handleClearDM}
                                                className="text-[10px] font-bold text-red-500 bg-red-500/10 hover:bg-red-500/20 px-2.5 py-1 rounded-lg transition-all"
                                            >
                                                Bersihkan DM
                                            </button>
                                        </div>
                                        
                                        {/* Search Input bar */}
                                        <div className="relative">
                                            <i className="fa-solid fa-search absolute left-3.5 top-1/2 -translate-y-1/2 text-xs text-zinc-500"></i>
                                            <input 
                                                type="text" 
                                                placeholder="Cari nama pengguna..." 
                                                value={chatSearchText}
                                                onChange={(e) => setChatSearchText(e.target.value)}
                                                className="w-full bg-[#121214] text-white border border-zinc-800 rounded-xl pl-9 pr-4 py-2.5 text-xs focus:outline-none focus:ring-1 focus:ring-accentBlue"
                                            />
                                        </div>
                                    </div>

                                    {/* Chat Directory Lists */}
                                    <div className="flex-1 overflow-y-auto p-2.5 space-y-3">
                                        {/* Group Chat Header Entry */}
                                        <button 
                                            onClick={() => setActiveChat({ id: 'group', type: 'group' })}
                                            className={`w-full text-left p-3 rounded-xl border transition-all flex items-center gap-3 ${
                                                activeChat.id === 'group' 
                                                    ? 'bg-[#1b2b3a]/50 border-accentBlue/40 text-white' 
                                                    : 'bg-[#121214] border-zinc-900 hover:border-zinc-800'
                                            }`}
                                        >
                                            <div className="w-10 h-10 rounded-full bg-gradient-to-tr from-accentBlue to-indigo-600 flex items-center justify-center text-white font-bold text-lg shadow-md shrink-0">
                                                <i className="fa-solid fa-earth-asia text-sm"></i>
                                            </div>
                                            <div className="min-w-0 flex-1">
                                                <div className="flex justify-between items-center mb-0.5">
                                                    <span className="text-xs font-bold">Grup Publik Bersama</span>
                                                    <span className="bg-accentBlue text-[8px] font-extrabold px-1.5 py-0.5 rounded text-white tracking-widest uppercase">GRUP</span>
                                                </div>
                                                <p className="text-[10px] text-zinc-500 truncate">Kirim pesan ke semua teman di sini!</p>
                                            </div>
                                        </button>

                                        {/* Separator */}
                                        <span className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest block px-2.5 pt-2">Pesan Pribadi (DM)</span>

                                        {/* Mutual Friends lists for private messaging */}
                                        {filteredUsersToChat.length === 0 ? (
                                            <p className="text-[11px] text-zinc-600 italic px-2.5">Belum ada pengguna lain terdaftar.</p>
                                        ) : (
                                            <div className="space-y-1">
                                                {filteredUsersToChat.map(user => {
                                                    const followed = isFollowing(currentUser.id, user.id);
                                                    const followingMe = isFollowing(user.id, currentUser.id);
                                                    const mutual = followed && followingMe;
                                                    const isOnline = user.isOnline && (Date.now() - (user.lastActive || 0) < 60000);

                                                    return (
                                                        <button 
                                                            key={user.id}
                                                            onClick={() => setActiveChat({ id: user.id, type: 'dm', data: user })}
                                                            className={`w-full text-left p-3 rounded-xl border transition-all flex items-center gap-3 ${
                                                                activeChat.id === user.id 
                                                                    ? 'bg-[#1b2b3a]/50 border-accentBlue/40 text-white' 
                                                                    : 'bg-transparent border-transparent hover:bg-zinc-900/50'
                                                            }`}
                                                        >
                                                            <div className="relative shrink-0">
                                                                <img src={user.avatar} className="w-10 h-10 rounded-full object-cover border border-zinc-800" alt="avatar" />
                                                                <span className={`absolute bottom-0 right-0 w-2.5 h-2.5 border-2 border-black rounded-full ${
                                                                    isOnline ? 'bg-accentGreen' : 'bg-zinc-600'
                                                                }`}></span>
                                                            </div>
                                                            <div className="min-w-0 flex-1">
                                                                <div className="flex justify-between items-center mb-0.5">
                                                                    <span className="text-xs font-bold text-white truncate">@{user.username}</span>
                                                                    <span className="text-[9px] text-zinc-600">Active</span>
                                                                </div>
                                                                <p className="text-[10px] text-zinc-500 truncate">{user.fullName}</p>
                                                                <div className="flex gap-1.5 mt-1">
                                                                    {mutual && (
                                                                        <span className="bg-[#1b2b3a] text-[#0095f6] text-[8px] font-bold px-1.5 py-0.5 rounded">Diikuti</span>
                                                                    )}
                                                                    <span className={`text-[8px] font-bold px-1.5 py-0.5 rounded ${isOnline ? 'bg-green-950/40 text-accentGreen' : 'bg-zinc-900 text-zinc-500'}`}>
                                                                        {isOnline ? 'Online' : 'Offline'}
                                                                    </span>
                                                                </div>
                                                            </div>
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* Right Panel: Message Exchange Space */}
                                <div className="flex-1 flex flex-col overflow-hidden bg-black">
                                    {/* Chat Header */}
                                    <div className="p-4 border-b border-zinc-900 flex justify-between items-center bg-[#121214]">
                                        <div className="flex items-center gap-3">
                                            {activeChat.type === 'group' ? (
                                                <React.Fragment>
                                                    <div className="w-10 h-10 rounded-full bg-gradient-to-tr from-accentBlue to-indigo-600 flex items-center justify-center text-white font-bold shadow-md">
                                                        <i className="fa-solid fa-earth-asia"></i>
                                                    </div>
                                                    <div>
                                                        <h4 className="text-sm font-bold text-white">Grup Publik Plengeran</h4>
                                                        <p className="text-[10px] text-zinc-500 flex items-center gap-1.5">
                                                            <span className="w-1.5 h-1.5 bg-accentGreen rounded-full"></span>
                                                            Realtime Instan Aktif (Simulasi Lokal jika offline)
                                                        </p>
                                                    </div>
                                                </React.Fragment>
                                            ) : (
                                                <React.Fragment>
                                                    <img src={activeChat.data?.avatar} className="w-10 h-10 rounded-full object-cover border border-zinc-800" alt="avatar" />
                                                    <div>
                                                        <h4 className="text-sm font-bold text-white">@{activeChat.data?.username}</h4>
                                                        <p className="text-[10px] text-zinc-500">{activeChat.data?.fullName}</p>
                                                    </div>
                                                </React.Fragment>
                                            )}
                                        </div>
                                    </div>

                                    {/* Chat logs */}
                                    <div className="flex-1 overflow-y-auto p-4 space-y-4">
                                        {filteredMessages.length === 0 ? (
                                            <div className="h-full flex flex-col items-center justify-center text-center text-zinc-600">
                                                <i className="fa-solid fa-comments text-4xl mb-3"></i>
                                                <p className="text-xs">Kirim pesan pertama untuk memulai obrolan {activeChat.type === 'group' ? 'grup bersama' : 'dengan teman'}!</p>
                                            </div>
                                        ) : (
                                            filteredMessages.map((msg, index) => {
                                                const isSelf = msg.senderId === currentUser.id;
                                                return (
                                                    <div key={msg.id || index} className={`flex gap-3 max-w-[80%] ${isSelf ? 'ml-auto flex-row-reverse' : ''}`}>
                                                        {!isSelf && (
                                                            <img src={msg.senderAvatar} className="w-8 h-8 rounded-full object-cover self-end" alt="avatar" />
                                                        )}
                                                        <div>
                                                            {!isSelf && activeChat.type === 'group' && (
                                                                <span className="text-[9px] text-zinc-500 block mb-1">@{msg.senderUsername}</span>
                                                            )}
                                                            <div className={`p-3 rounded-2xl text-xs leading-relaxed whitespace-pre-line ${
                                                                isSelf 
                                                                    ? 'bg-accentBlue text-white rounded-br-none' 
                                                                    : 'bg-[#121214] text-zinc-100 rounded-bl-none border border-zinc-900'
                                                            }`}>
                                                                {msg.text}
                                                            </div>
                                                            <span className="text-[8px] text-zinc-600 block mt-1 text-right">
                                                                {new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                                                            </span>
                                                        </div>
                                                    </div>
                                                );
                                            })
                                        )}
                                        <div ref={chatEndRef}></div>
                                    </div>

                                    {/* Chat Message Box Inputs */}
                                    <form onSubmit={handleSendMessage} className="p-4 bg-[#121214] border-t border-zinc-900 flex gap-3">
                                        <input 
                                            type="text" 
                                            placeholder="Ketik pesan..." 
                                            value={messageInput}
                                            onChange={(e) => setMessageInput(e.target.value)}
                                            className="flex-1 bg-[#09090b] text-white border border-zinc-850 rounded-xl px-4 py-3 text-xs focus:outline-none focus:ring-1 focus:ring-accentBlue"
                                        />
                                        <button 
                                            type="submit"
                                            className="bg-accentBlue hover:bg-blue-600 text-white font-bold text-xs px-5 py-3 rounded-xl transition-all"
                                        >
                                            Kirim
                                        </button>
                                    </form>
                                </div>

                            </div>
                        )}

                        {/* TAB 3: PROFIL AKUN (Screenshot 3 Visuals) */}
                        {activeTab === 'profil' && (
                            <div className="flex-1 p-6 overflow-y-auto">
                                
                                <div className="max-w-xl mx-auto space-y-6">
                                    <h3 className="text-lg font-bold text-white flex items-center gap-2 pb-3 border-b border-zinc-900">
                                        <i className="fa-solid fa-user-gear text-accentBlue"></i>
                                        Profil Akun Anda
                                    </h3>

                                    {/* User Profil card */}
                                    <div className="bg-cardBg border border-zinc-800 rounded-2xl p-6 shadow-xl relative overflow-hidden">
                                        <div className="flex flex-col items-center text-center">
                                            <div className="relative mb-4">
                                                <img src={currentUser.avatar} className="w-24 h-24 rounded-full object-cover border-4 border-zinc-800" alt="profile" />
                                                <span className="absolute bottom-1 right-1 w-5 h-5 bg-accentGreen border-4 border-cardBg rounded-full"></span>
                                            </div>

                                            <h4 className="text-lg font-extrabold text-white mb-0.5">{currentUser.fullName}</h4>
                                            <p className="text-accentBlue text-xs font-semibold mb-2">@{currentUser.username}</p>
                                            
                                            <div className="flex items-center gap-1 text-[11px] text-zinc-500 mb-5">
                                                <span className="w-2 h-2 rounded-full bg-accentGreen"></span>
                                                <span>Online</span>
                                            </div>

                                            {/* Count Statistics row */}
                                            <div className="grid grid-cols-3 gap-6 w-full py-4 border-t border-b border-zinc-900 text-center">
                                                <div>
                                                    <span className="text-sm font-extrabold text-white block">{getMomentsContributionCount(currentUser.id)}</span>
                                                    <span className="text-[9px] text-zinc-500 font-bold uppercase tracking-wider">Kontribusi Momen</span>
                                                </div>
                                                <div>
                                                    <span className="text-sm font-extrabold text-white block">{getFollowersCount(currentUser.id)}</span>
                                                    <span className="text-[9px] text-zinc-500 font-bold uppercase tracking-wider">Pengikut</span>
                                                </div>
                                                <div>
                                                    <span className="text-sm font-extrabold text-white block">{getFollowingCount(currentUser.id)}</span>
                                                    <span className="text-[9px] text-zinc-500 font-bold uppercase tracking-wider">Diikuti</span>
