                                                            </span>
                                                        </div>
                                                    </div>
                                                );
                                            })
                                        )}
                                        <div ref={chatEndRef}></div>
                                    </div>

                                    {/* Chat Message Box Inputs */}
                                    <form onSubmit={handleSendMessage} className="p-4 bg-[#121214] border-t border-zinc-900 flex gap-3">
                                        <input 
                                            type="text" 
                                            placeholder="Ketik pesan..." 
                                            value={messageInput}
                                            onChange={(e) => setMessageInput(e.target.value)}
                                            className="flex-1 bg-[#09090b] text-white border border-zinc-800 rounded-xl px-4 py-3 text-xs focus:outline-none focus:ring-1 focus:ring-accentBlue"
                                        />
                                        <button 
                                            type="submit"
                                            className="bg-accentBlue hover:bg-blue-600 text-white font-bold text-xs px-5 py-3 rounded-xl transition-all"
                                        >
                                            Kirim
                                        </button>
                                    </form>
                                </div>

                            </div>
                        )}

                        {/* TAB 3: PROFIL AKUN */}
                        {activeTab === 'profil' && (
                            <div className="flex-1 p-6 overflow-y-auto">
                                
                                <div className="max-w-xl mx-auto space-y-6">
                                    <h3 className="text-lg font-bold text-white flex items-center gap-2 pb-3 border-b border-zinc-900">
                                        <i className="fa-solid fa-user-gear text-accentBlue"></i>
                                        Profil Akun Anda
                                    </h3>

                                    {/* User Profil card */}
                                    <div className="bg-cardBg border border-zinc-800 rounded-2xl p-6 shadow-xl relative overflow-hidden">
                                        <div className="flex flex-col items-center text-center">
                                            <div className="relative mb-4">
                                                <img src={currentUser?.avatar} className="w-24 h-24 rounded-full object-cover border-4 border-zinc-800" alt="profile" />
                                                <span className="absolute bottom-1 right-1 w-5 h-5 bg-accentGreen border-4 border-cardBg rounded-full"></span>
                                            </div>

                                            <h4 className="text-lg font-extrabold text-white mb-0.5">{currentUser?.fullName}</h4>
                                            <p className="text-accentBlue text-xs font-semibold mb-2">@{currentUser?.username}</p>
                                            
                                            <div className="flex items-center gap-1 text-[11px] text-zinc-500 mb-5">
                                                <span className="w-2 h-2 rounded-full bg-accentGreen animate-pulse"></span>
                                                <span>Online</span>
                                            </div>

                                            {/* Count Statistics row */}
                                            <div className="grid grid-cols-3 gap-6 w-full py-4 border-t border-b border-zinc-900 text-center">
                                                <div>
                                                    <span className="text-sm font-extrabold text-white block">{getMomentsContributionCount(currentUser?.id)}</span>
                                                    <span className="text-[9px] text-zinc-500 font-bold uppercase tracking-wider">Kontribusi Momen</span>
                                                </div>
                                                <div>
                                                    <span className="text-sm font-extrabold text-white block">{getFollowersCount(currentUser?.id)}</span>
                                                    <span className="text-[9px] text-zinc-500 font-bold uppercase tracking-wider">Pengikut</span>
                                                </div>
                                                <div>
                                                    <span className="text-sm font-extrabold text-white block">{getFollowingCount(currentUser?.id)}</span>
                                                    <span className="text-[9px] text-zinc-500 font-bold uppercase tracking-wider">Diikuti</span>
                                                </div>
                                            </div>

                                            {/* Biografi Box */}
                                            <div className="w-full text-left bg-[#09090b] p-4 rounded-xl border border-zinc-900 mt-5 space-y-1">
                                                <span className="text-[10px] text-zinc-500 font-bold tracking-widest uppercase block"><i className="fa-solid fa-feather mr-1.5 text-accentBlue"></i>Biografi</span>
                                                <p className="text-xs text-zinc-400 italic leading-relaxed">{currentUser?.bio || "Tidak ada biografi ditulis."}</p>
                                            </div>

                                            {/* Edit Profil Button trigger */}
                                            {!isEditingProfile ? (
                                                <button 
                                                    onClick={startEditProfile}
                                                    className="w-full bg-[#1c1c1f] hover:bg-zinc-800 text-zinc-300 font-bold text-xs py-3 px-4 rounded-xl transition-all border border-zinc-800 mt-5"
                                                >
                                                    <i className="fa-solid fa-pen-to-square mr-2"></i>
                                                    Edit Profil & Bio Anda
                                                </button>
                                            ) : (
                                                <form onSubmit={handleSaveProfile} className="w-full mt-5 space-y-4 text-left border-t border-zinc-900 pt-5">
                                                    <div>
                                                        <label className="block text-zinc-400 text-[10px] font-bold uppercase mb-1">Nama Lengkap</label>
                                                        <input 
                                                            type="text" 
                                                            value={editFullName}
                                                            onChange={(e) => setEditFullName(e.target.value)}
                                                            className="w-full bg-[#09090b] text-white border border-zinc-800 rounded-xl px-4 py-2.5 text-xs focus:outline-none focus:ring-1 focus:ring-accentBlue"
                                                        />
                                                    </div>

                                                    <div>
                                                        <label className="block text-zinc-400 text-[10px] font-bold uppercase mb-1">Biografi (Bio)</label>
                                                        <textarea 
                                                            value={editBio}
                                                            onChange={(e) => setEditBio(e.target.value)}
                                                            rows="2"
                                                            className="w-full bg-[#09090b] text-white border border-zinc-800 rounded-xl px-4 py-2.5 text-xs focus:outline-none focus:ring-1 focus:ring-accentBlue resize-none"
                                                        ></textarea>
                                                    </div>

                                                    <div>
                                                        <label className="block text-zinc-400 text-[10px] font-bold uppercase mb-2">Pilih Avatar Profil</label>
                                                        <div className="flex justify-between bg-[#09090b] p-2 rounded-xl border border-zinc-900">
                                                            {AVATARS.map((av, idx) => (
                                                                <button
                                                                    key={idx}
                                                                    type="button"
                                                                    onClick={() => setEditAvatar(av)}
                                                                    className={`w-10 h-10 rounded-full overflow-hidden border-2 ${
                                                                        editAvatar === av ? 'border-accentBlue scale-105' : 'border-transparent opacity-60'
                                                                    }`}
                                                                >
                                                                    <img src={av} alt="avatar option" className="w-full h-full object-cover" />
                                                                </button>
                                                            ))}
                                                        </div>
                                                    </div>

                                                    <div className="flex gap-2">
                                                        <button 
                                                            type="button"
                                                            onClick={() => setIsEditingProfile(false)}
                                                            className="flex-1 bg-zinc-900 text-zinc-400 font-bold text-xs py-2.5 px-4 rounded-xl border border-zinc-800"
                                                        >
                                                            Batal
                                                        </button>
                                                        <button 
                                                            type="submit"
                                                            className="flex-1 bg-accentBlue text-white font-bold text-xs py-2.5 px-4 rounded-xl"
                                                        >
                                                            Simpan
                                                        </button>
                                                    </div>
                                                </form>
                                            )}
                                        </div>
                                    </div>

                                    {/* Discover Users list */}
                                    <div className="bg-cardBg border border-zinc-800 rounded-2xl p-5 shadow-xl">
                                        <div className="flex justify-between items-center mb-4">
                                            <h4 className="text-xs font-bold uppercase text-white tracking-wider flex items-center gap-2">
                                                <i className="fa-solid fa-users text-accentBlue"></i>
                                                Temukan Pengguna Lain
                                            </h4>
                                            
                                            {/* Minimalistic search in profile directory */}
                                            <input 
                                                type="text" 
                                                placeholder="Cari teman..." 
                                                value={userSearchText}
                                                onChange={(e) => setUserSearchText(e.target.value)}
                                                className="bg-[#09090b] text-white border border-zinc-800 rounded-lg px-2.5 py-1 text-[10px] focus:outline-none focus:ring-1 focus:ring-accentBlue w-36"
                                            />
                                        </div>

                                        <div className="space-y-3.5">
                                            {filteredUsersToFollow.length === 0 ? (
                                                <p className="text-xs text-zinc-600 italic">Belum ada pengguna lain terdaftar.</p>
                                            ) : (
                                                filteredUsersToFollow.map(user => {
                                                    const following = isFollowing(currentUser?.id, user.id);
                                                    const follower = isFollowing(user.id, currentUser?.id);
                                                    const isOnline = user.isOnline;

                                                    return (
                                                        <div key={user.id} className="flex items-center justify-between p-3 bg-black/30 border border-zinc-900 rounded-xl hover:border-zinc-800 transition-all">
                                                            <div className="flex items-center gap-3">
                                                                <div className="relative">
                                                                    <img src={user.avatar} className="w-10 h-10 rounded-full object-cover border border-zinc-800" alt="avatar" />
                                                                    <span className={`absolute bottom-0 right-0 w-2.5 h-2.5 border-2 border-black rounded-full ${
                                                                        isOnline ? 'bg-accentGreen' : 'bg-zinc-600'
                                                                    }`}></span>
                                                                </div>
                                                                <div>
                                                                    <div className="flex items-center gap-1.5">
                                                                        <span className="text-xs font-bold text-white">@{user.username}</span>
                                                                        {follower && (
                                                                            <span className="bg-zinc-800 text-zinc-500 text-[8px] font-bold px-1.5 py-0.2 rounded">Mengikuti Anda</span>
                                                                        )}
                                                                    </div>
                                                                    <p className="text-[10px] text-zinc-500">{user.fullName}</p>
                                                                </div>
                                                            </div>

                                                            <button 
                                                                onClick={() => handleFollow(user.id)}
                                                                className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all ${
                                                                    following 
                                                                        ? 'bg-zinc-800 hover:bg-zinc-700 text-zinc-300' 
                                                                        : 'bg-accentBlue hover:bg-blue-600 text-white'
                                                                }`}
                                                            >
                                                                {following ? 'Batal Ikuti' : 'Ikuti'}
                                                            </button>
                                                        </div>
                                                    );
                                                })
                                            )}
                                        </div>
                                    </div>

                                </div>

                            </div>
                        )}

                    </main>

                    {/* STATUS DETAILS MODAL */}
                    {showStatusModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 animate-fade-in">
                            <div className="bg-cardBg border border-zinc-800 rounded-2xl max-w-sm w-full p-6 space-y-4 shadow-2xl">
                                <div className="text-center">
                                    <div className="w-12 h-12 rounded-full bg-[#1b2b3a] text-accentBlue flex items-center justify-center text-xl mx-auto mb-3">
                                        <i className="fa-solid fa-wifi"></i>
                                    </div>
                                    <h4 className="text-sm font-bold text-white mb-1">Status Sinkronisasi Jaringan</h4>
                                    <p className="text-[11px] text-zinc-500">
                                        Aplikasi ini berjalan dalam sinkronisasi optimal. Anda dapat berkirim pesan dan melihat status real-time secara instan.
                                    </p>
                                </div>

                                <div className="space-y-2.5 bg-[#09090b] p-3 rounded-xl border border-zinc-900 text-[11px]">
                                    <div className="flex justify-between">
                                        <span className="text-zinc-500">Status Layanan:</span>
                                        <span className="text-accentGreen font-bold flex items-center gap-1.5">
                                            <span className="w-1.5 h-1.5 bg-accentGreen rounded-full"></span> Aktif Berjalan
                                        </span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-zinc-500">Penyimpanan:</span>
                                        <span className="text-zinc-400 font-mono">LocalStorage Sync / Cloud</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-zinc-500">Modus Enkripsi:</span>
                                        <span className="text-zinc-400">Anonim Terverifikasi</span>
                                    </div>
                                </div>

                                <button 
                                    onClick={() => setShowStatusModal(false)}
                                    className="w-full bg-accentBlue hover:bg-blue-600 text-white font-bold py-2.5 rounded-xl text-xs transition-all"
                                >
                                    Selesai & Tutup
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Toast Notification */}
                    {toastMessage && (
                        <div className="fixed bottom-6 right-6 bg-[#1b2b3a] border border-accentBlue text-white px-5 py-3 rounded-xl shadow-2xl text-xs font-semibold tracking-wide transition-all z-50 flex items-center gap-2">
                            <i className="fa-solid fa-circle-info text-accentBlue"></i>
                            {toastMessage}
                        </div>
                    )}

                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
