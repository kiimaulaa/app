<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlengerGram - Kalender & Timeline Bersama</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: '#0ea5e9' // sky-500
          }
        }
      }
    }
  </script>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #000000;
    }
    /* Sembunyikan scrollbar default tapi tetap bisa scroll */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>

  <!-- ALPINE APP LOGIC (Dideklarasikan sebelum library Alpine aktif) -->
  <script>
    document.addEventListener('alpine:init', () => {
      Alpine.data('plengerApp', () => ({
        // --- CONSTANTS ---
        AVATARS: [
          "https://api.dicebear.com/7.x/bottts/svg?seed=whana",
          "https://api.dicebear.com/7.x/bottts/svg?seed=developer",
          "https://api.dicebear.com/7.x/bottts/svg?seed=gaming",
          "https://api.dicebear.com/7.x/bottts/svg?seed=ninja",
          "https://api.dicebear.com/7.x/bottts/svg?seed=panda",
          "https://api.dicebear.com/7.x/bottts/svg?seed=cyber"
        ],

        // --- APP STATES ---
        user: null,
        userData: null,
        authLoading: true,
        authMode: 'login',
        activeTab: 'momen',

        // Inputs
        usernameInput: '',
        emailInput: '',
        passwordInput: '',
        fullNameInput: '',
        authError: '',
        authSuccessMsg: '',

        // Lists
        usersList: [],
        moments: [],
        chatMessages: [],

        // Calendar / Moment Upload
        selectedDate: new Date(2026, 5, 1), // Default Juni 2026
        momentTitle: '',
        momentDesc: '',
        momentMediaUrl: '',
        momentMediaType: 'image',
        momentDate: '2026-06-01',

        // Chats
        activeChatId: 'public_group',
        messageInput: '',
        searchUserQuery: '',

        // Profiles edit
        isEditingProfile: false,
        editFullName: '',
        editBio: '',
        editAvatar: '',

        // Feedback
        networkStatus: 'Realtime Aktif',
        toastMsg: null,

        // --- INIT & SINKRONISASI ---
        init() {
          // Atasi Race Condition: Jika modul Firebase siap sebelum init dijalankan
          if (window.fbMethods) {
            this.setupAuthListener();
          } else {
            window.addEventListener('firebase-ready', () => {
              this.setupAuthListener();
            });
          }
        },

        triggerToast(msg) {
          this.toastMsg = msg;
          setTimeout(() => { this.toastMsg = null; }, 4000);
        },

        setupAuthListener() {
          const auth = window.auth;
          const { onAuthStateChanged } = window.fbMethods;

          onAuthStateChanged(auth, async (currentUser) => {
            if (currentUser && !currentUser.isAnonymous) {
              this.user = currentUser;
              await this.syncProfile(currentUser);
              this.startRealtimeSubscriptions();
            } else {
              this.user = null;
              this.userData = null;
              this.authLoading = false;
            }
          });
        },

        async syncProfile(currentUser) {
          const { doc, getDoc, setDoc } = window.fbMethods;
          const userDocRef = doc(window.db, 'artifacts', window.appId, 'public', 'data', 'users', currentUser.uid);
          
          try {
            const userSnap = await getDoc(userDocRef);
            if (userSnap.exists()) {
              this.userData = userSnap.data();
            } else {
              const defaultProfile = {
                uid: currentUser.uid,
                username: currentUser.email ? currentUser.email.split('@')[0] : 'user_' + currentUser.uid.substring(0, 5),
                fullName: 'Anggota Baru',
                avatar: this.AVATARS[0],
                bio: 'Halo! Saya baru saja mendaftar di PlengerGram.',
                following: [],
                followers: [],
                isOnline: true,
                lastActive: new Date().toISOString()
              };
              await setDoc(userDocRef, defaultProfile);
              this.userData = defaultProfile;
            }
          } catch (e) {
            console.error("Gagal sinkron profil:", e);
          }
        },

        startRealtimeSubscriptions() {
          const { collection, onSnapshot, doc, updateDoc } = window.fbMethods;
          const db = window.db;

          // A. Subscribe Users List
          onSnapshot(collection(db, 'artifacts', window.appId, 'public', 'data', 'users'), (snapshot) => {
            const list = [];
            snapshot.forEach((doc) => list.push(doc.data()));
            this.usersList = list;

            // Pastikan data profil milik sendiri juga sinkron
            const me = list.find(u => u.uid === this.user?.uid);
            if (me) this.userData = me;
          });

          // B. Subscribe Momen
          onSnapshot(collection(db, 'artifacts', window.appId, 'public', 'data', 'moments'), (snapshot) => {
            const list = [];
            snapshot.forEach((doc) => list.push({ id: doc.id, ...doc.data() }));
            list.sort((a, b) => new Date(b.date) - new Date(a.date));
            this.moments = list;
          });

          // C. Subscribe Chats
          onSnapshot(collection(db, 'artifacts', window.appId, 'public', 'data', 'chats'), (snapshot) => {
            const list = [];
            snapshot.forEach((doc) => list.push({ id: doc.id, ...doc.data() }));
            list.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
            this.chatMessages = list;

            this.scrollToChatBottom();
          });

          // Set online status
          const myDocRef = doc(db, 'artifacts', window.appId, 'public', 'data', 'users', this.user.uid);
          updateDoc(myDocRef, { isOnline: true, lastActive: new Date().toISOString() }).catch(() => {});

          this.authLoading = false;
        },

        // --- AUTH ACTIONS ---
        async handleAuthSubmit() {
          this.authError = '';
          this.authSuccessMsg = '';
          const { createUserWithEmailAndPassword, signInWithEmailAndPassword, doc, setDoc } = window.fbMethods;

          if (this.authMode === 'register') {
            if (!this.usernameInput.trim() || !this.emailInput.trim() || !this.passwordInput || !this.fullNameInput.trim()) {
              this.authError = 'Harap isi semua kolom pendaftaran.';
              return;
            }

            const cleanUser = this.usernameInput.trim().toLowerCase().replace(/[^a-z0-9_]/g, '');
            if (cleanUser.length < 3) {
              this.authError = 'Nama pengguna minimal 3 karakter.';
              return;
            }

            const isTaken = this.usersList.some(u => u.username === cleanUser);
            if (isTaken) {
              this.authError = 'Nama pengguna sudah terdaftar.';
              return;
            }

            try {
              this.authLoading = true;
              const credential = await createUserWithEmailAndPassword(window.auth, this.emailInput.trim(), this.passwordInput);
              const newUser = credential.user;

              const cleanProfile = {
                uid: newUser.uid,
                username: cleanUser,
                fullName: this.fullNameInput.trim(),
                avatar: this.AVATARS[Math.floor(Math.random() * this.AVATARS.length)],
                bio: 'Halo! Saya baru saja mendaftar di PlengerGram.',
                following: [],
                followers: [],
                isOnline: true,
                lastActive: new Date().toISOString()
              };

              await setDoc(doc(window.db, 'artifacts', window.appId, 'public', 'data', 'users', newUser.uid), cleanProfile);
              this.authSuccessMsg = 'Pendaftaran sukses! Selamat datang.';
              this.triggerToast(`Selamat datang @${cleanUser}`);
              
              this.usernameInput = '';
              this.emailInput = '';
              this.passwordInput = '';
              this.fullNameInput = '';
            } catch (err) {
              this.authLoading = false;
              this.authError = err.message || 'Pendaftaran gagal.';
            }
          } else {
            // Login
            if (!this.emailInput.trim() || !this.passwordInput) {
              this.authError = 'Silakan isi email dan kata sandi Anda.';
              return;
            }

            try {
              this.authLoading = true;
              await signInWithEmailAndPassword(window.auth, this.emailInput.trim(), this.passwordInput);
              this.triggerToast('Selamat datang kembali!');
            } catch (err) {
              this.authLoading = false;
              this.authError = 'Kombinasi email & sandi tidak sesuai.';
            }
          }
        },

        async handleLogout() {
          const { signOut, doc, updateDoc } = window.fbMethods;
          if (this.user) {
            const userDocRef = doc(window.db, 'artifacts', window.appId, 'public', 'data', 'users', this.user.uid);
            await updateDoc(userDocRef, { isOnline: false }).catch(() => {});
          }
          await signOut(window.auth);
          this.user = null;
          this.userData = null;
          this.triggerToast('Sampai jumpa kembali!');
        },

        // --- MOMEN ACTIONS ---
        async handleAddMoment() {
          if (!this.momentTitle.trim() || !this.momentDesc.trim()) {
            this.triggerToast('Harap lengkapi judul dan deskripsi.');
            return;
          }

          const { collection, addDoc } = window.fbMethods;
          try {
            const newMoment = {
              title: this.momentTitle.trim(),
              description: this.momentDesc.trim(),
              mediaUrl: this.momentMediaUrl.trim(),
              mediaType: this.momentMediaType,
              date: this.momentDate,
              createdAt: new Date().toISOString(),
              authorUid: this.user.uid,
              authorName: this.userData?.fullName || 'Anonim',
              authorUsername: this.userData?.username || 'user',
              authorAvatar: this.userData?.avatar || this.AVATARS[0],
              likes: []
            };

            await addDoc(collection(window.db, 'artifacts', window.appId, 'public', 'data', 'moments'), newMoment);
            this.momentTitle = '';
            this.momentDesc = '';
            this.momentMediaUrl = '';
            this.triggerToast('Kenangan indah baru berhasil dibagikan!');
          } catch (e) {
            this.triggerToast('Gagal membagikan momen: ' + e.message);
          }
        },

        async handleLikeMoment(momentId, likesArray) {
          if (!this.user) return;
          const { doc, updateDoc, arrayRemove, arrayUnion } = window.fbMethods;
          const isLiked = likesArray.includes(this.user.uid);
          const momentDocRef = doc(window.db, 'artifacts', window.appId, 'public', 'data', 'moments', momentId);

          try {
            if (isLiked) {
              await updateDoc(momentDocRef, { likes: arrayRemove(this.user.uid) });
            } else {
              await updateDoc(momentDocRef, { likes: arrayUnion(this.user.uid) });
            }
          } catch (e) {
            console.error("Gagal menyukai:", e);
          }
        },

        async handleDeleteMoment(momentId) {
          if (confirm("Apakah Anda yakin ingin menghapus momen ini?")) {
            const { doc, deleteDoc } = window.fbMethods;
            try {
              await deleteDoc(doc(window.db, 'artifacts', window.appId, 'public', 'data', 'moments', momentId));
              this.triggerToast('Momen berhasil dihapus.');
            } catch (e) {
              this.triggerToast('Gagal menghapus momen.');
            }
          }
        },

        // --- CALENDAR HELPERS ---
        selectCalendarDay(day) {
          const dateString = `2026-06-${day < 10 ? '0' + day : day}`;
          this.selectedDate = new Date(2026, 5, day);
          this.momentDate = dateString;
          this.triggerToast(`Melihat tanggal ${day} Juni 2026`);
        },

        isDaySelected(day) {
          return this.selectedDate.getDate() === day && this.selectedDate.getMonth() === 5;
        },

        hasMomentOnDay(day) {
          const dateString = `2026-06-${day < 10 ? '0' + day : day}`;
          return this.moments.some(m => m.date === dateString);
        },

        // --- DIRECT MESSAGE (DM) ACTIONS & ENGINE ---
        async handleSendMessage() {
          if (!this.messageInput.trim()) return;
          const { collection, addDoc } = window.fbMethods;

          try {
            const newMessage = {
              text: this.messageInput.trim(),
              senderUid: this.user.uid,
              senderName: this.userData?.fullName || 'Anonim',
              senderUsername: this.userData?.username || 'user',
              senderAvatar: this.userData?.avatar || this.AVATARS[0],
              timestamp: new Date().toISOString(),
              chatRoomId: this.activeChatId
            };

            await addDoc(collection(window.db, 'artifacts', window.appId, 'public', 'data', 'chats'), newMessage);
            this.messageInput = '';
            this.scrollToChatBottom();
          } catch (e) {
            console.error("Gagal mengirim pesan:", e);
          }
        },

        async handleClearDM() {
          if (confirm("Apakah Anda yakin ingin menghapus obrolan ini secara permanen?")) {
            const { doc, deleteDoc } = window.fbMethods;
            const msgs = this.getFilteredMessages();
            try {
              for (let m of msgs) {
                await deleteDoc(doc(window.db, 'artifacts', window.appId, 'public', 'data', 'chats', m.id));
              }
              this.triggerToast('Obrolan dikosongkan.');
            } catch (e) {
              this.triggerToast('Gagal mengosongkan obrolan.');
            }
          }
        },

        startPrivateChat(partnerUid) {
          const sortedIds = [this.user.uid, partnerUid].sort();
          this.activeChatId = `${sortedIds[0]}_${sortedIds[1]}`;
          this.activeTab = 'pesan';
          this.scrollToChatBottom();
        },

        getFilteredMessages() {
          if (this.activeChatId === 'public_group') {
            return this.chatMessages.filter(m => m.chatRoomId === 'public_group');
          } else {
            return this.chatMessages.filter(m => m.chatRoomId === this.activeChatId);
          }
        },

        getFilteredUsers() {
          return this.usersList
            .filter(u => u.uid !== this.user?.uid)
            .filter(u => u.username.toLowerCase().includes(this.searchUserQuery.toLowerCase()) || u.fullName.toLowerCase().includes(this.searchUserQuery.toLowerCase()));
        },

        getActiveChatPartner() {
          if (this.activeChatId === 'public_group') return null;
          const partnerId = this.activeChatId.split('_').find(id => id !== this.user?.uid);
          return this.usersList.find(u => u.uid === partnerId);
        },

        isChatSelected(partnerUid) {
          const sortedIds = [this.user?.uid, partnerUid].sort();
          return this.activeChatId === `${sortedIds[0]}_${sortedIds[1]}`;
        },

        getOnlineCount() {
          return this.usersList.filter(u => u.isOnline && u.uid !== this.user?.uid).length;
        },

        scrollToChatBottom() {
          setTimeout(() => {
            const chatEnd = document.getElementById('chatEnd');
            if (chatEnd) chatEnd.scrollIntoView({ behavior: 'smooth' });
          }, 150);
        },

        formatTime(timestamp) {
          if (!timestamp) return '';
          return new Date(timestamp).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
        },

        // --- PROFIL ACTIONS ---
        openProfileEditor() {
          this.editFullName = this.userData?.fullName || '';
          this.editBio = this.userData?.bio || '';
          this.editAvatar = this.userData?.avatar || this.AVATARS[0];
          this.isEditingProfile = true;
        },

        async handleUpdateProfile() {
          if (!this.editFullName.trim()) return;
          const { doc, updateDoc } = window.fbMethods;
          
          try {
            const userDocRef = doc(window.db, 'artifacts', window.appId, 'public', 'data', 'users', this.user.uid);
            await updateDoc(userDocRef, {
              fullName: this.editFullName.trim(),
              bio: this.editBio.trim(),
              avatar: this.editAvatar
            });
            this.isEditingProfile = false;
            this.triggerToast('Profil berhasil diperbarui!');
          } catch (e) {
            this.triggerToast('Gagal memperbarui profil.');
          }
        },

        async handleFollowToggle(targetUser) {
          const { doc, updateDoc, arrayRemove, arrayUnion } = window.fbMethods;
          const isFollowing = this.userData?.following?.includes(targetUser.uid);
          const myDocRef = doc(window.db, 'artifacts', window.appId, 'public', 'data', 'users', this.user.uid);
          const targetDocRef = doc(window.db, 'artifacts', window.appId, 'public', 'data', 'users', targetUser.uid);

          try {
            if (isFollowing) {
              await updateDoc(myDocRef, { following: arrayRemove(targetUser.uid) });
              await updateDoc(targetDocRef, { followers: arrayRemove(this.user.uid) });
              this.triggerToast(`Batal mengikuti @${targetUser.username}`);
            } else {
              await updateDoc(myDocRef, { following: arrayUnion(targetUser.uid) });
              await updateDoc(targetDocRef, { followers: arrayUnion(this.user.uid) });
              this.triggerToast(`Mengikuti @${targetUser.username}`);
            }
          } catch (e) {
            console.error(e);
          }
        },

        isFollowingUser(uid) {
          return this.userData?.following?.includes(uid);
        },

        getMyMomentsCount() {
          return this.moments.filter(m => m.authorUid === this.user?.uid).length;
        },

        formatDriveLink(url) {
          if (!url) return '';
          if (url.includes('drive.google.com/file/d/')) {
            const match = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)\//);
            if (match && match[1]) {
              return `https://lh3.googleusercontent.com/d/${match[1]}=s800`;
            }
          }
          if (url.includes('youtube.com/watch') || url.includes('youtu.be')) {
            let videoId = '';
            if (url.includes('youtu.be/')) {
              videoId = url.split('youtu.be/')[1].split(/[?#]/)[0];
            } else {
              const match = url.match(/[?&]v=([^&#]+)/);
              videoId = match ? match[1] : '';
            }
            return `https://www.youtube.com/embed/${videoId}`;
          }
          return url;
        }

      }));
    });
  </script>

  <!-- Alpine.js (Di-load secara aman setelah komponen terdaftar) -->
  <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="text-gray-100 min-h-screen selection:bg-brand selection:text-black" x-data="plengerApp">

  <!-- Toast Notifikasi Global -->
  <div x-show="toastMsg" 
       x-transition:enter="transition ease-out duration-300"
       x-transition:enter-start="opacity-0 translate-y-4"
       x-transition:enter-end="opacity-100 translate-y-0"
       x-transition:leave="transition ease-in duration-200"
       x-transition:leave-start="opacity-100 translate-y-0"
       x-transition:leave-end="opacity-0 translate-y-4"
       class="fixed bottom-6 right-6 z-50 bg-sky-500 text-white px-6 py-3.5 rounded-xl shadow-2xl flex items-center gap-3"
       style="display: none;">
    <svg class="w-5 h-5 animate-bounce" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
    <span class="font-semibold text-sm" x-text="toastMsg"></span>
  </div>

  <!-- LOADING STATE UTAMA -->
  <div x-show="authLoading" class="min-h-screen bg-black flex flex-col items-center justify-center">
    <div class="w-14 h-14 border-4 border-brand border-t-transparent rounded-full animate-spin mb-4"></div>
    <p class="text-gray-400 font-medium">Memuat PlengerGram...</p>
  </div>

  <!-- SCREEN 1: LOGIN & REGISTER (TAMPIL JIKA BELUM LOGIN) -->
  <div x-show="!authLoading && !user" class="min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden" style="display: none;">
    <div class="absolute top-[-10%] left-[-10%] w-[40vw] h-[40vw] bg-sky-950/20 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40vw] h-[40vw] bg-cyan-950/20 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="w-full max-w-md bg-zinc-900 border border-zinc-800/80 rounded-2xl p-8 shadow-2xl z-10">
      <div class="text-center mb-6">
        <h1 class="text-4xl font-extrabold tracking-tight bg-gradient-to-r from-white via-gray-200 to-sky-400 bg-clip-text text-transparent mb-1">
          PlengerGram
        </h1>
        <p class="text-xs text-gray-400 tracking-wider uppercase" x-text="authMode === 'login' ? 'Masuk ke Akun Anda' : 'Buat Akun PlengerGram Baru'"></p>
      </div>

      <!-- Error / Success Alert -->
      <div x-show="authError" class="bg-red-950/60 border border-red-800/80 text-red-300 text-xs p-3 rounded-lg mb-4 text-center" style="display: none;" x-text="'⚠️ ' + authError"></div>
      <div x-show="authSuccessMsg" class="bg-emerald-950/60 border border-emerald-800/80 text-emerald-300 text-xs p-3 rounded-lg mb-4 text-center" style="display: none;" x-text="'🎉 ' + authSuccessMsg"></div>

      <!-- Form Auth -->
      <form @submit.prevent="handleAuthSubmit()" class="space-y-4">
        <template x-if="authMode === 'register'">
          <div class="space-y-4">
            <div>
              <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1.5 tracking-wider">Nama Lengkap</label>
              <input type="text" placeholder="Contoh: Whana Plenger" x-model="fullNameInput" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2.5 text-xs text-gray-200 focus:outline-none focus:border-brand" required>
            </div>
            <div>
              <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1.5 tracking-wider">Nama Pengguna (Username)</label>
              <input type="text" placeholder="Contoh: whana_ (Hanya huruf, angka, underscore)" x-model="usernameInput" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2.5 text-xs text-gray-200 focus:outline-none focus:border-brand" required>
            </div>
          </div>
        </template>

        <div>
          <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1.5 tracking-wider">Alamat Email</label>
          <input type="email" placeholder="Masukkan email terdaftar" x-model="emailInput" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2.5 text-xs text-gray-200 focus:outline-none focus:border-brand" required>
        </div>

        <div>
          <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1.5 tracking-wider">Kata Sandi</label>
          <input type="password" placeholder="Masukkan kata sandi" x-model="passwordInput" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2.5 text-xs text-gray-200 focus:outline-none focus:border-brand" required>
        </div>

        <button type="submit" class="w-full bg-brand hover:bg-sky-600 text-white font-semibold py-2.5 px-4 rounded-lg shadow-lg active:scale-[0.99] transition text-xs mt-2" x-text="authMode === 'login' ? 'Masuk Akun' : 'Daftar Sekarang'"></button>
      </form>

      <!-- Pengalih Mode -->
      <div class="mt-5 text-center text-xs text-gray-400">
        <p x-show="authMode === 'login'">
          Belum punya akun PlengerGram? 
          <button @click="authMode = 'register'; authError = ''; authSuccessMsg = '';" class="text-brand hover:underline font-semibold">Daftar Akun Baru</button>
        </p>
        <p x-show="authMode === 'register'" style="display: none;">
          Sudah punya akun terdaftar? 
          <button @click="authMode = 'login'; authError = ''; authSuccessMsg = '';" class="text-brand hover:underline font-semibold">Silakan Masuk</button>
        </p>
      </div>
    </div>
  </div>

  <!-- SCREEN 2: SOCIAL MEDIA DASHBOARD (TAMPIL JIKA LOGIN BERHASIL) -->
  <div x-show="!authLoading && user" class="min-h-screen flex flex-col md:flex-row" style="display: none;">
    
    <!-- SIDEBAR KIRI -->
    <aside class="w-full md:w-64 bg-[#080808] border-r border-zinc-900 flex flex-col justify-between p-6 flex-shrink-0">
      <div>
        <!-- Logo -->
        <div class="mb-10 mt-2">
          <h2 class="text-2xl font-bold tracking-tight text-white flex items-center gap-2">
            <span class="bg-brand text-black w-7 h-7 rounded-lg flex items-center justify-center font-extrabold text-lg">P</span>
            PlengerGram
          </h2>
        </div>

        <!-- Navigasi Menu -->
        <nav class="space-y-2">
          <button @click="activeTab = 'momen'" 
                  :class="activeTab === 'momen' ? 'bg-zinc-900 text-sky-400' : 'text-gray-400 hover:bg-zinc-950 hover:text-white'"
                  class="w-full flex items-center gap-3.5 px-4 py-3.5 rounded-xl text-sm font-semibold transition duration-150">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" strokeLinejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            Momen Bersama
          </button>

          <button @click="activeTab = 'pesan'; activeChatId = 'public_group'" 
                  :class="activeTab === 'pesan' ? 'bg-zinc-900 text-sky-400' : 'text-gray-400 hover:bg-zinc-950 hover:text-white'"
                  class="w-full flex items-center gap-3.5 px-4 py-3.5 rounded-xl text-sm font-semibold transition duration-150">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
            </svg>
            Pesan & Teman
          </button>

          <button @click="activeTab = 'profil'" 
                  :class="activeTab === 'profil' ? 'bg-zinc-900 text-sky-400' : 'text-gray-400 hover:bg-zinc-950 hover:text-white'"
                  class="w-full flex items-center gap-3.5 px-4 py-3.5 rounded-xl text-sm font-semibold transition duration-150">
            <img :src="userData?.avatar || AVATARS[0]" alt="Profil" class="w-5 h-5 rounded-full object-cover">
            Profil Akun
          </button>
        </nav>
      </div>

      <!-- Footer Sidebar -->
      <div class="mt-8 border-t border-zinc-900 pt-6 space-y-4">
        <div class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">Status Jaringan:</div>
        
        <button @click="triggerToast('Koneksi Firebase Cloud sinkron dan aktif!')" class="w-full flex items-center justify-between bg-zinc-950 hover:bg-zinc-900 border border-zinc-900 rounded-lg px-3 py-2 text-xs text-sky-400 font-medium transition">
          <span class="flex items-center gap-1.5">
            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
            <span x-text="networkStatus"></span>
          </span>
        </button>

        <!-- Akun Sedang Aktif -->
        <div class="bg-zinc-950 p-3 rounded-xl border border-zinc-900 flex items-center gap-3">
          <img :src="userData?.avatar || AVATARS[0]" alt="Avatar" class="w-8 h-8 rounded-full bg-zinc-800" />
          <div class="overflow-hidden">
            <div class="text-xs font-bold text-white truncate" x-text="'@' + (userData?.username || '')"></div>
            <div class="text-[10px] text-gray-500 truncate" x-text="userData?.fullName || ''"></div>
          </div>
        </div>

        <button @click="handleLogout()" class="w-full flex items-center gap-2.5 px-3 py-2 text-red-500 hover:bg-red-950/20 rounded-lg text-xs font-bold transition">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          Keluar Akun
        </button>
      </div>
    </aside>

    <!-- KONTEN UTAMA SECARA TAB -->
    <main class="flex-1 bg-[#0c0c0c] flex flex-col min-w-0">
      
      <!-- TAB 1: MOMEN BERSAMA -->
      <template x-if="activeTab === 'momen'">
        <div class="flex-1 p-4 md:p-8 grid grid-cols-1 xl:grid-cols-12 gap-8 overflow-y-auto">
          <!-- Kolom Kiri -->
          <div class="xl:col-span-5 space-y-6">
            
            <div class="bg-zinc-900/60 border border-zinc-900 p-5 rounded-2xl flex items-center justify-between">
              <div class="flex items-center gap-4">
                <img :src="userData?.avatar || AVATARS[0]" alt="Avatar" class="w-12 h-12 rounded-full border border-zinc-800 bg-zinc-950" />
                <div>
                  <p class="text-xs text-gray-400 font-medium">Selamat datang,</p>
                  <h3 class="text-lg font-bold text-white" x-text="'@' + (userData?.username || '')"></h3>
                </div>
              </div>
              <span class="text-[10px] font-bold text-emerald-400 bg-emerald-950/60 border border-emerald-900/50 px-2.5 py-1.5 rounded-full uppercase tracking-wider">Realtime Tanggap</span>
            </div>

            <!-- Online List -->
            <div class="bg-zinc-900/60 border border-zinc-900 p-5 rounded-2xl">
              <h4 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4" x-text="'Teman yang sedang online (' + getOnlineCount() + ')'"></h4>
              <div class="flex flex-wrap gap-3" x-show="getOnlineCount() > 0">
                <template x-for="friend in usersList.filter(u => u.isOnline && u.uid !== user?.uid)" :key="friend.uid">
                  <button @click="startPrivateChat(friend.uid)" class="flex items-center gap-2 bg-zinc-950 hover:bg-zinc-900 border border-zinc-800/80 px-3 py-1.5 rounded-xl text-xs transition duration-150">
                    <div class="relative">
                      <img :src="friend.avatar" class="w-5 h-5 rounded-full" />
                      <span class="absolute bottom-0 right-0 w-1.5 h-1.5 bg-emerald-500 rounded-full"></span>
                    </div>
                    <span class="font-semibold text-gray-300" x-text="'@' + friend.username"></span>
                  </button>
                </template>
              </div>
              <p x-show="getOnlineCount() === 0" class="text-xs text-gray-500 italic py-2">Tidak ada pengguna lain yang aktif saat ini.</p>
            </div>

            <!-- Kalender Juni 2026 -->
            <div class="bg-[#0e0e0e] border border-zinc-900 p-5 rounded-2xl">
              <div class="flex items-center justify-between mb-4">
                <button class="text-gray-400 hover:text-white p-1"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" /></svg></button>
                <h4 class="text-sm font-bold text-gray-200 uppercase tracking-wider">Juni 2026</h4>
                <button class="text-gray-400 hover:text-white p-1"><svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" /></svg></button>
              </div>
              <div class="grid grid-cols-7 gap-1 text-center text-[10px] font-bold text-gray-500 uppercase mb-2">
                <div>M</div><div>S</div><div>S</div><div>R</div><div>K</div><div>J</div><div>S</div>
              </div>
              <div class="grid grid-cols-7 gap-1.5">
                <!-- 1 Juni 2026 adalah hari Senin, buat offset 1 hari kosong -->
                <div class="text-gray-600 text-center py-2 text-sm">-</div>
                <template x-for="day in 30" :key="day">
                  <button @click="selectCalendarDay(day)"
                          :class="isDaySelected(day) ? 'bg-brand text-white shadow-md' : 'text-gray-200 bg-zinc-850/40 hover:bg-zinc-800'"
                          class="relative rounded-lg text-center py-2 text-sm font-semibold transition flex flex-col items-center justify-center">
                    <span x-text="day"></span>
                    <span x-show="hasMomentOnDay(day)" class="absolute bottom-1 w-1.5 h-1.5 bg-cyan-400 rounded-full animate-pulse"></span>
                  </button>
                </template>
              </div>
              <div class="mt-4 text-[11px] text-gray-500 flex items-center gap-2 bg-zinc-950 p-2.5 rounded-lg border border-zinc-900">
                <span class="w-2.5 h-2.5 bg-cyan-400 rounded-full inline-block"></span>
                <span>Tanggal biru bersinar menandakan momen yang diupload kawan-kawan.</span>
              </div>
            </div>

            <!-- Form Upload Momen -->
            <div class="bg-zinc-900/60 border border-zinc-900 p-5 rounded-2xl">
              <h4 class="text-sm font-bold text-white flex items-center gap-2 mb-2">🧩 Tambah Kenangan Baru</h4>
              <p class="text-xs text-gray-400 mb-4 leading-relaxed">Bagikan keseruan Anda ke linimasa PlengerGram bersama teman lainnya.</p>
              <form @submit.prevent="handleAddMoment()" class="space-y-4">
                <div>
                  <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1.5">Judul Momen</label>
                  <input type="text" placeholder="Masukkan judul..." x-model="momentTitle" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3.5 py-2.5 text-xs text-gray-200 focus:outline-none focus:border-brand" required>
                </div>
                <div>
                  <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1.5">Deskripsi Kenangan</label>
                  <textarea placeholder="Tuliskan cerita singkat..." rows="3" x-model="momentDesc" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3.5 py-2.5 text-xs text-gray-200 focus:outline-none focus:border-brand resize-none" required></textarea>
                </div>
                <div class="grid grid-cols-2 gap-3">
                  <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1.5">Tanggal Kenangan</label>
                    <input type="date" x-model="momentDate" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2 text-xs text-gray-200 focus:outline-none" required>
                  </div>
                  <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1.5">Tipe Media</label>
                    <select x-model="momentMediaType" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3 py-2.5 text-xs text-gray-200 focus:outline-none">
                      <option value="image">Gambar / Foto</option>
                      <option value="video">Video / YouTube</option>
                    </select>
                  </div>
                </div>
                <div>
                  <label class="block text-[10px] font-bold text-gray-400 uppercase mb-1.5">Link Media (Google Drive / Direct URL)</label>
                  <input type="url" placeholder="https://drive.google.com/..." x-model="momentMediaUrl" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3.5 py-2.5 text-xs text-gray-200 focus:outline-none focus:border-brand">
                </div>
                <button type="submit" class="w-full bg-brand hover:bg-sky-600 text-white font-semibold py-2.5 px-4 rounded-lg text-xs transition shadow-md">Kirim Momen Kenangan</button>
              </form>
            </div>

          </div>

          <!-- Kolom Kanan: Timeline Bersama -->
          <div class="xl:col-span-7 flex flex-col space-y-6">
            <div class="flex items-center justify-between border-b border-zinc-900 pb-4">
              <h3 class="text-lg font-bold text-white flex items-center gap-2">⏳ Timeline Plengeran Bersama</h3>
              <span class="text-xs font-semibold bg-zinc-900 text-gray-400 px-3 py-1 rounded-full border border-zinc-800" x-text="moments.length + ' Kenangan'"></span>
            </div>

            <div class="space-y-6 overflow-y-auto pr-1 max-h-[85vh] no-scrollbar">
              <template x-for="moment in moments" :key="moment.id">
                <div class="bg-[#0e0e0e] border border-zinc-900 rounded-2xl overflow-hidden shadow-lg transition hover:border-zinc-850">
                  <!-- Header -->
                  <div class="p-4 flex items-center justify-between border-b border-zinc-950">
                    <div class="flex items-center gap-3">
                      <img :src="moment.authorAvatar || AVATARS[0]" class="w-10 h-10 rounded-full bg-zinc-900" />
                      <div>
                        <div class="text-sm font-bold text-gray-200">
                          <span x-text="moment.authorName"></span>
                          <span class="text-xs text-gray-500 font-normal ml-1.5" x-text="'@' + moment.authorUsername"></span>
                        </div>
                        <div class="text-[10px] text-gray-400 flex items-center gap-1.5 mt-0.5">
                          <span class="bg-sky-950 text-sky-400 px-1.5 py-0.5 rounded font-mono text-[9px] border border-sky-900/30" x-text="'📅 ' + moment.date"></span>
                          <span>•</span>
                          <span class="text-gray-500" x-text="'Dibuat: ' + new Date(moment.createdAt).toLocaleDateString('id-ID')"></span>
                        </div>
                      </div>
                    </div>
                    <!-- Delete Button -->
                    <template x-if="moment.authorUid === user?.uid">
                      <button @click="handleDeleteMoment(moment.id)" class="text-gray-500 hover:text-red-400 p-1.5 hover:bg-red-950/20 rounded-lg transition">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                        </svg>
                      </button>
                    </template>
                  </div>

                  <!-- Media Content -->
                  <div x-show="moment.mediaUrl" class="bg-black/40 border-b border-zinc-950 flex items-center justify-center max-h-[450px] overflow-hidden relative">
                    <template x-if="moment.mediaType === 'video'">
                      <iframe :src="formatDriveLink(moment.mediaUrl)" class="w-full aspect-video max-h-[450px]" frameBorder="0" allowFullScreen></iframe>
                    </template>
                    <template x-if="moment.mediaType === 'image'">
                      <img :src="formatDriveLink(moment.mediaUrl)" class="w-full object-contain max-h-[450px]" @error="$event.target.src='https://images.unsplash.com/photo-1516259762381-22954d7d3ad2?q=80&w=800&auto=format&fit=crop'" />
                    </template>
                  </div>

                  <!-- Body -->
                  <div class="p-5 space-y-3">
                    <h4 class="text-base font-bold text-white tracking-wide" x-text="moment.title"></h4>
                    <p class="text-xs text-gray-400 leading-relaxed whitespace-pre-wrap" x-text="moment.description"></p>
                    <div class="pt-3 border-t border-zinc-900 flex items-center gap-4">
                      <!-- Suka -->
                      <button @click="handleLikeMoment(moment.id, moment.likes || [])"
                              :class="moment.likes?.includes(user?.uid) ? 'bg-rose-950/40 text-rose-500 border border-rose-900/50' : 'bg-zinc-950 text-gray-400 border border-zinc-900'"
                              class="flex items-center gap-2 text-xs font-semibold px-3 py-1.5 rounded-full transition">
                        <svg class="w-4 h-4" :fill="moment.likes?.includes(user?.uid) ? 'currentColor' : 'none'" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                        </svg>
                        <span x-text="(moment.likes?.length || 0) + ' Suka'"></span>
                      </button>
                      <!-- Kirim Pesan -->
                      <button x-show="moment.authorUid !== user?.uid" @click="startPrivateChat(moment.authorUid)" class="bg-zinc-950 hover:bg-zinc-900 border border-zinc-900 text-gray-400 hover:text-white px-3 py-1.5 rounded-full text-xs font-semibold flex items-center gap-1.5 transition">💬 Kirim Pesan</button>
                    </div>
                  </div>
                </div>
              </template>

              <div x-show="moments.length === 0" class="flex flex-col items-center justify-center p-10 border-2 border-dashed border-zinc-900 rounded-2xl text-center">
                <h4 class="text-base font-bold text-gray-300 mb-1">Belum ada kenangan bersama</h4>
                <p class="text-xs text-gray-500 max-w-sm">Jadilah yang pertama untuk mendaftarkan akun baru Anda dan membagikan kenangan indah di sini!</p>
              </div>
            </div>
          </div>
        </div>
      </template>

      <!-- TAB 2: PESAN & RUANG OBROLAN -->
      <template x-if="activeTab === 'pesan'">
        <div class="flex-1 flex flex-col md:flex-row h-screen overflow-hidden">
          <!-- Sidebar Chat -->
          <div class="w-full md:w-80 bg-[#080808] border-r border-zinc-900 flex flex-col h-full">
            <div class="p-4 border-b border-zinc-900 flex items-center justify-between">
              <h3 class="text-base font-bold text-white flex items-center gap-2">📬 Ruang Obrolan</h3>
              <button x-show="activeChatId !== 'public_group'" @click="handleClearDM()" class="text-[10px] bg-red-950/40 text-red-400 hover:bg-red-900 hover:text-white px-2 py-1 rounded border border-red-900/50 transition font-bold">Bersihkan Obrolan</button>
            </div>

            <!-- Search -->
            <div class="p-4 border-b border-zinc-900/60">
              <div class="relative">
                <input type="text" placeholder="Cari pengguna terdaftar..." x-model="searchUserQuery" class="w-full bg-zinc-950 border border-zinc-900 rounded-lg pl-9 pr-4 py-2 text-xs text-gray-300 focus:outline-none focus:border-brand" />
                <span class="absolute left-3 top-2.5 text-gray-500">🔍</span>
              </div>
            </div>

            <!-- List Teman Obrolan -->
            <div class="flex-1 overflow-y-auto p-2 space-y-1">
              <button @click="activeChatId = 'public_group'" :class="activeChatId === 'public_group' ? 'bg-zinc-900/80 border-zinc-850' : 'border-transparent hover:bg-zinc-950'" class="w-full flex items-center gap-3 p-3 rounded-xl transition text-left border">
                <div class="w-10 h-10 rounded-full bg-[#111] border border-zinc-800 flex items-center justify-center text-lg">🌍</div>
                <div class="flex-1 min-w-0">
                  <div class="flex items-center justify-between">
                    <span class="text-xs font-bold text-white truncate">Grup Umum Plengeran</span>
                    <span class="text-[9px] bg-sky-500 text-black px-1.5 py-0.5 rounded-full font-bold uppercase">GRUP</span>
                  </div>
                  <p class="text-[10px] text-gray-400 truncate">Semua orang berkumpul di sini!</p>
                </div>
              </button>

              <div class="text-[10px] font-bold text-gray-500 uppercase tracking-widest px-3 pt-4 pb-2">Pesan Pribadi (DM)</div>

              <!-- Daftar Semua Pengguna -->
              <template x-for="item in getFilteredUsers()" :key="item.uid">
                <button @click="startPrivateChat(item.uid)" :class="isChatSelected(item.uid) ? 'bg-zinc-900/80 border-zinc-850' : 'border-transparent hover:bg-zinc-950'" class="w-full flex items-center gap-3 p-3 rounded-xl transition text-left border">
                  <div class="relative">
                    <img :src="item.avatar" class="w-10 h-10 rounded-full bg-zinc-900" />
                    <span :class="item.isOnline ? 'bg-emerald-500' : 'bg-zinc-600'" class="absolute bottom-0 right-0 w-2.5 h-2.5 rounded-full border-2 border-black"></span>
                  </div>
                  <div class="flex-1 min-w-0">
                    <div class="flex items-center justify-between">
                      <span class="text-xs font-bold text-gray-200 truncate" x-text="item.fullName"></span>
                      <span class="text-[9px] text-gray-500" x-text="item.isOnline ? 'Aktif' : 'Offline'"></span>
                    </div>
                    <p class="text-[10px] text-gray-500 truncate" x-text="'@' + item.username"></p>
                  </div>
                </button>
              </template>
            </div>
          </div>

          <!-- Chat Window -->
          <div class="flex-1 bg-[#0c0c0c] flex flex-col h-full relative">
            <div class="p-4 bg-[#0a0a0a] border-b border-zinc-900 flex items-center justify-between">
              <div class="flex items-center gap-3">
                <template x-if="activeChatId === 'public_group'">
                  <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-sky-900/50 flex items-center justify-center text-lg">🌎</div>
                    <div>
                      <h4 class="text-sm font-bold text-white">Grup Publik Bersama</h4>
                      <p class="text-[10px] text-sky-400 font-semibold">Tanya jawab dan ngobrol santai bersama semua orang</p>
                    </div>
                  </div>
                </template>
                <template x-if="activeChatId !== 'public_group' && getActiveChatPartner()">
                  <div class="flex items-center gap-3">
                    <img :src="getActiveChatPartner().avatar" class="w-10 h-10 rounded-full bg-zinc-900" />
                    <div>
                      <h4 class="text-sm font-bold text-white" x-text="getActiveChatPartner().fullName"></h4>
                      <p class="text-[10px] text-gray-400 flex items-center gap-1.5">
                        <span :class="getActiveChatPartner().isOnline ? 'bg-emerald-500' : 'bg-zinc-600'" class="w-1.5 h-1.5 rounded-full"></span>
                        <span x-text="'@' + getActiveChatPartner().username"></span>
                        <span x-text="'• ' + (getActiveChatPartner().isOnline ? 'Sedang Aktif' : 'Offline')"></span>
                      </p>
                    </div>
                  </div>
                </template>
              </div>
            </div>

            <!-- Messages Stream -->
            <div class="flex-1 overflow-y-auto p-5 space-y-4 no-scrollbar" id="messagesStream">
              <template x-for="msg in getFilteredMessages()" :key="msg.id">
                <div :class="msg.senderUid === user?.uid ? 'ml-auto flex-row-reverse' : ''" class="flex gap-3 max-w-[80%]">
                  <img :src="msg.senderAvatar" class="w-8 h-8 rounded-full bg-zinc-800 self-end" />
                  <div class="space-y-1">
                    <div :class="msg.senderUid === user?.uid ? 'text-right' : ''" class="text-[9px] text-gray-500">
                      <span x-text="msg.senderName"></span>
                      <span class="font-mono" x-text="'@' + msg.senderUsername"></span>
                    </div>
                    <div :class="msg.senderUid === user?.uid ? 'bg-brand text-white rounded-br-none' : 'bg-zinc-900 text-gray-200 rounded-bl-none border border-zinc-850'" class="px-4 py-2.5 rounded-2xl text-xs break-words leading-relaxed" x-text="msg.text"></div>
                    <div :class="msg.senderUid === user?.uid ? 'text-right' : ''" class="text-[8px] text-gray-500 font-mono" x-text="formatTime(msg.timestamp)"></div>
                  </div>
                </div>
              </template>
              <div x-show="getFilteredMessages().length === 0" class="h-full flex flex-col items-center justify-center text-center p-10 text-gray-500">
                <p class="text-xs">Mulai percakapan aman di sini! Selalu jaga kesopanan bersama kawan baru.</p>
              </div>
              <div id="chatEnd"></div>
            </div>

            <!-- Input Box -->
            <form @submit.prevent="handleSendMessage()" class="p-4 bg-[#0a0a0a] border-t border-zinc-900 flex items-center gap-3">
              <input type="text" placeholder="Ketik pesan yang ramah di sini..." x-model="messageInput" class="flex-1 bg-zinc-950 border border-zinc-850 rounded-xl px-4 py-3 text-xs text-gray-200 focus:outline-none focus:border-brand" required />
              <button type="submit" class="bg-brand hover:bg-sky-600 text-white px-5 py-3 rounded-xl text-xs font-bold transition">Kirim</button>
            </form>
          </div>
        </div>
      </template>

      <!-- TAB 3: PROFIL AKUN ANDA -->
      <template x-if="activeTab === 'profil'">
        <div class="flex-1 p-4 md:p-8 overflow-y-auto max-w-4xl mx-auto w-full space-y-6">
          <h3 class="text-lg font-bold text-white flex items-center gap-2 border-b border-zinc-900 pb-4">👤 Profil Akun Anda</h3>

          <div class="bg-[#0e0e0e] border border-zinc-900 p-8 rounded-2xl shadow-xl space-y-6 text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-brand"></div>
            <div class="flex flex-col items-center">
              <div class="relative">
                <img :src="userData?.avatar || AVATARS[0]" class="w-24 h-24 rounded-full border-4 border-zinc-800 bg-zinc-950 mb-4" />
                <span class="absolute bottom-4 right-1 w-4 h-4 bg-emerald-500 rounded-full border-2 border-zinc-900"></span>
              </div>
              <h2 class="text-xl font-bold text-white mb-1" x-text="userData?.fullName"></h2>
              <p class="text-sm text-sky-400 font-semibold mb-2" x-text="'@' + userData?.username"></p>
              <span class="bg-zinc-950 text-gray-400 px-3 py-1 rounded-full text-xs font-bold border border-zinc-900">🟢 Online</span>
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-3 gap-4 border-t border-b border-zinc-900 py-6 my-4 max-w-md mx-auto">
              <div>
                <div class="text-lg font-extrabold text-white" x-text="getMyMomentsCount()"></div>
                <div class="text-[10px] text-gray-500 uppercase tracking-wider font-bold">Momen Anda</div>
              </div>
              <div>
                <div class="text-lg font-extrabold text-white" x-text="userData?.followers?.length || 0"></div>
                <div class="text-[10px] text-gray-500 uppercase tracking-wider font-bold">Pengikut</div>
              </div>
              <div>
                <div class="text-lg font-extrabold text-white" x-text="userData?.following?.length || 0"></div>
                <div class="text-[10px] text-gray-500 uppercase tracking-wider font-bold">Diikuti</div>
              </div>
            </div>

            <!-- Bio -->
            <div class="max-w-md mx-auto bg-zinc-950 border border-zinc-900 rounded-xl p-4 text-left">
              <span class="text-[9px] font-extrabold text-gray-500 uppercase tracking-widest block mb-1">🌿 Biografi</span>
              <p class="text-xs text-gray-300 leading-relaxed italic" x-text="userData?.bio || 'Belum ada biografi yang diisi.'"></p>
            </div>

            <button x-show="!isEditingProfile" @click="openProfileEditor()" class="bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 text-gray-200 text-xs px-6 py-2.5 rounded-lg font-bold transition flex items-center gap-2 mx-auto">📝 Edit Profil & Bio Anda</button>
          </div>

          <!-- Profile Editor -->
          <form x-show="isEditingProfile" @submit.prevent="handleUpdateProfile()" class="bg-[#0e0e0e] border border-zinc-900 p-6 rounded-2xl space-y-4" style="display: none;">
            <h4 class="text-sm font-bold text-white border-b border-zinc-900 pb-3">Perbarui Informasi Diri</h4>
            <div>
              <label class="block text-xs text-gray-400 font-bold mb-1.5 uppercase tracking-wider">Nama Lengkap</label>
              <input type="text" x-model="editFullName" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3.5 py-2 text-xs text-gray-200 focus:outline-none focus:border-brand" required>
            </div>
            <div>
              <label class="block text-xs text-gray-400 font-bold mb-1.5 uppercase tracking-wider">Tentang Saya / Bio</label>
              <textarea rows="3" x-model="editBio" class="w-full bg-zinc-950 border border-zinc-800 rounded-lg px-3.5 py-2 text-xs text-gray-200 focus:outline-none focus:border-brand resize-none"></textarea>
            </div>
            <div>
              <label class="block text-xs text-gray-400 font-bold mb-3 uppercase tracking-wider">Ganti Gambar Karakter (Avatar)</label>
              <div class="grid grid-cols-6 gap-3">
                <template x-for="avatar in AVATARS">
                  <button type="button" @click="editAvatar = avatar" :class="editAvatar === avatar ? 'border-brand ring-2 ring-brand/20' : 'border-zinc-900 hover:border-zinc-800'" class="p-1 rounded-xl bg-zinc-950 border transition duration-150">
                    <img :src="avatar" class="w-full h-12 object-contain" />
                  </button>
                </template>
              </div>
            </div>
            <div class="flex items-center gap-3 pt-3">
              <button type="submit" class="bg-brand hover:bg-sky-600 text-white font-bold py-2.5 px-5 rounded-lg text-xs transition">Simpan Profil</button>
              <button type="button" @click="isEditingProfile = false" class="bg-zinc-950 hover:bg-zinc-900 border border-zinc-900 text-gray-400 hover:text-white font-semibold py-2.5 px-5 rounded-lg text-xs transition">Batal</button>
            </div>
          </form>

          <!-- Temukan Teman Baru -->
          <div class="bg-[#0e0e0e] border border-zinc-900 p-6 rounded-2xl space-y-4">
            <h4 class="text-sm font-bold text-white flex items-center gap-2 border-b border-zinc-900 pb-3">👥 Kenalan & Temukan Teman Baru</h4>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <template x-for="item in usersList.filter(u => u.uid !== user?.uid)" :key="item.uid">
                <div class="bg-zinc-950 border border-zinc-900 rounded-xl p-4 flex flex-col sm:flex-row sm:items-center justify-between gap-3 hover:border-zinc-850 transition">
                  <div class="flex items-center gap-3">
                    <img :src="item.avatar" class="w-10 h-10 rounded-full bg-zinc-900" />
                    <div>
                      <div class="text-xs font-bold text-gray-200" x-text="item.fullName"></div>
                      <div class="text-[10px] text-gray-500" x-text="'@' + item.username"></div>
                    </div>
                  </div>
                  <button @click="handleFollowToggle(item)"
                          :class="isFollowingUser(item.uid) ? 'bg-zinc-900 text-gray-400 border-zinc-800 hover:bg-red-950/20' : 'bg-brand text-black border-transparent hover:bg-sky-600 font-bold'"
                          class="text-[10px] font-extrabold px-3 py-1.5 rounded-lg border transition"
                          x-text="isFollowingUser(item.uid) ? 'Batal Ikuti' : 'Ikuti'"></button>
                </div>
              </template>
            </div>
            <p x-show="usersList.filter(u => u.uid !== user?.uid).length === 0" class="text-xs text-gray-500 italic">Belum ada pengguna lain yang mendaftar. Bagikan aplikasi ini kepada teman Anda!</p>
          </div>
        </div>
      </template>

    </main>
  </div>

  <!-- FIREBASE INTEGRATION ENGINE -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.3.0/firebase-app.js';
    import { getAuth, signInAnonymously, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from 'https://www.gstatic.com/firebasejs/11.3.0/firebase-auth.js';
    import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, updateDoc, deleteDoc, arrayUnion, arrayRemove } from 'https://www.gstatic.com/firebasejs/11.3.0/firebase-firestore.js';

    // Ambil konfigurasi global sistem dari environment
    const firebaseConfig = JSON.parse(__firebase_config);
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'plengergram-app-v2';

    // Bagikan variabel penting ke Object global window agar Alpine.js bisa menggunakannya
    window.db = db;
    window.auth = auth;
    window.appId = appId;
    window.fbMethods = {
      doc, setDoc, getDoc, collection, onSnapshot, addDoc, updateDoc, deleteDoc, arrayUnion, arrayRemove,
      createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, signInAnonymously, onAuthStateChanged
    };

    // Trigger agar Alpine tahu Firebase sudah siap di-load
    window.dispatchEvent(new CustomEvent('firebase-ready'));
  </script>
</body>
</html>
