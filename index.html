                                                        <button 
                                                            type="submit"
                                                            className="flex-1 bg-accentBlue text-white font-bold text-xs py-2.5 px-4 rounded-xl"
                                                        >
                                                            Simpan Identitas
                                                        </button>
                                                    </div>
                                                </form>
                                            )}
                                        </div>
                                    </div>

                                    {/* Cari dan Lihat Daftar Seluruh Sobat Server */}
                                    <div className="bg-cardBg border border-zinc-800 rounded-2xl p-5 shadow-xl">
                                        <div className="flex justify-between items-center mb-4">
                                            <h4 className="text-xs font-bold uppercase text-white tracking-wider flex items-center gap-2">
                                                <i className="fa-solid fa-users text-accentBlue"></i>
                                                Daftar Anggota Server Aktif ({users.length})
                                            </h4>
                                            
                                            <input 
                                                type="text" 
                                                placeholder="Cari Sobat..." 
                                                value={userSearchText}
                                                onChange={(e) => setUserSearchText(e.target.value)}
                                                className="bg-[#09090b] text-white border border-zinc-800 rounded-lg px-2.5 py-1 text-[10px] focus:outline-none focus:ring-1 focus:ring-accentBlue w-36"
                                            />
                                        </div>

                                        <div className="space-y-3.5">
                                            {users.filter(u => u.fullName.toLowerCase().includes(userSearchText.toLowerCase())).length === 0 ? (
                                                <p className="text-xs text-zinc-600 italic">Belum ada orang lain yang terhubung.</p>
                                            ) : (
                                                users.filter(u => u.fullName.toLowerCase().includes(userSearchText.toLowerCase())).map(user => {
                                                    const isOnline = user.isOnline;

                                                    return (
                                                        <div key={user.id} className="flex items-center justify-between p-3 bg-black/30 border border-zinc-900 rounded-xl">
                                                            <div className="flex items-center gap-3">
                                                                <div className="relative">
                                                                    <img src={user.avatar} className="w-10 h-10 rounded-full object-cover border border-zinc-800" alt="avatar" />
                                                                    <span className={`absolute bottom-0 right-0 w-2.5 h-2.5 border-2 border-black rounded-full ${
                                                                        isOnline ? 'bg-accentGreen' : 'bg-zinc-600'
                                                                    }`}></span>
                                                                </div>
                                                                <div>
                                                                    <div className="flex items-center gap-1.5">
                                                                        <span className="text-xs font-bold text-white">@{user.username}</span>
                                                                        {user.id === currentUser?.id && (
                                                                            <span className="bg-accentBlue/20 text-accentBlue text-[8px] font-bold px-1.5 py-0.2 rounded">Anda</span>
                                                                        )}
                                                                    </div>
                                                                    <p className="text-[10px] text-zinc-500">{user.fullName}</p>
                                                                </div>
                                                            </div>
                                                            <span className="text-xs text-zinc-600 font-semibold italic">
                                                                {isOnline ? 'Sedang Aktif' : 'Offline'}
                                                            </span>
                                                        </div>
                                                    );
                                                })
                                            )}
                                        </div>
                                    </div>

                                </div>
                            </div>
                        )}

                    </main>

                    {/* MODAL STATUS KONEKSI */}
                    {showStatusModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 animate-fade-in">
                            <div className="bg-cardBg border border-zinc-800 rounded-2xl max-w-sm w-full p-6 space-y-4 shadow-2xl">
                                <div className="text-center">
                                    <div className="w-12 h-12 rounded-full bg-[#1b2b3a] text-accentBlue flex items-center justify-center text-xl mx-auto mb-3">
                                        <i className="fa-solid fa-wifi"></i>
                                    </div>
                                    <h4 className="text-sm font-bold text-white mb-1">Status Sinkronisasi Jaringan</h4>
                                    <p className="text-[11px] text-zinc-500">
                                        Seluruh aktivitas berkirim obrolan, mengukir momen di kalender bersama disinkronisasi ke server pusat realtime secara instan.
                                    </p>
                                </div>

                                <div className="space-y-2.5 bg-[#09090b] p-3 rounded-xl border border-zinc-900 text-[11px]">
                                    <div className="flex justify-between">
                                        <span className="text-zinc-500">Status Server:</span>
                                        <span className="text-accentGreen font-bold flex items-center gap-1.5">
                                            <span className="w-1.5 h-1.5 bg-accentGreen rounded-full"></span> Terhubung Stabil
                                        </span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-zinc-500">Database Utama:</span>
                                        <span className="text-zinc-400 font-mono">Firestore Shared Sandbox</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="text-zinc-500">Sistem Autentikasi:</span>
                                        <span className="text-zinc-400">Anonim Terpadu Otomatis</span>
                                    </div>
                                </div>

                                <div className="pt-2 border-t border-zinc-900 space-y-2">
                                    <button 
                                        onClick={() => setShowResetConfirm(true)}
                                        className="w-full bg-red-950/40 text-red-500 hover:bg-red-950/60 border border-red-900/50 font-bold py-2.5 rounded-xl text-xs transition-all flex items-center justify-center gap-1.5"
                                    >
                                        <i className="fa-solid fa-trash-can"></i>
                                        Reset Ulang Sesi Lokal Browser Ini
                                    </button>

                                    <button 
                                        onClick={() => setShowStatusModal(false)}
                                        className="w-full bg-accentBlue hover:bg-blue-600 text-white font-bold py-2.5 rounded-xl text-xs transition-all"
                                    >
                                        Tutup
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL RESET SINKRONISASI */}
                    {showResetConfirm && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50">
                            <div className="bg-cardBg border border-zinc-800 rounded-2xl max-w-sm w-full p-6 space-y-4 shadow-2xl text-center">
                                <div className="w-12 h-12 rounded-full bg-red-950 text-red-500 flex items-center justify-center text-xl mx-auto mb-1">
                                    <i className="fa-solid fa-triangle-exclamation"></i>
                                </div>
                                <h4 className="text-sm font-bold text-white uppercase tracking-wider">Reset Sesi Browser</h4>
                                <p className="text-xs text-zinc-400">
                                    Tindakan ini akan mengeluarkan Anda dari profil saat ini di browser ini dan memungkinkan Anda membuat identitas baru di server bersama.
                                </p>
                                <div className="flex gap-3">
                                    <button 
                                        onClick={() => setShowResetConfirm(false)}
                                        className="flex-1 bg-zinc-900 text-zinc-400 font-bold py-2 rounded-xl text-xs border border-zinc-800 hover:bg-zinc-800"
                                    >
                                        Batal
                                    </button>
                                    <button 
                                        onClick={handleClearAllAccountsAndData}
                                        className="flex-1 bg-red-600 text-white font-bold py-2 rounded-xl text-xs hover:bg-red-700 transition-all"
                                    >
                                        Ya, Bersihkan Sesi
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Toast Notification */}
                    {toastMessage && (
                        <div className="fixed bottom-6 right-6 bg-[#1b2b3a] border border-accentBlue text-white px-5 py-3 rounded-xl shadow-2xl text-xs font-semibold tracking-wide transition-all z-50 flex items-center gap-2">
                            <i className="fa-solid fa-circle-info text-accentBlue"></i>
                            {toastMessage}
                        </div>
                    )}

                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
