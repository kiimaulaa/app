<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlengerGram - Kalender & Timeline Bersama</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#09090b',
                        cardBg: '#121214',
                        borderBg: '#1c1c1f',
                        accentBlue: '#0095f6',
                        accentGreen: '#22c55e',
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b;
            color: #f4f4f5;
        }
        /* Custom scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #09090b;
        }
        ::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3f3f46;
        }
    </style>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React and ReactDOM UMD -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX Compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Configure Custom Babel Preset to Force Classic JSX Runtime -->
    <script>
        Babel.registerPreset('custom-react-preset', {
            presets: [
                [Babel.availablePresets['env'], { modules: false }],
                [Babel.availablePresets['react'], { runtime: 'classic' }]
            ]
        });
    </script>

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="overflow-hidden h-screen w-screen">

    <div id="root" class="h-full w-full"></div>

    <script type="text/babel" data-presets="custom-react-preset">
        /** @jsx React.createElement */
        /** @jsxFrag React.Fragment */
        const { useState, useEffect, useRef, useMemo } = React;

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'plengergram-shared-server';
        
        // Konfigurasi Firebase dengan fallback dinamis agar selalu aktif
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "mock-api-key",
                authDomain: "mock-auth-domain",
                projectId: "mock-project",
                storageBucket: "mock-storage",
                messagingSenderId: "mock-sender",
                appId: "mock-app"
            };

        // Deteksi apakah menggunakan Mock
        const isMockConfig = !firebaseConfig || firebaseConfig.apiKey === "mock-api-key" || firebaseConfig.projectId.includes("mock");

        // Daftar Pilihan Avatar Menarik
        const AVATARS = [
            "https://api.dicebear.com/7.x/adventurer/svg?seed=Felix",
            "https://api.dicebear.com/7.x/adventurer/svg?seed=Aneka",
            "https://api.dicebear.com/7.x/adventurer/svg?seed=Buster",
            "https://api.dicebear.com/7.x/adventurer/svg?seed=Garfield",
            "https://api.dicebear.com/7.x/adventurer/svg?seed=Midnight",
            "https://api.dicebear.com/7.x/adventurer/svg?seed=Peanut"
        ];

        // Generator Nama Keren Acak untuk Mempercepat Penggabungan User Baru
        const ADJECTIVES = ["Bintang", "Rusa", "Kucing", "Awan", "Panda", "Elang", "Serigala", "Zebra", "Sobat"];
        const NOUNS = ["Keren", "Senja", "Santuy", "Ceria", "Petualang", "Hore", "Plenger", "Aktif", "Syahdu"];

        const generateRandomName = () => {
            const adj = ADJECTIVES[Math.floor(Math.random() * ADJECTIVES.length)];
            const noun = NOUNS[Math.floor(Math.random() * NOUNS.length)];
            const num = Math.floor(Math.random() * 900) + 100;
            return {
                fullName: `${adj} ${noun}`,
                username: `${adj.toLowerCase()}_${noun.toLowerCase()}${num}`
            };
        };

        const getLocalStorageData = (key, defaultValue) => {
            try {
                const val = localStorage.getItem(key);
                return val ? JSON.parse(val) : defaultValue;
            } catch (e) {
                return defaultValue;
            }
        };

        const saveLocalStorageData = (key, data) => {
            try {
                localStorage.setItem(key, JSON.stringify(data));
            } catch (e) {}
        };

        // Inisialisasi Firebase secara Global
        let firestoreDb = null;
        let authInstance = null;
        let isFirebaseActive = false;

        try {
            const fb = window.firebase;
            if (fb) {
                let app;
                if (fb.apps.length === 0) {
                    app = fb.initializeApp(firebaseConfig);
                } else {
                    app = fb.app();
                }
                firestoreDb = app.firestore();
                authInstance = app.auth();
                isFirebaseActive = true;
            }
        } catch (err) {
            console.warn("Firebase tidak terdeteksi, beralih ke mode Penyimpanan Lokal Terdistribusi:", err);
            isFirebaseActive = false;
        }

        function App() {
            const [screen, setScreen] = useState('auth');
            const [activeTab, setActiveTab] = useState('momen');
            const [authLoading, setAuthLoading] = useState(true);

            // Form Fields untuk kustomisasi Profil Cepat
            const [regUsername, setRegUsername] = useState('');
            const [regFullName, setRegFullName] = useState('');
            const [regAvatar, setRegAvatar] = useState(AVATARS[0]);

            // State Terpusat Pengguna
            const [currentUser, setCurrentUser] = useState(() => getLocalStorageData('plengergram_current_user', null)); 
            const [users, setUsers] = useState(() => getLocalStorageData('plengergram_users', []));

            // State Data Utama
            const [timeline, setTimeline] = useState(() => getLocalStorageData('plengergram_timeline', [
                {
                    id: 'seed-1',
                    authorId: 'system',
                    authorName: 'Sistem PlengerGram',
                    authorUsername: 'system',
                    authorAvatar: 'https://api.dicebear.com/7.x/bottts/svg?seed=System',
                    dateStr: '2026-06-16',
                    title: 'Selamat Datang di Server Utama PlengerGram!',
                    content: 'Server ini menyatukan semua pengguna di satu tempat. Anda bisa melihat kalender memori bersama secara langsung.',
                    timestamp: Date.now() - 3600000
                }
            ])); 

            const [messages, setMessages] = useState(() => getLocalStorageData('plengergram_messages', [])); 
            
            const [activeChat, setActiveChat] = useState({ id: 'group', type: 'group' }); 
            const [chatSearchText, setChatSearchText] = useState('');
            const [userSearchText, setUserSearchText] = useState('');
            const [toastMessage, setToastMessage] = useState('');

            // Navigasi Tanggal Kalender
            const [currentDate, setCurrentDate] = useState(new Date(2026, 5, 16)); 
            const [selectedDateStr, setSelectedDateStr] = useState('2026-06-16');

            // Form Inputs
            const [messageInput, setMessageInput] = useState('');
            const [newMemoryTitle, setNewMemoryTitle] = useState('');
            const [newMemoryContent, setNewMemoryContent] = useState('');

            // Edit Profil state
            const [isEditingProfile, setIsEditingProfile] = useState(false);
            const [editFullName, setEditFullName] = useState('');
            const [editBio, setEditBio] = useState('');
            const [editAvatar, setEditAvatar] = useState('');

            const [showStatusModal, setShowStatusModal] = useState(false);
            const [showResetConfirm, setShowResetConfirm] = useState(false);
            const chatEndRef = useRef(null);

            // Firebase User Auth State
            const [fbUser, setFbUser] = useState(null);

            // Inisialisasi Autentikasi Anonim Otomatis di Background
            useEffect(() => {
                if (!isFirebaseActive || !authInstance) {
                    setAuthLoading(false);
                    // Jika offline/lokal, langsung pakai pengguna tersimpan atau berikan identitas acak
                    if (currentUser) {
                        setScreen('app');
                    }
                    return;
                }

                const initAuth = async () => {
                    try {
                        let credential;
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            credential = await authInstance.signInWithCustomToken(__initial_auth_token);
                        } else {
                            credential = await authInstance.signInAnonymously();
                        }
                        
                        if (credential && credential.user) {
                            setFbUser(credential.user);
                            
                            // Jika user sudah login sebelumnya di browser ini
                            if (currentUser) {
                                setScreen('app');
                                // Perbarui status online di database cloud
                                await firestoreDb.collection('artifacts').doc(appId)
                                    .collection('public').doc('data')
                                    .collection('users').doc(currentUser.id).set({
                                        ...currentUser,
                                        isOnline: true,
                                        lastActive: Date.now()
                                    }, { merge: true });
                            } else {
                                // Buatkan info profil acak instan agar user bisa langsung masuk tanpa hambatan
                                const identity = generateRandomName();
                                setRegFullName(identity.fullName);
                                setRegUsername(identity.username);
                            }
                        }
                    } catch (err) {
                        console.error("Kesalahan koneksi autentikasi:", err);
                        showToast("Koneksi cloud lambat. Menggunakan penyimpanan browser.");
                    } finally {
                        setAuthLoading(false);
                    }
                };
                initAuth();

                const unsubscribeAuth = authInstance.onAuthStateChanged((user) => {
                    if (user) {
                        setFbUser(user);
                    }
                });

                return () => unsubscribeAuth();
            }, []);

            // Sinkronisasi Data Realtime Satu Server (Firestore Cloud)
            useEffect(() => {
                if (!isFirebaseActive || !firestoreDb || !fbUser) return;

                // 1. Ambil daftar semua user yang tersambung di server
                const unsubscribeUsers = firestoreDb.collection('artifacts').doc(appId)
                    .collection('public').doc('data')
                    .collection('users').onSnapshot((snapshot) => {
                        const loadedUsers = [];
                        snapshot.forEach(doc => {
                            loadedUsers.push({ id: doc.id, ...doc.data() });
                        });
                        setUsers(loadedUsers);

                        // Sinkronisasi data user aktif saat ini jika ada perubahan di cloud
                        if (currentUser) {
                            const updatedSelf = loadedUsers.find(u => u.id === currentUser.id);
                            if (updatedSelf) {
                                setCurrentUser(updatedSelf);
                            }
                        }
                    }, (error) => {
                        console.error("Gagal sinkronisasi data pengguna:", error);
                    });

                // 2. Ambil data Timeline bersama secara realtime
                const unsubscribeTimeline = firestoreDb.collection('artifacts').doc(appId)
                    .collection('public').doc('data')
                    .collection('timeline').onSnapshot((snapshot) => {
                        const loadedMemories = [];
                        snapshot.forEach(doc => {
                            loadedMemories.push({ id: doc.id, ...doc.data() });
                        });
                        
                        // Gabungkan dengan postingan bawaan sistem
                        const systemWelcome = {
                            id: 'seed-1',
                            authorId: 'system',
                            authorName: 'Sistem PlengerGram',
                            authorUsername: 'system',
                            authorAvatar: 'https://api.dicebear.com/7.x/bottts/svg?seed=System',
                            dateStr: '2026-06-16',
                            title: 'Selamat Datang di Server Utama PlengerGram!',
                            content: 'Server ini menyatukan semua pengguna di satu tempat. Anda bisa melihat kalender memori bersama secara langsung.',
                            timestamp: Date.now() - 3600000
                        };

                        const merged = [systemWelcome, ...loadedMemories];
                        // Saring agar unik
                        const unique = merged.filter((v, i, a) => a.findIndex(t => t.id === v.id) === i);
                        unique.sort((a, b) => b.timestamp - a.timestamp);
                        setTimeline(unique);
                    }, (error) => {
                        console.error("Gagal sinkronisasi timeline:", error);
                    });

                // 3. Ambil pesan obrolan realtime
                const unsubscribeMessages = firestoreDb.collection('artifacts').doc(appId)
                    .collection('public').doc('data')
                    .collection('messages').onSnapshot((snapshot) => {
                        const loadedMsgs = [];
                        snapshot.forEach(doc => {
                            loadedMsgs.push({ id: doc.id, ...doc.data() });
                        });
                        loadedMsgs.sort((a, b) => a.timestamp - b.timestamp);
                        setMessages(loadedMsgs);
                    }, (error) => {
                        console.error("Gagal sinkronisasi pesan:", error);
                    });

                return () => {
                    unsubscribeUsers();
                    unsubscribeTimeline();
                    unsubscribeMessages();
                };
            }, [fbUser]);

            // Simpan perubahan secara lokal untuk redundansi darurat
            useEffect(() => {
                if (!isFirebaseActive) {
                    saveLocalStorageData('plengergram_users', users);
                }
            }, [users]);

            useEffect(() => {
                if (!isFirebaseActive) {
                    saveLocalStorageData('plengergram_timeline', timeline);
                }
            }, [timeline]);

            useEffect(() => {
                if (!isFirebaseActive) {
                    saveLocalStorageData('plengergram_messages', messages);
                }
            }, [messages]);

            useEffect(() => {
                if (currentUser) {
                    saveLocalStorageData('plengergram_current_user', currentUser);
                } else {
                    localStorage.removeItem('plengergram_current_user');
                }
            }, [currentUser]);

            // Tampilkan Toast Notifikasi
            const showToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(''), 3500);
            };

            // Otomatis scroll chat ke posisi terbawah
            useEffect(() => {
                if (chatEndRef.current) {
                    chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            }, [messages, activeChat]);

            // Menghubungkan Pengguna Langsung ke Server Bersama
            const handleJoinServer = async (e) => {
                e.preventDefault();
                if (!regFullName.trim() || !regUsername.trim()) {
                    showToast("Silakan masukkan Nama dan Username Anda.");
                    return;
                }

                const cleanUsername = regUsername.toLowerCase().trim().replace(/\s+/g, '');
                
                // Cari apakah username sudah diambil oleh orang lain di server
                if (users.some(u => u.username === cleanUsername && u.id !== fbUser?.uid)) {
                    showToast("Username ini sudah digunakan di server. Coba buat yang lain!");
                    return;
                }

                try {
                    const uid = fbUser?.uid || `user-${Date.now()}`;
                    
                    const newUserProfile = {
                        id: uid,
                        username: cleanUsername,
                        fullName: regFullName.trim(),
                        avatar: regAvatar,
                        bio: "Mari membuat kenangan indah bersama di PlengerGram!",
                        isOnline: true,
                        lastActive: Date.now(),
                        createdAt: Date.now()
                    };

                    if (isFirebaseActive && firestoreDb) {
                        await firestoreDb.collection('artifacts').doc(appId)
                            .collection('public').doc('data')
                            .collection('users').doc(uid).set(newUserProfile);
                    } else {
                        setUsers(prev => {
                            const updated = [...prev.filter(u => u.id !== uid), newUserProfile];
                            saveLocalStorageData('plengergram_users', updated);
                            return updated;
                        });
                    }

                    setCurrentUser(newUserProfile);
                    showToast(`Halo @${cleanUsername}, Selamat datang di server bersama!`);
                    setScreen('app');
                } catch (err) {
                    console.error("Gagal mendaftarkan ke server:", err);
                    showToast("Gagal menyambung ke server. Silakan coba lagi.");
                }
            };

            // Keluar Akun dan hapus session lokal
            const handleLogout = async () => {
                if (currentUser) {
                    const offlineUser = { ...currentUser, isOnline: false, lastActive: Date.now() };
                    if (isFirebaseActive && firestoreDb) {
                        await firestoreDb.collection('artifacts').doc(appId)
                            .collection('public').doc('data')
                            .collection('users').doc(currentUser.id).set(offlineUser, { merge: true });
                    }
                }
                setCurrentUser(null);
                setScreen('auth');
                showToast("Anda telah keluar dari server bersama.");
            };

            // Hapus semua data dari server lokal untuk troubleshoot darurat
            const handleClearAllAccountsAndData = async () => {
                try {
                    localStorage.clear();
                    setUsers([]);
                    setMessages([]);
                    setTimeline([
                        {
                            id: 'seed-1',
                            authorId: 'system',
                            authorName: 'Sistem PlengerGram',
                            authorUsername: 'system',
                            authorAvatar: 'https://api.dicebear.com/7.x/bottts/svg?seed=System',
                            dateStr: '2026-06-16',
                            title: 'Selamat Datang di Server Utama PlengerGram!',
                            content: 'Server ini menyatukan semua pengguna di satu tempat. Anda bisa melihat kalender memori bersama secara langsung.',
                            timestamp: Date.now() - 3600000
                        }
                    ]);
                    setCurrentUser(null);
                    setScreen('auth');
                    setShowResetConfirm(false);
                    setShowStatusModal(false);
                    showToast("Penyimpanan lokal berhasil direset ulang!");
                } catch (e) {
                    showToast("Gagal membersihkan data.");
                }
            };

            // Kalender Generator
            const getDaysInMonth = (year, month) => {
                return new Date(year, month + 1, 0).getDate();
            };

            const generateCalendarDays = () => {
                const year = currentDate.getFullYear();
                const month = currentDate.getMonth();
                const totalDays = getDaysInMonth(year, month);
                const firstDayIndex = new Date(year, month, 1).getDay();
                
                const days = [];
                for (let i = 0; i < firstDayIndex; i++) {
                    days.push({ day: null, dateStr: null });
                }

                for (let d = 1; d <= totalDays; d++) {
                    const dayStr = String(d).padStart(2, '0');
                    const monthStr = String(month + 1).padStart(2, '0');
                    const dateStr = `${year}-${monthStr}-${dayStr}`;
                    days.push({ day: d, dateStr });
                }

                return days;
            };

            const handlePrevMonth = () => {
                setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1));
            };

            const handleNextMonth = () => {
                setCurrentDate(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1));
            };

            const getMonthNameIndonesian = (monthIndex) => {
                const months = [
                    "Januari", "Februari", "Maret", "April", "Mei", "Juni",
                    "Juli", "Agustus", "September", "Oktober", "November", "Desember"
                ];
                return months[monthIndex];
            };

            // Kirim postingan Kenangan Baru ke Server Terpusat
            const handleAddMemory = async (e) => {
                e.preventDefault();
                if (!newMemoryTitle.trim() || !newMemoryContent.trim()) {
                    showToast("Judul dan cerita kenangan Anda tidak boleh kosong!");
                    return;
                }

                try {
                    const memoryData = {
                        authorId: currentUser?.id,
                        authorName: currentUser?.fullName,
                        authorUsername: currentUser?.username,
                        authorAvatar: currentUser?.avatar,
                        dateStr: selectedDateStr,
                        title: newMemoryTitle.trim(),
                        content: newMemoryContent.trim(),
                        timestamp: Date.now()
                    };

                    if (isFirebaseActive && firestoreDb) {
                        await firestoreDb.collection('artifacts').doc(appId)
                            .collection('public').doc('data')
                            .collection('timeline').add(memoryData);
                    } else {
                        const updated = [ { id: `local-${Date.now()}`, ...memoryData }, ...timeline ];
                        setTimeline(updated);
                    }

                    setNewMemoryTitle('');
                    setNewMemoryContent('');
                    showToast("Momen baru berhasil ditambahkan ke kalender bersama!");
                } catch (err) {
                    console.error("Gagal mengupload kenangan:", err);
                    showToast("Gagal menyimpan kenangan.");
                }
            };

            // Kirim pesan obrolan ke server
            const handleSendMessage = async (e) => {
                e.preventDefault();
                if (!messageInput.trim()) return;

                const textToSend = messageInput.trim();
                setMessageInput('');

                try {
                    const msgPayload = {
                        senderId: currentUser?.id,
                        senderName: currentUser?.fullName,
                        senderUsername: currentUser?.username,
                        senderAvatar: currentUser?.avatar,
                        text: textToSend,
                        timestamp: Date.now(),
                        isGroup: activeChat.type === 'group',
                        receiverId: activeChat.type === 'dm' ? activeChat.id : 'group'
                    };

                    if (isFirebaseActive && firestoreDb) {
                        await firestoreDb.collection('artifacts').doc(appId)
                            .collection('public').doc('data')
                            .collection('messages').add(msgPayload);
                    } else {
                        const updated = [...messages, { id: `msg-${Date.now()}`, ...msgPayload }];
                        setMessages(updated);
                    }

                } catch (err) {
                    console.error("Gagal mengirimkan pesan:", err);
                }
            };

            // Filter Pesan Obrolan berdasarkan pilihan grup atau obrolan pribadi
            const filteredMessages = useMemo(() => {
                if (activeChat.type === 'group') {
                    return messages.filter(m => m.isGroup);
                } else {
                    return messages.filter(m => !m.isGroup && (
                        (m.senderId === currentUser?.id && m.receiverId === activeChat.id) ||
                        (m.senderId === activeChat.id && m.receiverId === currentUser?.id)
                    ));
                }
            }, [messages, activeChat, currentUser?.id]);

            // Perbarui data Profil Akun pengguna di server
            const handleSaveProfile = async (e) => {
                e.preventDefault();
                if (!editFullName.trim()) {
                    showToast("Nama tidak boleh kosong!");
                    return;
                }

                try {
                    const updatedFields = {
                        fullName: editFullName.trim(),
                        bio: editBio.trim(),
                        avatar: editAvatar
                    };

                    if (isFirebaseActive && firestoreDb) {
                        await firestoreDb.collection('artifacts').doc(appId)
                            .collection('public').doc('data')
                            .collection('users').doc(currentUser?.id).update(updatedFields);
                    }

                    const updatedUser = { ...currentUser, ...updatedFields };
                    setCurrentUser(updatedUser);
                    setIsEditingProfile(false);
                    showToast("Profil berhasil diperbarui!");
                } catch (err) {
                    console.error("Gagal memperbarui profil:", err);
                }
            };

            const startEditProfile = () => {
                setEditFullName(currentUser?.fullName || '');
                setEditBio(currentUser?.bio || '');
                setEditAvatar(currentUser?.avatar || AVATARS[0]);
                setIsEditingProfile(true);
            };

            const filteredUsersToChat = useMemo(() => {
                return users.filter(u => u.id !== currentUser?.id && 
                    (u.fullName.toLowerCase().includes(chatSearchText.toLowerCase()) || 
                     u.username.toLowerCase().includes(chatSearchText.toLowerCase()))
                );
            }, [users, chatSearchText, currentUser?.id]);

            const selectedDateMoments = useMemo(() => {
                return timeline.filter(m => m.dateStr === selectedDateStr);
            }, [timeline, selectedDateStr]);

            const onlineFriends = useMemo(() => {
                return users.filter(u => u.id !== currentUser?.id && u.isOnline);
            }, [users, currentUser?.id]);

            // Tampilan Halaman Hubungkan Identitas / Masuk Server
            if (screen === 'auth' || !currentUser) {
                return (
                    <div className="h-full w-full flex items-center justify-center bg-[#09090b] px-4 relative overflow-hidden">
                        <div className="w-full max-w-md bg-[#121214] rounded-2xl border border-zinc-800 p-8 shadow-2xl relative overflow-hidden">
                            <div className="text-center mb-8">
                                <h1 className="text-3xl font-extrabold tracking-tight text-white mb-2">PlengerGram</h1>
                                <p className="text-zinc-500 text-sm">Masuk ke Server Kalender Bersama Terpadu</p>
                            </div>

                            {authLoading ? (
                                <div className="text-center py-10 space-y-4">
                                    <div className="w-10 h-10 border-4 border-t-accentBlue border-zinc-800 rounded-full animate-spin mx-auto"></div>
                                    <p className="text-zinc-400 text-xs">Menyambungkan Anda ke server utama...</p>
                                </div>
                            ) : (
                                <form onSubmit={handleJoinServer} className="space-y-4">
                                    <div className="bg-[#1b2b3a]/30 border border-accentBlue/20 rounded-xl p-4 text-xs text-zinc-300 mb-2">
                                        <i className="fa-solid fa-circle-info text-accentBlue mr-1.5"></i>
                                        Sistem secara otomatis mendeteksi browser Anda dan menyiapkannya untuk masuk ke satu server global.
                                    </div>

                                    <div>
                                        <label className="block text-zinc-400 text-xs font-semibold uppercase tracking-wider mb-1.5">Nama Panggilan Anda</label>
                                        <input 
                                            type="text" 
                                            placeholder="Nama Anda yang tampil di server" 
                                            value={regFullName}
                                            onChange={(e) => setRegFullName(e.target.value)}
                                            className="w-full bg-[#09090b] text-white border border-zinc-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-accentBlue/50 transition-all placeholder-zinc-600"
                                            required
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-zinc-400 text-xs font-semibold uppercase tracking-wider mb-1.5">Username Unik Anda</label>
                                        <input 
                                            type="text" 
                                            placeholder="Contoh: whana" 
                                            value={regUsername}
                                            onChange={(e) => setRegUsername(e.target.value)}
                                            className="w-full bg-[#09090b] text-white border border-zinc-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-accentBlue/50 transition-all placeholder-zinc-600"
                                            required
                                        />
                                    </div>

                                    <div>
                                        <label className="block text-zinc-400 text-xs font-semibold uppercase tracking-wider mb-2">Pilih Karakter Avatar Anda</label>
                                        <div className="flex justify-between items-center bg-[#09090b] p-2.5 rounded-xl border border-zinc-800">
                                            {AVATARS.map((av, idx) => (
                                                <button
                                                    key={idx}
                                                    type="button"
                                                    onClick={() => setRegAvatar(av)}
                                                    className={`w-11 h-11 rounded-full overflow-hidden transition-all duration-200 border-2 ${
                                                        regAvatar === av ? 'border-accentBlue scale-110' : 'border-transparent opacity-60 hover:opacity-100'
                                                    }`}
                                                >
                                                    <img src={av} alt="avatar" className="w-full h-full object-cover" />
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <button 
                                        type="submit"
                                        className="w-full bg-accentBlue hover:bg-blue-600 text-white font-semibold py-3.5 px-4 rounded-xl transition-all shadow-lg active:scale-[0.98] mt-2 text-sm flex items-center justify-center gap-2"
                                    >
                                        <i className="fa-solid fa-right-to-bracket"></i>
                                        Masuk Server Bersama
                                    </button>
                                </form>
                            )}
                        </div>
                        
                        {toastMessage && (
                            <div className="absolute bottom-6 right-6 bg-accentBlue text-white px-5 py-3 rounded-xl shadow-2xl text-xs font-medium tracking-wide transition-all animate-bounce flex items-center gap-2 z-50">
                                <i className="fa-solid fa-circle-info"></i>
                                {toastMessage}
                            </div>
                        )}
                    </div>
                );
            }

            // Tampilan Utama Aplikasi
            return (
                <div className="h-screen w-screen bg-darkBg flex overflow-hidden">
                    
                    {/* SIDEBAR UTAMA */}
                    <aside className="w-64 border-r border-zinc-900 bg-black flex flex-col justify-between shrink-0 select-none">
                        <div className="p-6">
                            <div className="mb-8">
                                <h2 className="text-2xl font-black tracking-tight text-white flex items-center gap-2">
                                    <span>PlengerGram</span>
                                </h2>
                                <span className="text-[10px] text-zinc-500 font-bold block tracking-wider mt-1">SERVER TERPADU</span>
                            </div>

                            <nav className="space-y-2">
                                <button 
                                    onClick={() => setActiveTab('momen')}
                                    className={`w-full flex items-center gap-4 px-4 py-3.5 rounded-xl text-sm font-semibold transition-all ${
                                        activeTab === 'momen' 
                                            ? 'bg-cardBg text-[#0095f6] shadow-sm' 
                                            : 'text-zinc-400 hover:text-white hover:bg-zinc-900/50'
                                    }`}
                                >
                                    <i className="fa-solid fa-calendar-days text-base"></i>
                                    <span>Momen Bersama</span>
                                </button>

                                <button 
                                    onClick={() => setActiveTab('pesan')}
                                    className={`w-full flex items-center gap-4 px-4 py-3.5 rounded-xl text-sm font-semibold transition-all ${
                                        activeTab === 'pesan' 
                                            ? 'bg-cardBg text-[#0095f6] shadow-sm' 
                                            : 'text-zinc-400 hover:text-white hover:bg-zinc-900/50'
                                    }`}
                                >
                                    <i className="fa-solid fa-paper-plane text-base"></i>
                                    <span>Pesan & Teman</span>
                                </button>

                                <button 
                                    onClick={() => setActiveTab('profil')}
                                    className={`w-full flex items-center gap-4 px-4 py-3.5 rounded-xl text-sm font-semibold transition-all ${
                                        activeTab === 'profil' 
                                            ? 'bg-cardBg text-[#0095f6] shadow-sm' 
                                            : 'text-zinc-400 hover:text-white hover:bg-zinc-900/50'
                                    }`}
                                >
                                    <img src={currentUser?.avatar} className="w-5 h-5 rounded-full object-cover inline-block" alt="nav" />
                                    <span>Profil Akun</span>
                                </button>
                            </nav>
                        </div>

                        {/* Panel Status Jaringan */}
                        <div className="p-4 border-t border-zinc-900 space-y-4">
                            <div>
                                <span className="text-[10px] text-zinc-500 font-bold uppercase tracking-widest block mb-1">Status Sinkronisasi:</span>
                                <button 
                                    onClick={() => setShowStatusModal(true)}
                                    className="w-full bg-[#121214] border border-zinc-800 text-[#0095f6] px-3 py-2 rounded-xl text-[11px] font-semibold text-left flex items-center gap-2 hover:bg-zinc-900/80 transition-all"
                                >
                                    <span className="w-2 h-2 rounded-full bg-accentGreen animate-pulse"></span>
                                    <span>{isFirebaseActive ? 'Terhubung ke Cloud Utama' : 'Penyimpanan Offline Lokal'}</span>
                                </button>
                            </div>

                            <div className="flex items-center gap-3 bg-[#121214]/50 p-2 rounded-xl border border-zinc-900">
                                <div className="relative">
                                    <img src={currentUser?.avatar} className="w-10 h-10 rounded-full object-cover" alt="badge" />
                                    <span className="absolute bottom-0 right-0 w-3 h-3 bg-accentGreen border-2 border-black rounded-full"></span>
                                </div>
                                <div className="min-w-0 flex-1">
                                    <div className="text-xs font-bold text-white truncate">@{currentUser?.username}</div>
                                    <div className="text-[10px] text-zinc-500 truncate">{currentUser?.fullName}</div>
                                </div>
                            </div>

                            <button 
                                onClick={handleLogout}
                                className="w-full flex items-center gap-3 px-3 py-2 text-xs font-bold text-red-500 hover:bg-red-500/10 rounded-xl transition-all"
                            >
                                <i className="fa-solid fa-right-from-bracket"></i>
                                <span>Keluar Server</span>
                            </button>
                        </div>
                    </aside>

                    {/* HALAMAN PANEL UTAMA */}
                    <main className="flex-1 flex overflow-hidden">
                        
                        {/* TAB 1: MOMEN BERSAMA */}
                        {activeTab === 'momen' && (
                            <div className="flex-1 flex overflow-hidden">
                                
                                {/* Bagian Kiri: Kalender & Input Momen */}
                                <div className="w-1/2 border-r border-zinc-900 p-6 flex flex-col gap-6 overflow-y-auto">
                                    
                                    {/* Kartu Selamat Datang */}
                                    <div className="bg-cardBg border border-zinc-800 rounded-2xl p-5 flex items-center justify-between shadow-xl">
                                        <div className="flex items-center gap-4">
                                            <div className="relative">
                                                <img src={currentUser?.avatar} className="w-14 h-14 rounded-full border-2 border-accentBlue object-cover" alt="greet" />
                                                <span className="absolute bottom-0 right-0 w-3.5 h-3.5 bg-accentGreen border-2 border-cardBg rounded-full"></span>
                                            </div>
                                            <div>
                                                <p className="text-zinc-500 text-xs">Anda masuk sebagai,</p>
                                                <h3 className="text-lg font-bold text-white">@{currentUser?.username}</h3>
                                            </div>
                                        </div>
                                        <span className="bg-[#0e2c4c] text-[#0095f6] px-4 py-2 rounded-full text-xs font-bold flex items-center gap-2">
                                            <i className="fa-solid fa-network-wired"></i>
                                            Satu Server Aktif
                                        </span>
                                    </div>

                                    {/* Teman yang Sedang Online */}
                                    <div className="bg-cardBg border border-zinc-800 rounded-2xl p-5 shadow-xl">
                                        <span className="text-[10px] font-bold tracking-wider text-zinc-500 uppercase block mb-3">PENGGUNA LAIN DI SERVER INI</span>
                                        <div className="flex gap-4 overflow-x-auto pb-2">
                                            {onlineFriends.length === 0 ? (
                                                <span className="text-xs text-zinc-600">Anda adalah pengguna pertama yang sedang online saat ini.</span>
                                            ) : (
                                                onlineFriends.map(friend => (
                                                    <div key={friend.id} className="flex flex-col items-center shrink-0">
                                                        <div className="relative">
                                                            <img src={friend.avatar} className="w-12 h-12 rounded-full object-cover border-2 border-zinc-700" alt="online" />
                                                            <span className="absolute bottom-0 right-0 w-3.5 h-3.5 bg-accentGreen border-2 border-cardBg rounded-full"></span>
                                                        </div>
                                                        <span className="text-[10px] text-zinc-400 mt-1 max-w-[70px] truncate">@{friend.username}</span>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>

                                    {/* Kalender Memori Bersama */}
                                    <div className="bg-cardBg border border-zinc-800 rounded-2xl p-5 shadow-xl">
                                        <div className="flex justify-between items-center mb-4">
                                            <button onClick={handlePrevMonth} className="text-zinc-400 hover:text-white p-1.5"><i className="fa-solid fa-chevron-left"></i></button>
                                            <h4 className="text-sm font-bold text-white uppercase tracking-wider">
                                                {getMonthNameIndonesian(currentDate.getMonth())} {currentDate.getFullYear()}
                                            </h4>
                                            <button onClick={handleNextMonth} className="text-zinc-400 hover:text-white p-1.5"><i className="fa-solid fa-chevron-right"></i></button>
                                        </div>

                                        <div className="grid grid-cols-7 text-center text-[10px] font-bold text-zinc-500 tracking-wider mb-2">
                                            <div>M</div><div>S</div><div>S</div><div>R</div><div>K</div><div>J</div><div>S</div>
                                        </div>

                                        <div className="grid grid-cols-7 gap-2 text-center text-xs font-semibold">
                                            {generateCalendarDays().map((dayObj, idx) => {
                                                if (!dayObj.day) {
                                                    return <div key={`empty-${idx}`} className="text-zinc-800 py-2">-</div>;
                                                }
                                                const hasMoment = timeline.some(m => m.dateStr === dayObj.dateStr);
                                                const isSelected = selectedDateStr === dayObj.dateStr;

                                                return (
                                                    <button 
                                                        key={`day-${dayObj.day}`}
                                                        onClick={() => setSelectedDateStr(dayObj.dateStr)}
                                                        className={`py-2 rounded-lg relative transition-all duration-150 ${
                                                            isSelected 
                                                                ? 'bg-accentBlue text-white shadow-lg font-bold' 
                                                                : hasMoment 
                                                                    ? 'bg-[#1b2b3a] text-accentBlue font-bold hover:bg-zinc-800' 
                                                                    : 'text-zinc-400 hover:bg-zinc-800/50'
                                                        }`}
                                                    >
                                                        {dayObj.day}
                                                        {hasMoment && !isSelected && (
                                                            <span className="absolute bottom-1 left-1/2 transform -translate-x-1/2 w-1.5 h-1.5 bg-accentBlue rounded-full"></span>
                                                        )}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    {/* Formulir Penambahan Momen Bersama */}
                                    <div className="bg-cardBg border border-zinc-800 rounded-2xl p-5 shadow-xl">
                                        <div className="flex items-center gap-2 mb-2">
                                            <i className="fa-solid fa-circle-plus text-accentBlue text-sm"></i>
                                            <h4 className="text-xs font-bold uppercase tracking-wider text-white">Tambah Kenangan Bersama</h4>
                                        </div>
                                        <p className="text-[11px] text-zinc-500 mb-4">
                                            Cerita yang Anda tambahkan akan masuk langsung ke server dan dapat dilihat oleh seluruh browser serta pengguna lain pada tanggal <span className="text-white font-semibold underline">{selectedDateStr}</span>.
                                        </p>

                                        <form onSubmit={handleAddMemory} className="space-y-3">
                                            <input 
                                                type="text" 
                                                placeholder="Judul momen indahnya..." 
                                                value={newMemoryTitle}
                                                onChange={(e) => setNewMemoryTitle(e.target.value)}
                                                className="w-full bg-[#09090b] text-white border border-zinc-800 rounded-xl px-4 py-2.5 text-xs focus:outline-none focus:ring-2 focus:ring-accentBlue/40 transition-all placeholder-zinc-750"
                                                required
                                            />
                                            <textarea 
                                                rows="3"
                                                placeholder="Bagikan cerita lengkap momen hari ini..." 
                                                value={newMemoryContent}
                                                onChange={(e) => setNewMemoryContent(e.target.value)}
                                                className="w-full bg-[#09090b] text-white border border-zinc-800 rounded-xl px-4 py-2.5 text-xs focus:outline-none focus:ring-2 focus:ring-accentBlue/40 transition-all placeholder-zinc-750 resize-none"
                                                required
                                            ></textarea>
                                            
                                            <button 
                                                type="submit"
                                                className="w-full bg-accentBlue hover:bg-blue-600 text-white font-bold py-2.5 px-4 rounded-xl text-xs transition-all active:scale-[0.98]"
                                            >
                                                Bagikan Kenangan Ke Semua Orang
                                            </button>
                                        </form>
                                    </div>

                                </div>

                                {/* Bagian Kanan: Timeline Cerita yang Ditampilkan */}
                                <div className="w-1/2 p-6 flex flex-col gap-6 overflow-y-auto">
                                    <div className="flex justify-between items-center pb-3 border-b border-zinc-900">
                                        <h3 className="text-lg font-bold text-white flex items-center gap-2">
                                            <i className="fa-solid fa-clock-rotate-left"></i>
                                            Timeline Tanggal: {selectedDateStr}
                                        </h3>
                                        <span className="bg-[#1b2b3a] text-accentBlue text-[10px] font-bold px-2.5 py-1 rounded-full uppercase">
                                            {selectedDateMoments.length} Kenangan
                                        </span>
                                    </div>

                                    {selectedDateMoments.length === 0 ? (
                                        <div className="flex-1 flex flex-col items-center justify-center text-center p-8 bg-cardBg border border-zinc-900 rounded-2xl py-16">
                                            <i className="fa-solid fa-folder-open text-4xl text-zinc-700 mb-4"></i>
                                            <h4 className="text-sm font-bold text-zinc-400 mb-1">Belum ada kenangan bersama di tanggal ini</h4>
                                            <p className="text-xs text-zinc-600 max-w-sm">
                                                Jadilah yang pertama untuk mengukir sejarah memori bersama pada tanggal {selectedDateStr} di server ini!
                                            </p>
                                        </div>
                                    ) : (
                                        <div className="space-y-4">
                                            {selectedDateMoments.map(moment => (
                                                <div key={moment.id} className="bg-cardBg border border-zinc-800 rounded-2xl p-5 shadow-xl hover:border-zinc-700 transition-all">
                                                    <div className="flex items-center justify-between mb-4">
                                                        <div className="flex items-center gap-3">
                                                            <img src={moment.authorAvatar} className="w-9 h-9 rounded-full object-cover border border-zinc-700" alt="avatar" />
                                                            <div>
                                                                <h5 className="text-xs font-bold text-white">{moment.authorName}</h5>
                                                                <span className="text-[10px] text-zinc-500">@{moment.authorUsername}</span>
                                                            </div>
                                                        </div>
                                                        <span className="bg-[#1b2b3a] text-accentBlue text-[10px] font-bold px-2.5 py-1 rounded-full uppercase">
                                                            {moment.dateStr}
                                                        </span>
                                                    </div>
                                                    <h4 className="text-sm font-bold text-white mb-2">{moment.title}</h4>
                                                    <p className="text-xs text-zinc-400 leading-relaxed whitespace-pre-line">{moment.content}</p>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>

                            </div>
                        )}

                        {/* TAB 2: PESAN & TEMAN */}
                        {activeTab === 'pesan' && (
                            <div className="flex-1 flex overflow-hidden">
                                
                                {/* Direktori Obrolan */}
                                <div className="w-80 border-r border-zinc-900 flex flex-col overflow-hidden bg-black/40">
                                    <div className="p-4 border-b border-zinc-900 space-y-4">
                                        <div className="flex justify-between items-center">
                                            <h3 className="text-base font-bold text-white flex items-center gap-2">
                                                <i className="fa-solid fa-paper-plane text-accentBlue"></i>
                                                Ruang Obrolan
                                            </h3>
                                        </div>
                                        
                                        <div className="relative">
                                            <i className="fa-solid fa-search absolute left-3.5 top-1/2 -translate-y-1/2 text-xs text-zinc-500"></i>
                                            <input 
                                                type="text" 
                                                placeholder="Cari anggota server..." 
                                                value={chatSearchText}
                                                onChange={(e) => setChatSearchText(e.target.value)}
                                                className="w-full bg-[#121214] text-white border border-zinc-800 rounded-xl pl-9 pr-4 py-2.5 text-xs focus:outline-none focus:ring-1 focus:ring-accentBlue"
                                            />
                                        </div>
                                    </div>

                                    {/* Daftar Chat */}
                                    <div className="flex-1 overflow-y-auto p-2.5 space-y-3">
                                        {/* Saluran Publik Utama */}
                                        <button 
                                            onClick={() => setActiveChat({ id: 'group', type: 'group' })}
                                            className={`w-full text-left p-3 rounded-xl border transition-all flex items-center gap-3 ${
                                                activeChat.id === 'group' 
                                                    ? 'bg-[#1b2b3a]/50 border-accentBlue/40 text-white' 
                                                    : 'bg-[#121214] border-zinc-900 hover:border-zinc-800'
                                            }`}
                                        >
                                            <div className="w-10 h-10 rounded-full bg-gradient-to-tr from-accentBlue to-indigo-600 flex items-center justify-center text-white font-bold text-lg shadow-md shrink-0">
                                                <i className="fa-solid fa-earth-asia text-sm"></i>
                                            </div>
                                            <div className="min-w-0 flex-1">
                                                <div className="flex justify-between items-center mb-0.5">
                                                    <span className="text-xs font-bold">Grup Publik Bersama</span>
                                                    <span className="bg-accentBlue text-[8px] font-extrabold px-1.5 py-0.5 rounded text-white tracking-widest uppercase">SERVER</span>
                                                </div>
                                                <p className="text-[10px] text-zinc-500 truncate font-medium">Bicara langsung dengan semua browser aktif!</p>
                                            </div>
                                        </button>

                                        <span className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest block px-2.5 pt-2">Obrolan Jalur Pribadi (DM)</span>

                                        {filteredUsersToChat.length === 0 ? (
                                            <p className="text-[11px] text-zinc-600 italic px-2.5">Belum ada pengguna lain terdeteksi di server ini.</p>
                                        ) : (
                                            <div className="space-y-1">
                                                {filteredUsersToChat.map(user => {
                                                    const isOnline = user.isOnline;

                                                    return (
                                                        <button 
                                                            key={user.id}
                                                            onClick={() => setActiveChat({ id: user.id, type: 'dm', data: user })}
                                                            className={`w-full text-left p-3 rounded-xl border transition-all flex items-center gap-3 ${
                                                                activeChat.id === user.id 
                                                                    ? 'bg-[#1b2b3a]/50 border-accentBlue/40 text-white' 
                                                                    : 'bg-transparent border-transparent hover:bg-zinc-900/50'
                                                            }`}
                                                        >
                                                            <div className="relative shrink-0">
                                                                <img src={user.avatar} className="w-10 h-10 rounded-full object-cover border border-zinc-800" alt="avatar" />
                                                                <span className={`absolute bottom-0 right-0 w-2.5 h-2.5 border-2 border-black rounded-full ${
                                                                    isOnline ? 'bg-accentGreen' : 'bg-zinc-600'
                                                                }`}></span>
                                                            </div>
                                                            <div className="min-w-0 flex-1">
                                                                <div className="flex justify-between items-center mb-0.5">
                                                                    <span className="text-xs font-bold text-white truncate">@{user.username}</span>
                                                                </div>
                                                                <p className="text-[10px] text-zinc-500 truncate">{user.fullName}</p>
                                                                <span className={`inline-block text-[8px] font-bold px-1.5 py-0.5 mt-1 rounded ${isOnline ? 'bg-green-950/40 text-accentGreen' : 'bg-zinc-900 text-zinc-500'}`}>
                                                                    {isOnline ? 'Online' : 'Offline'}
                                                                </span>
                                                            </div>
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        )}
                                    </div>
                                </div>

                                {/* Area Pertukaran Obrolan Realtime */}
                                <div className="flex-1 flex flex-col overflow-hidden bg-black">
                                    <div className="p-4 border-b border-zinc-900 flex justify-between items-center bg-[#121214]">
                                        <div className="flex items-center gap-3">
                                            {activeChat.type === 'group' ? (
                                                <React.Fragment>
                                                    <div className="w-10 h-10 rounded-full bg-gradient-to-tr from-accentBlue to-indigo-600 flex items-center justify-center text-white font-bold shadow-md">
                                                        <i className="fa-solid fa-earth-asia"></i>
                                                    </div>
                                                    <div>
                                                        <h4 className="text-sm font-bold text-white">Grup Publik Bersama</h4>
                                                        <p className="text-[10px] text-zinc-500 flex items-center gap-1.5">
                                                            <span className="w-1.5 h-1.5 bg-accentGreen rounded-full"></span>
                                                            Semua orang dari browser berbeda berkumpul di sini
                                                        </p>
                                                    </div>
                                                </React.Fragment>
                                            ) : (
                                                <React.Fragment>
                                                    <img src={activeChat.data?.avatar} className="w-10 h-10 rounded-full object-cover border border-zinc-800" alt="avatar" />
                                                    <div>
                                                        <h4 className="text-sm font-bold text-white">@{activeChat.data?.username}</h4>
                                                        <p className="text-[10px] text-zinc-500">Kirim pesan langsung secara instan</p>
                                                    </div>
                                                </React.Fragment>
                                            )}
                                        </div>
                                    </div>

                                    {/* Logs Chat */}
                                    <div className="flex-1 overflow-y-auto p-4 space-y-4">
                                        {filteredMessages.length === 0 ? (
                                            <div className="h-full flex flex-col items-center justify-center text-center text-zinc-600">
                                                <i className="fa-solid fa-comments text-4xl mb-3"></i>
                                                <p className="text-xs mb-2">Kirim pesan pertama Anda untuk meramaikan server bersama ini!</p>
                                            </div>
                                        ) : (
                                            filteredMessages.map((msg, index) => {
                                                const isSelf = msg.senderId === currentUser?.id;
                                                return (
                                                    <div key={msg.id || index} className={`flex gap-3 max-w-[80%] ${isSelf ? 'ml-auto flex-row-reverse' : ''}`}>
                                                        {!isSelf && (
                                                            <img src={msg.senderAvatar} className="w-8 h-8 rounded-full object-cover self-end" alt="avatar" />
                                                        )}
                                                        <div>
                                                            {!isSelf && activeChat.type === 'group' && (
                                                                <span className="text-[9px] text-zinc-500 block mb-1">@{msg.senderUsername}</span>
                                                            )}
                                                            <div className={`p-3 rounded-2xl text-xs leading-relaxed whitespace-pre-line ${
                                                                isSelf 
                                                                    ? 'bg-accentBlue text-white rounded-br-none' 
                                                                    : 'bg-[#121214] text-zinc-100 rounded-bl-none border border-zinc-900'
                                                            }`}>
                                                                {msg.text}
                                                            </div>
                                                            <span className="text-[8px] text-zinc-600 block mt-1 text-right">
                                                                {new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                                                            </span>
                                                        </div>
                                                    </div>
                                                );
                                            })
                                        )}
                                        <div ref={chatEndRef}></div>
                                    </div>

                                    {/* Input Kirim Pesan */}
                                    <form onSubmit={handleSendMessage} className="p-4 bg-[#121214] border-t border-zinc-900 flex gap-3">
                                        <input 
                                            type="text" 
                                            placeholder="Ketik pesan untuk dikirim ke seluruh server..." 
                                            value={messageInput}
                                            onChange={(e) => setMessageInput(e.target.value)}
                                            className="flex-1 bg-[#09090b] text-white border border-zinc-800 rounded-xl px-4 py-3 text-xs focus:outline-none focus:ring-1 focus:ring-accentBlue"
                                            required
                                        />
                                        <button 
                                            type="submit"
                                            className="bg-accentBlue hover:bg-blue-600 text-white font-bold text-xs px-5 py-3 rounded-xl transition-all"
                                        >
                                            Kirim
                                        </button>
                                    </form>
                                </div>

                            </div>
                        )}

                        {/* TAB 3: PROFIL AKUN */}
                        {activeTab === 'profil' && (
                            <div className="flex-1 p-6 overflow-y-auto">
                                <div className="max-w-xl mx-auto space-y-6">
                                    <h3 className="text-lg font-bold text-white flex items-center gap-2 pb-3 border-b border-zinc-900">
                                        <i className="fa-solid fa-user-gear text-accentBlue"></i>
                                        Identitas Anda di Server
                                    </h3>

                                    {/* Kartu Profil */}
                                    <div className="bg-cardBg border border-zinc-800 rounded-2xl p-6 shadow-xl relative overflow-hidden">
                                        <div className="flex flex-col items-center text-center">
                                            <div className="relative mb-4">
                                                <img src={currentUser?.avatar} className="w-24 h-24 rounded-full object-cover border-4 border-zinc-800" alt="profile" />
                                                <span className="absolute bottom-1 right-1 w-5 h-5 bg-accentGreen border-4 border-cardBg rounded-full"></span>
                                            </div>

                                            <h4 className="text-lg font-extrabold text-white mb-0.5">{currentUser?.fullName}</h4>
                                            <p className="text-accentBlue text-xs font-semibold mb-2">@{currentUser?.username}</p>
                                            
                                            <div className="flex items-center gap-1 text-[11px] text-zinc-500 mb-5">
                                                <span className="w-2 h-2 rounded-full bg-accentGreen animate-pulse"></span>
                                                <span>Aktif Online di Server</span>
                                            </div>

                                            {/* Biografi */}
                                            <div className="w-full text-left bg-[#09090b] p-4 rounded-xl border border-zinc-900 mt-2 space-y-1">
                                                <span className="text-[10px] text-zinc-500 font-bold tracking-widest uppercase block"><i className="fa-solid fa-feather mr-1.5 text-accentBlue"></i>Biografi Anda</span>
                                                <p className="text-xs text-zinc-400 italic leading-relaxed">{currentUser?.bio || "Mari buat memori bersama!"}</p>
                                            </div>

                                            {/* Tombol Edit Profil */}
                                            {!isEditingProfile ? (
                                                <button 
                                                    onClick={startEditProfile}
                                                    className="w-full bg-[#1c1c1f] hover:bg-zinc-800 text-zinc-300 font-bold text-xs py-3 px-4 rounded-xl transition-all border border-zinc-800 mt-5"
                                                >
                                                    <i className="fa-solid fa-pen-to-square mr-2"></i>
                                                    Ubah Nama & Karakter Avatar Anda
                                                </button>
                                            ) : (
                                                <form onSubmit={handleSaveProfile} className="w-full mt-5 space-y-4 text-left border-t border-zinc-900 pt-5">
                                                    <div>
                                                        <label className="block text-zinc-400 text-[10px] font-bold uppercase mb-1">Nama Tampilan Baru</label>
                                                        <input 
                                                            type="text" 
                                                            value={editFullName}
                                                            onChange={(e) => setEditFullName(e.target.value)}
                                                            className="w-full bg-[#09090b] text-white border border-zinc-800 rounded-xl px-4 py-2.5 text-xs focus:outline-none focus:ring-1 focus:ring-accentBlue"
                                                            required
                                                        />
                                                    </div>

                                                    <div>
                                                        <label className="block text-zinc-400 text-[10px] font-bold uppercase mb-1">Status / Bio Singkat</label>
                                                        <textarea 
                                                            value={editBio}
                                                            onChange={(e) => setEditBio(e.target.value)}
                                                            rows="2"
                                                            className="w-full bg-[#09090b] text-white border border-zinc-800 rounded-xl px-4 py-2.5 text-xs focus:outline-none focus:ring-1 focus:ring-accentBlue resize-none"
                                                        ></textarea>
                                                    </div>

                                                    <div>
                                                        <label className="block text-zinc-400 text-[10px] font-bold uppercase mb-2">Pilih Avatar Baru</label>
                                                        <div className="flex justify-between bg-[#09090b] p-2 rounded-xl border border-zinc-900">
                                                            {AVATARS.map((av, idx) => (
                                                                <button
                                                                    key={idx}
                                                                    type="button"
                                                                    onClick={() => setEditAvatar(av)}
                                                                    className={`w-10 h-10 rounded-full overflow-hidden border-2 ${
                                                                        editAvatar === av ? 'border-accentBlue scale-105' : 'border-transparent opacity-60'
                                                                    }`}
                                                                >
                                                                    <img src={av} alt="avatar option" className="w-full h-full object-cover" />
                                                                </button>
                                                            ))}
                                                        </div>
                                                    </div>

                                                    <div className="flex gap-2">
                                                        <button 
                                                            type="button"
                                                            onClick={() => setIsEditingProfile(false)}
                                                            className="flex-1 bg-zinc-900 text-zinc-400 font-bold text-xs py-2.5 px-4 rounded-xl border border-zinc-800"
                                                        >
                                                            Batal
                                                        </button>
